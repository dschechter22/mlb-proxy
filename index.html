// ─── Visuals Tab ──────────────────────────────────────────────────────────────
function LineupTab({session}){
  const{lineup,gameLog,batterIdx}=session;
  const[selected,setSelected]=useState(null);

  // Build per-batter pitch log from gameLog
  const batterLog=useMemo(()=>{
    const map={};
    (gameLog||[]).forEach(e=>{
      const k=e.batter||"";
      if(!k.trim()) return;
      if(!map[k]) map[k]=[];
      map[k].push(e);
    });
    return map;
  },[gameLog]);

  const PITCH_COLORS={
    "4-Seam FB":"#e74c3c","2-Seam FB":"#c0392b","Cutter":"#e67e22","Sinker":"#d35400",
    "Slider":"#2980b9","Sweeper":"#1a5fa8","Curveball":"#8e44ad","12-6 Curve":"#6c3483",
    "Changeup":"#27ae60","Splitter":"#1e8449","Knuckleball":"#7f8c8d",
  };

  const outcomeColor=(e)=>{
    if(e.isOut) return C.green;
    if(e.onBase) return C.warn;
    if(e.outcomeId==="foul") return C.gold;
    if(e.outcomeId==="ball") return C.textSoft;
    return C.textSoft;
  };

  const outcomeIcon=(e)=>{
    if(e.outcomeId==="look") return "👀";
    if(e.outcomeId==="swing") return "🏏";
    if(e.outcomeId==="foul") return "⚾";
    if(e.outcomeId==="ball") return "·";
    if(e.outcomeId==="walk") return "🚶";
    if(e.outcomeId==="hbp") return "🩹";
    if(e.isOut) return "✓";
    if(e.onBase) return "H";
    return "·";
  };

  if(selected!==null){
    const batter=lineup?lineup[selected]:null;
    const name=batter?.name||`Batter ${selected+1}`;
    const log=batterLog[name]||[];
    const outs=log.filter(e=>e.isOut).length;
    const hits=log.filter(e=>e.onBase&&e.outcomeId!=="walk").length;
    const ks=log.filter(e=>e.outcomeId==="look"||e.outcomeId==="swing").length;
    const bb=log.filter(e=>e.outcomeId==="walk"||e.outcome==="Walk").length;
    const fouls=log.filter(e=>e.outcomeId==="foul").length;
    const balls=log.filter(e=>e.outcomeId==="ball"&&e.outcome!=="Walk").length;
    const strikes=log.filter(e=>e.outcomeId==="look"||e.outcomeId==="swing"||e.outcomeId==="foul").length;
    const hard=log.filter(e=>e.outcomeId==="hard"||e.contactClass==="hard").length;
    const weak=log.filter(e=>e.outcomeId==="weak"||e.contactClass==="weak").length;

    return(
      <div style={{padding:"16px"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
          <button onClick={()=>setSelected(null)} style={{...S.ghostBtn,padding:"4px 10px"}}>← Back</button>
          <div>
            <div style={{fontSize:14,fontWeight:800,color:C.text}}>{name}</div>
            <div style={{fontSize:11,color:C.textSoft,fontWeight:600}}>
              {batter?.bat==="S"?"Switch":batter?.bat==="L"?"LHB":"RHB"} · {log.length} pitches seen
            </div>
          </div>
        </div>

        {/* Summary stats */}
        {log.length>0&&(
          <div style={{marginBottom:14}}>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {[["Pitches",log.length,null],["Balls",balls,null],["Strikes",strikes,null],["Fouls",fouls,null],["K",ks,C.green],["BB",bb,C.warn],["Outs",outs,C.green],["Hits",hits,C.warn],["Hard",hard,C.warn],["Weak",weak,C.green]].map(([lbl,val,col])=>(
                <div key={lbl} style={{flex:"0 0 calc(20% - 6px)",minWidth:52,background:C.white,border:`1.5px solid ${C.border}`,borderRadius:8,padding:"7px 4px",textAlign:"center"}}>
                  <div style={{fontSize:15,fontWeight:800,color:col||C.text}}>{val}</div>
                  <div style={{fontSize:8,color:C.textSoft,fontWeight:700,textTransform:"uppercase"}}>{lbl}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* Pitch-by-pitch chart */}
        {log.length===0?(
          <div style={S.emptyState}>No pitches logged for this batter yet.</div>
        ):(
          <>
            {/* Zone chart */}
            <div style={S.sectionLabel}>Zone Chart</div>
            <div style={{...S.card,marginBottom:12,padding:"12px 10px"}}>
              {(()=>{
                const zoneMap={};
                log.forEach(e=>{
                  if(!e.zone) return;
                  if(!zoneMap[e.zone]) zoneMap[e.zone]={total:0,outs:0,hits:0,hard:0,weak:0,ks:0};
                  zoneMap[e.zone].total++;
                  if(e.isOut) zoneMap[e.zone].outs++;
                  if(e.onBase) zoneMap[e.zone].hits++;
                  if(e.outcomeId==="hard"||e.contactClass==="hard") zoneMap[e.zone].hard++;
                  if(e.outcomeId==="weak"||e.contactClass==="weak") zoneMap[e.zone].weak++;
                  if(e.outcomeId==="look"||e.outcomeId==="swing") zoneMap[e.zone].ks++;
                });
                return(
                  <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:3,marginBottom:10}}>
                    {Array.from({length:25},(_,idx)=>{
                      const row=Math.floor(idx/5),col=idx%5,id=`${row}-${col}`;
                      const z=zoneMap[id],inZ=row>=1&&row<=3&&col>=1&&col<=3;
                      // Red = high contact/hits (danger), Blue = high K/weak contact (target)
                      // contactScore: hard contact rate (danger -- avoid)
                      // targetScore: K + weak contact rate (target -- throw here)
                      const contactScore=z?z.hard/z.total:0;
                      const targetScore=z?(z.ks+z.weak)/z.total:0;
                      let bg=inZ?C.white:C.surface;
                      if(z){
                        if(contactScore>targetScore){
                          bg=`rgba(180,30,30,${0.15+contactScore*0.75})`;
                        } else {
                          bg=`rgba(26,111,181,${0.15+targetScore*0.75})`;
                        }
                      }
                      const textColor=z?"#fff":C.textSoft;
                      return(
                        <div key={id} style={{height:40,borderRadius:4,background:bg,
                          border:`1px solid ${C.border}`,display:"flex",flexDirection:"column",
                          alignItems:"center",justifyContent:"center"}}>
                          {z&&<>
                            <span style={{fontSize:10,fontWeight:800,color:textColor,lineHeight:1}}>{z.total}</span>
                            <span style={{fontSize:7,color:"rgba(255,255,255,0.85)",lineHeight:1.3}}>
                              {contactScore>targetScore?`${Math.round(contactScore*100)}%HC`:`${Math.round(targetScore*100)}%K`}
                            </span>
                          </>}
                        </div>
                      );
                    })}
                  </div>
                );
              })()}
              <div style={{display:"flex",gap:16,justifyContent:"center"}}>
                <span style={{fontSize:9,fontWeight:700,color:"rgba(180,30,30,0.9)"}}>🔴 Avoid — hard contact</span>
                <span style={{fontSize:9,fontWeight:700,color:"rgba(26,111,181,0.9)"}}>🔵 Target — K/weak contact</span>
              </div>
            </div>

            <div style={S.sectionLabel}>Pitch Log</div>
            <div style={{...S.card,padding:"10px 8px"}}>
              {log.map((e,i)=>{
                const col=PITCH_COLORS[e.pitch]||C.textMid;
                const oc=outcomeColor(e);
                return(
                  <div key={i} style={{display:"flex",alignItems:"center",gap:6,padding:"6px 4px",
                    borderBottom:`1px solid ${C.border}`}}>
                    <div style={{width:18,height:18,borderRadius:"50%",background:col,
                      display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                      <span style={{fontSize:8,fontWeight:800,color:"#fff"}}>{i+1}</span>
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:11,fontWeight:700,color:C.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{e.pitch}</div>
                      <div style={{fontSize:9,color:C.textSoft,fontWeight:500}}>
                        {e.balls!==undefined?`${e.balls}-${e.strikes}`:"--"} · Zone {e.zone||"—"}
                      </div>
                    </div>
                    <div style={{textAlign:"right",flexShrink:0}}>
                      <div style={{fontSize:10,fontWeight:800,color:oc}}>{outcomeIcon(e)}</div>
                      <div style={{fontSize:9,color:oc,fontWeight:600,maxWidth:80,textAlign:"right"}}>{e.outcome}</div>
                    </div>
                  </div>
                );
              })}
            </div>
          </>
        )}
      </div>
    );
  }

  return(
    <div style={{padding:"16px"}}>
      <div style={S.sectionLabel}>Lineup</div>
      {(!lineup||lineup.every(b=>!b.name))?(
        <div style={S.emptyState}>No lineup set. Add batters in Setup.</div>
      ):(
        (lineup||[]).map((b,i)=>{
          const name=b.name||`Batter ${i+1}`;
          const log=batterLog[name]||[];
          const isCurrent=i===batterIdx;
          const outs=log.filter(e=>e.isOut).length;
          const hits=log.filter(e=>e.onBase).length;
          return(
            <div key={i} onClick={()=>setSelected(i)} style={{
              background:isCurrent?C.greenDim:C.white,
              border:`1.5px solid ${isCurrent?C.greenMid:C.border}`,
              borderRadius:10,padding:"10px 14px",marginBottom:6,cursor:"pointer",
              display:"flex",alignItems:"center",gap:10,
            }}>
              <div style={{
                width:24,height:24,borderRadius:"50%",flexShrink:0,
                background:isCurrent?C.green:C.surface,
                display:"flex",alignItems:"center",justifyContent:"center",
                border:`1.5px solid ${isCurrent?C.green:C.border}`,
              }}>
                <span style={{fontSize:11,fontWeight:800,color:isCurrent?"#fff":C.textMid}}>{i+1}</span>
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:800,color:C.text}}>{name}</div>
                <div style={{fontSize:10,color:C.textSoft,fontWeight:600}}>
                  {b.bat==="S"?"Switch":b.bat==="L"?"LHB":"RHB"}
                  {log.length>0&&<span style={{marginLeft:8}}>{log.length}p · {outs}K+out · {hits}H</span>}
                </div>
              </div>
              {isCurrent&&<span style={{fontSize:10,fontWeight:800,color:C.green}}>▶ UP</span>}
              {log.length>0&&<span style={{fontSize:10,color:C.textSoft}}>→</span>}
            </div>
          );
        })
      )}
    </div>
  );
}

function LoginScreen({onLogin}){
  const [username,setUsername]=useState("");
  const [pin,setPin]=useState("");
  const [error,setError]=useState("");
  const [checking,setChecking]=useState(false);
  const handleSubmit=async()=>{
    const trimmed=username.toLowerCase().trim();
    if(trimmed.length<2){setError("Username must be at least 2 characters.");return;}
    if(pin.length<4){setError("PIN must be at least 4 digits.");return;}
    if(!/^\d+$/.test(pin)){setError("PIN must be numbers only.");return;}
    setChecking(true);setError("");
    const result=await validateUser(trimmed,pin);
    setChecking(false);
    if(!result.ok){setError("Incorrect PIN for that username.");return;}
    onLogin(storeUser(trimmed,pin));
  };
  return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:"24px",background:_palette.bg}}>
      <div style={{width:"100%",maxWidth:360}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{fontSize:40,marginBottom:8}}>⚾</div>
          <div style={{fontSize:24,fontWeight:800,color:C.green}}>Maddux.io</div>
          <div style={{fontSize:13,color:C.textSoft,marginTop:4,fontWeight:500}}>Set up your account to save game history</div>
        </div>
        <div style={{background:C.white,borderRadius:12,padding:"24px",border:`1.5px solid ${C.border}`}}>
          <div style={{marginBottom:16}}>
            <div style={{fontSize:11,fontWeight:700,color:C.textSoft,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:6}}>Username</div>
            <input value={username} onChange={e=>setUsername(e.target.value)} placeholder="e.g. danny"
              style={{width:"100%",padding:"10px 12px",border:"1.5px solid #d8d4ca",borderRadius:8,fontSize:14,fontFamily:"inherit",outline:"none",boxSizing:"border-box"}}/>
          </div>
          <div style={{marginBottom:20}}>
            <div style={{fontSize:11,fontWeight:700,color:C.textSoft,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:6}}>PIN (4+ digits)</div>
            <input value={pin} onChange={e=>setPin(e.target.value)} placeholder="e.g. 1234" type="password" inputMode="numeric"
              style={{width:"100%",padding:"10px 12px",border:"1.5px solid #d8d4ca",borderRadius:8,fontSize:14,fontFamily:"inherit",outline:"none",boxSizing:"border-box"}}/>
            <div style={{fontSize:11,color:C.textSoft,marginTop:5,fontWeight:500}}>Remember your PIN — it protects your history.</div>
          </div>
          {error&&<div style={{fontSize:12,color:"#b5451b",fontWeight:600,marginBottom:12}}>{error}</div>}
          <button onClick={handleSubmit} disabled={checking} style={{width:"100%",padding:"14px",background:C.green,color:"#fff",border:"none",borderRadius:10,fontSize:14,fontWeight:800,cursor:"pointer",fontFamily:"inherit",opacity:checking?0.6:1}}>
            {checking?"Checking...":"Get Started"}
          </button>
        </div>
        <div style={{textAlign:"center",marginTop:12,fontSize:11,color:C.textSoft,fontWeight:500}}>Same username + PIN on any device = same history</div>
      </div>
    </div>
  );
}

class StatsErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={error:null};}
  static getDerivedStateFromError(e){return{error:e};}
  render(){
    if(this.state.error){
      return(
        <div style={{padding:"24px 16px",textAlign:"center"}}>
          <div style={{fontSize:14,fontWeight:800,color:"#b5451b",marginBottom:8}}>Stats failed to load</div>
          <div style={{fontSize:12,color:C.textSoft,marginBottom:16}}>{String(this.state.error.message||this.state.error)}</div>
          <button onClick={()=>{this.setState({error:null});if(this.props.onBack) this.props.onBack();}}
            style={{padding:"10px 20px",background:C.green,color:"#fff",border:"none",borderRadius:8,fontFamily:"'Neuton','Nunito',serif",fontWeight:700,cursor:"pointer"}}>
            ← Go Back
          </button>
        </div>
      );
    }
    return this.props.children;
  }
}

function StatsTab({user,onBack}){
  const[allLog,setAllLog]=useState([]);
  const[loading,setLoading]=useState(true);
  const[view,setView]=useState("pitcher");
  const[selected,setSelected]=useState(null);
  const[search,setSearch]=useState("");
  const[sort,setSort]=useState("pitches");
  useEffect(()=>{loadAllPitchLog(user).then(d=>{setAllLog(d);setLoading(false);});},[user]);

  const pct=(n,d)=>d>0?Math.round((n/d)*100):0;
  const fmt=(n,d)=>`${pct(n,d)}% (${n}/${d})`;

  // Classify contact
  const isHard=(p)=>p.outcome_id==="hard"||p.contact_class==="hard";
  const isWeak=(p)=>p.outcome_id==="weak"||p.contact_class==="weak";

  const pitcherStats=useMemo(()=>{
    const map={};
    allLog.forEach(p=>{
      const k=p.pitcher_name||"Unknown";
      if(!map[k]) map[k]={name:k,n:0,outs:0,hits:0,walks:0,ks:0,hard:0,weak:0,counts:{},matchups:{}};
      map[k].n++;
      if(p.is_out) map[k].outs++;
      if(p.on_base&&p.outcome_id!=="walk") map[k].hits++;
      if(p.outcome_id==="walk"||p.outcome==="Walk") map[k].walks++;
      if(p.outcome_id==="look"||p.outcome_id==="swing") map[k].ks++;
      if(isHard(p)) map[k].hard++;
      if(isWeak(p)) map[k].weak++;
      map[k].counts[p.pitch_type]=(map[k].counts[p.pitch_type]||0)+1;
      // Handedness matchup
      const mkey=`${p.batter_hand||"?"}`;
      if(!map[k].matchups[mkey]) map[k].matchups[mkey]={n:0,outs:0,hits:0,ks:0,walks:0};
      map[k].matchups[mkey].n++;
      if(p.is_out) map[k].matchups[mkey].outs++;
      if(p.on_base&&p.outcome_id!=="walk") map[k].matchups[mkey].hits++;
      if(p.outcome_id==="look"||p.outcome_id==="swing") map[k].matchups[mkey].ks++;
      if(p.outcome_id==="walk"||p.outcome==="Walk") map[k].matchups[mkey].walks++;
    });
    return Object.values(map);
  },[allLog]);

  const batterStats=useMemo(()=>{
    const map={};
    allLog.forEach(p=>{
      const k=p.batter_name||"";if(!k.trim()) return;
      if(!map[k]) map[k]={name:k,n:0,outs:0,hits:0,walks:0,ks:0,hard:0,weak:0,pr:{}};
      map[k].n++;
      if(p.is_out) map[k].outs++;
      if(p.on_base&&p.outcome_id!=="walk") map[k].hits++;
      if(p.outcome_id==="walk"||p.outcome==="Walk") map[k].walks++;
      if(p.outcome_id==="look"||p.outcome_id==="swing") map[k].ks++;
      if(isHard(p)) map[k].hard++;
      if(isWeak(p)) map[k].weak++;
      const pk=p.pitch_type;
      if(!map[k].pr[pk]) map[k].pr[pk]={n:0,outs:0,hits:0,ks:0,hard:0,weak:0};
      map[k].pr[pk].n++;
      if(p.is_out) map[k].pr[pk].outs++;
      if(p.on_base&&p.outcome_id!=="walk") map[k].pr[pk].hits++;
      if(p.outcome_id==="look"||p.outcome_id==="swing") map[k].pr[pk].ks++;
      if(isHard(p)) map[k].pr[pk].hard++;
      if(isWeak(p)) map[k].pr[pk].weak++;
    });
    return Object.values(map);
  },[allLog]);

  const countStats=useMemo(()=>{
    const map={};
    allLog.forEach(p=>{
      const k=`${p.balls||0}-${p.strikes||0}`;
      if(!map[k]) map[k]={count:k,n:0,outs:0,hits:0,ks:0,walks:0,hard:0,weak:0};
      map[k].n++;
      if(p.is_out) map[k].outs++;
      if(p.on_base&&p.outcome_id!=="walk") map[k].hits++;
      if(p.outcome_id==="look"||p.outcome_id==="swing") map[k].ks++;
      if(p.outcome_id==="walk"||p.outcome==="Walk") map[k].walks++;
      if(isHard(p)) map[k].hard++;
      if(isWeak(p)) map[k].weak++;
    });
    const order=["0-0","0-1","0-2","1-0","1-1","1-2","2-0","2-1","2-2","3-0","3-1","3-2"];
    return order.filter(k=>map[k]).map(k=>map[k]);
  },[allLog]);

  const matchupStats=useMemo(()=>{
    const map={"R-R":{label:"R/R",n:0,outs:0,hits:0,ks:0,walks:0,hard:0,weak:0},
               "R-L":{label:"R/L",n:0,outs:0,hits:0,ks:0,walks:0,hard:0,weak:0},
               "L-R":{label:"L/R",n:0,outs:0,hits:0,ks:0,walks:0,hard:0,weak:0},
               "L-L":{label:"L/L",n:0,outs:0,hits:0,ks:0,walks:0,hard:0,weak:0}};
    allLog.forEach(p=>{
      // We need pitcher hand -- stored on game level not pitch level
      // Use batter_hand only for now, aggregate by batter hand
      const bh=p.batter_hand||"R";
      ["R","L"].forEach(ph=>{
        // Can't determine pitcher hand from pitch_log alone; skip pitcher hand for now
      });
      // Aggregate by batter hand (R vs L)
      const k=`?-${bh}`;
    });
    // Aggregate by batter hand since pitcher hand isn't in pitch_log
    const bmap={"R":{label:"vs RHB",n:0,outs:0,hits:0,ks:0,walks:0,hard:0,weak:0},
                "L":{label:"vs LHB",n:0,outs:0,hits:0,ks:0,walks:0,hard:0,weak:0}};
    allLog.forEach(p=>{
      const bh=p.batter_hand||"R";
      const hand=bh==="L"?"L":"R";
      bmap[hand].n++;
      if(p.is_out) bmap[hand].outs++;
      if(p.on_base&&p.outcome_id!=="walk") bmap[hand].hits++;
      if(p.outcome_id==="look"||p.outcome_id==="swing") bmap[hand].ks++;
      if(p.outcome_id==="walk"||p.outcome==="Walk") bmap[hand].walks++;
      if(isHard(p)) bmap[hand].hard++;
      if(isWeak(p)) bmap[hand].weak++;
    });
    return Object.values(bmap).filter(m=>m.n>0);
  },[allLog]);

  const zoneStats=useMemo(()=>{
    const map={};
    allLog.forEach(p=>{
      if(!p.zone) return;
      if(!map[p.zone]) map[p.zone]={n:0,outs:0,hits:0,hard:0,weak:0};
      map[p.zone].n++;
      if(p.is_out) map[p.zone].outs++;
      if(p.on_base) map[p.zone].hits++;
      if(isHard(p)) map[p.zone].hard++;
      if(isWeak(p)) map[p.zone].weak++;
    });
    return map;
  },[allLog]);

  const VIEWS=[{id:"pitcher",label:"Pitcher"},{id:"batter",label:"Batters"},{id:"count",label:"Counts"},{id:"matchup",label:"Matchups"},{id:"zone",label:"Zones"}];

  // Early returns after all hooks
  if(loading) return(<div style={{padding:"16px"}}><button onClick={onBack} style={{...S.ghostBtn,padding:"4px 10px",marginBottom:16}}>← Back</button><div style={S.emptyState}>Loading...</div></div>);
  if(allLog.length===0) return(<div style={{padding:"16px"}}><button onClick={onBack} style={{...S.ghostBtn,padding:"4px 10px",marginBottom:16}}>← Back</button><div style={S.emptyState}>No data yet. Save some games first.</div></div>);

  const SORT_OPTS={
    pitches:{label:"Pitches",fn:(a,b)=>b.n-a.n},
    outs:{label:"Out%",fn:(a,b)=>pct(b.outs,b.n)-pct(a.outs,a.n)},
    obp:{label:"OBP",fn:(a,b)=>pct(b.hits,b.n)-pct(a.hits,a.n)},
    k:{label:"K%",fn:(a,b)=>pct(b.ks,b.n)-pct(a.ks,a.n)},
    bb:{label:"BB%",fn:(a,b)=>pct(b.walks,b.n)-pct(a.walks,a.n)},
    hard:{label:"Hard%",fn:(a,b)=>pct(b.hard,b.n)-pct(a.hard,a.n)},
    weak:{label:"Weak%",fn:(a,b)=>pct(b.weak,b.n)-pct(a.weak,a.n)},
  };

  const statRow=(label,n,total,color)=>(
    <div style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:`1px solid ${C.border}`}}>
      <span style={{fontSize:11,color:C.textSoft,fontWeight:600}}>{label}</span>
      <span style={{fontSize:11,fontWeight:800,color:color||C.text}}>{pct(n,total)}% <span style={{color:C.textSoft,fontWeight:500}}>({n}/{total})</span></span>
    </div>
  );

  const filteredPitchers=pitcherStats.filter(p=>p.name.toLowerCase().includes(search.toLowerCase())).sort(SORT_OPTS[sort]?.fn||(()=>0));
  const filteredBatters=batterStats.filter(b=>b.name.toLowerCase().includes(search.toLowerCase())).sort(SORT_OPTS[sort]?.fn||(()=>0));

  const sortBar=(
    <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:10}}>
      {Object.entries(SORT_OPTS).map(([k,v])=>(
        <button key={k} onClick={()=>setSort(k)} style={{
          padding:"3px 8px",borderRadius:6,fontSize:10,fontWeight:700,fontFamily:"'Neuton','Nunito',serif",
          background:sort===k?C.green:C.surface,color:sort===k?"#fff":C.textMid,
          border:`1px solid ${sort===k?C.green:C.border}`,cursor:"pointer",
        }}>{v.label}</button>
      ))}
    </div>
  );

  const searchBar=(
    <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search by name..."
      style={{...S.input,width:"100%",boxSizing:"border-box",marginBottom:8}}/>
  );

  return(
    <div style={{padding:"0"}}>
      <div style={{display:"flex",alignItems:"center",gap:8,padding:"12px 16px",background:C.white,borderBottom:`1.5px solid ${C.border}`}}>
        <button onClick={onBack} style={{...S.ghostBtn,padding:"4px 10px",fontSize:11}}>← Back</button>
        <div style={{fontSize:14,fontWeight:800,color:C.text}}>Stats</div>
      </div>
      <div style={{display:"flex",borderBottom:`1.5px solid ${C.border}`,background:C.white,overflowX:"auto"}}>
        {VIEWS.map(v=>(
          <button key={v.id} onClick={()=>{setView(v.id);setSelected(null);setSearch("");}} style={{
            flex:"0 0 auto",padding:"10px 12px",fontSize:11,fontWeight:700,fontFamily:"'Neuton','Nunito',serif",
            background:"none",border:"none",borderBottom:`2px solid ${view===v.id?C.greenMid:"transparent"}`,
            color:view===v.id?C.green:C.textSoft,cursor:"pointer",whiteSpace:"nowrap",
          }}>{v.label}</button>
        ))}
      </div>

      <div style={{padding:"16px"}}>

        {/* ── Pitcher ── */}
        {view==="pitcher"&&!selected&&(<>
          {searchBar}{sortBar}
          <div style={S.sectionLabel}>Pitchers ({filteredPitchers.length})</div>
          {filteredPitchers.map(p=>(
            <div key={p.name} onClick={()=>setSelected(p)} style={{background:C.white,border:`1.5px solid ${C.border}`,borderRadius:10,padding:"12px 14px",marginBottom:8,cursor:"pointer"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                <div style={{fontSize:13,fontWeight:800,color:C.text}}>{p.name}</div>
                <div style={{fontSize:11,color:C.textSoft}}>{p.n} pitches</div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:4}}>
                {[["Out%",pct(p.outs,p.n)],["K%",pct(p.ks,p.n)],["BB%",pct(p.walks,p.n)],["OBP",pct(p.hits,p.n)],["Hard%",pct(p.hard,p.n)],["Weak%",pct(p.weak,p.n)]].map(([lbl,val])=>(
                  <div key={lbl} style={{textAlign:"center"}}>
                    <div style={{fontSize:12,fontWeight:800,color:C.green}}>{val}%</div>
                    <div style={{fontSize:8,color:C.textSoft,fontWeight:700}}>{lbl}</div>
                  </div>
                ))}
              </div>
            </div>
          ))}
        </>)}
        {view==="pitcher"&&selected&&(<>
          <button onClick={()=>setSelected(null)} style={{...S.ghostBtn,padding:"4px 10px",marginBottom:12}}>← Back</button>
          <div style={{fontSize:14,fontWeight:800,color:C.text,marginBottom:4}}>{selected.name}</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:16}}>
            {[["Pitches",selected.n,null],["Out%",pct(selected.outs,selected.n),C.green],["OBP",pct(selected.hits,selected.n),C.warn],["K%",pct(selected.ks,selected.n),C.green],["BB%",pct(selected.walks,selected.n),C.warn],["Hard%",pct(selected.hard,selected.n),C.warn],["Weak%",pct(selected.weak,selected.n),C.green]].map(([lbl,val,col])=>(
              <div key={lbl} style={{background:C.white,border:`1.5px solid ${C.border}`,borderRadius:8,padding:"10px",textAlign:"center"}}>
                <div style={{fontSize:16,fontWeight:800,color:col||C.text}}>{typeof val==="number"&&lbl!=="Pitches"?`${val}%`:val}</div>
                <div style={{fontSize:9,color:C.textSoft,fontWeight:700}}>{lbl}</div>
              </div>
            ))}
          </div>
          <div style={S.sectionLabel}>Pitch Usage</div>
          <div style={{...S.card,marginBottom:16}}>
            {Object.entries(selected.counts).sort((a,b)=>b[1]-a[1]).map(([type,count])=>(
              <div key={type} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 0",borderBottom:`1px solid ${C.border}`}}>
                <span style={{flex:1,fontSize:12,fontWeight:700,color:C.text}}>{type}</span>
                <span style={{fontSize:10,color:C.textSoft,width:28,textAlign:"right"}}>{count}x</span>
                <div style={{width:50,height:5,background:C.surface,borderRadius:3,overflow:"hidden"}}>
                  <div style={{width:`${pct(count,selected.n)}%`,height:"100%",background:C.green,borderRadius:3}}/>
                </div>
                <span style={{fontSize:11,fontWeight:700,color:C.textMid,width:32,textAlign:"right"}}>{pct(count,selected.n)}%</span>
              </div>
            ))}
          </div>
          <div style={S.sectionLabel}>By Batter Hand</div>
          <div style={S.card}>
            {Object.entries(selected.matchups).map(([hand,m])=>(
              <div key={hand} style={{padding:"8px 0",borderBottom:`1px solid ${C.border}`}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                  <span style={{fontSize:12,fontWeight:800,color:C.text}}>vs {hand}HB</span>
                  <span style={{fontSize:10,color:C.textSoft}}>{m.n} pitches</span>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:2}}>
                  {[["Out%",pct(m.outs,m.n)],["K%",pct(m.ks,m.n)],["BB%",pct(m.walks,m.n)],["OBP",pct(m.hits,m.n)],["K+W%",pct(m.ks+m.walks,m.n)]].map(([lbl,val])=>(
                    <div key={lbl} style={{textAlign:"center"}}>
                      <div style={{fontSize:11,fontWeight:800,color:C.green}}>{val}%</div>
                      <div style={{fontSize:8,color:C.textSoft,fontWeight:700}}>{lbl}</div>
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>
        </>)}

        {/* ── Batters ── */}
        {view==="batter"&&!selected&&(<>
          {searchBar}{sortBar}
          <div style={S.sectionLabel}>Batters ({filteredBatters.length})</div>
          {filteredBatters.map(b=>(
            <div key={b.name} onClick={()=>setSelected(b)} style={{background:C.white,border:`1.5px solid ${C.border}`,borderRadius:10,padding:"12px 14px",marginBottom:8,cursor:"pointer"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                <div style={{fontSize:13,fontWeight:800,color:C.text}}>{b.name}</div>
                <div style={{fontSize:11,color:C.textSoft}}>{b.n} PA</div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:4}}>
                {[["Out%",pct(b.outs,b.n)],["K%",pct(b.ks,b.n)],["BB%",pct(b.walks,b.n)],["OBP",pct(b.hits,b.n)],["Hard%",pct(b.hard,b.n)],["Weak%",pct(b.weak,b.n)]].map(([lbl,val])=>(
                  <div key={lbl} style={{textAlign:"center"}}>
                    <div style={{fontSize:12,fontWeight:800,color:lbl==="OBP"||lbl==="Hard%"?C.warn:C.green}}>{val}%</div>
                    <div style={{fontSize:8,color:C.textSoft,fontWeight:700}}>{lbl}</div>
                  </div>
                ))}
              </div>
            </div>
          ))}
        </>)}
        {view==="batter"&&selected&&(<>
          <button onClick={()=>setSelected(null)} style={{...S.ghostBtn,padding:"4px 10px",marginBottom:12}}>← Back</button>
          <div style={{fontSize:14,fontWeight:800,color:C.text,marginBottom:4}}>{selected.name}</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:16}}>
            {[["PA",selected.n,null],["Out%",pct(selected.outs,selected.n),C.green],["OBP",pct(selected.hits,selected.n),C.warn],["K%",pct(selected.ks,selected.n),C.green],["BB%",pct(selected.walks,selected.n),C.warn],["Hard%",pct(selected.hard,selected.n),C.warn],["Weak%",pct(selected.weak,selected.n),C.green]].map(([lbl,val,col])=>(
              <div key={lbl} style={{background:C.white,border:`1.5px solid ${C.border}`,borderRadius:8,padding:"10px",textAlign:"center"}}>
                <div style={{fontSize:16,fontWeight:800,color:col||C.text}}>{typeof val==="number"&&lbl!=="PA"?`${val}%`:val}</div>
                <div style={{fontSize:9,color:C.textSoft,fontWeight:700}}>{lbl}</div>
              </div>
            ))}
          </div>
          <div style={S.sectionLabel}>By Pitch Type</div>
          <div style={S.card}>
            {Object.entries(selected.pr).sort((a,b)=>b[1].n-a[1].n).map(([type,res])=>(
              <div key={type} style={{padding:"8px 0",borderBottom:`1px solid ${C.border}`}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                  <span style={{fontSize:12,fontWeight:700,color:C.text}}>{type}</span>
                  <span style={{fontSize:10,color:C.textSoft}}>{res.n}x</span>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:2}}>
                  {[["Out%",pct(res.outs,res.n)],["K%",pct(res.ks,res.n)],["OBP",pct(res.hits,res.n)],["Hard%",pct(res.hard,res.n)],["Weak%",pct(res.weak,res.n)]].map(([lbl,val])=>(
                    <div key={lbl} style={{textAlign:"center"}}>
                      <div style={{fontSize:11,fontWeight:800,color:lbl==="OBP"||lbl==="Hard%"?C.warn:C.green}}>{val}%</div>
                      <div style={{fontSize:8,color:C.textSoft,fontWeight:700}}>{lbl}</div>
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>
        </>)}

        {/* ── Counts ── */}
        {view==="count"&&(<>
          <div style={S.sectionLabel}>By Count</div>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:11,fontFamily:"'Neuton','Nunito',serif"}}>
              <thead>
                <tr style={{background:C.surface}}>
                  {["Count","N","Out%","K%","BB%","OBP","Hard%","Weak%"].map(h=>(
                    <th key={h} style={{padding:"6px 4px",textAlign:"right",fontWeight:700,color:C.textSoft,fontSize:9,textTransform:"uppercase",whiteSpace:"nowrap"}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {countStats.map((c,i)=>(
                  <tr key={c.count} style={{background:i%2===0?C.white:C.surface}}>
                    <td style={{padding:"7px 4px",fontWeight:800,color:C.text,textAlign:"left"}}>{c.count}</td>
                    <td style={{padding:"7px 4px",color:C.textSoft,textAlign:"right"}}>{c.n}</td>
                    <td style={{padding:"7px 4px",fontWeight:700,color:C.green,textAlign:"right"}}>{pct(c.outs,c.n)}%</td>
                    <td style={{padding:"7px 4px",fontWeight:700,color:C.green,textAlign:"right"}}>{pct(c.ks,c.n)}%</td>
                    <td style={{padding:"7px 4px",fontWeight:700,color:C.warn,textAlign:"right"}}>{pct(c.walks,c.n)}%</td>
                    <td style={{padding:"7px 4px",fontWeight:700,color:c.hits/c.n>0.3?C.warn:C.textMid,textAlign:"right"}}>{pct(c.hits,c.n)}%</td>
                    <td style={{padding:"7px 4px",fontWeight:700,color:c.hard/c.n>0.3?C.warn:C.textMid,textAlign:"right"}}>{pct(c.hard,c.n)}%</td>
                    <td style={{padding:"7px 4px",fontWeight:700,color:C.textMid,textAlign:"right"}}>{pct(c.weak,c.n)}%</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </>)}

        {/* ── Matchups ── */}
        {view==="matchup"&&(<>
          <div style={S.sectionLabel}>By Batter Handedness</div>
          {matchupStats.map(m=>(
            <div key={m.label} style={{background:C.white,border:`1.5px solid ${C.border}`,borderRadius:10,padding:"12px 14px",marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                <div style={{fontSize:14,fontWeight:800,color:C.text}}>{m.label}</div>
                <div style={{fontSize:11,color:C.textSoft}}>{m.n} pitches</div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
                {[["Out%",pct(m.outs,m.n),C.green],["K%",pct(m.ks,m.n),C.green],["BB%",pct(m.walks,m.n),C.warn],["OBP",pct(m.hits,m.n),C.warn],["Hard%",pct(m.hard,m.n),C.warn],["Weak%",pct(m.weak,m.n),C.green]].map(([lbl,val,col])=>(
                  <div key={lbl} style={{background:C.surface,borderRadius:8,padding:"8px",textAlign:"center"}}>
                    <div style={{fontSize:15,fontWeight:800,color:col}}>{val}%</div>
                    <div style={{fontSize:9,color:C.textSoft,fontWeight:700}}>{lbl}</div>
                  </div>
                ))}
              </div>
            </div>
          ))}
          <div style={{fontSize:10,color:C.textSoft,marginTop:8,fontWeight:500}}>
            Note: pitcher handedness is not stored per-pitch. Full R/R, R/L etc. breakdowns will appear in a future update once pitcher hand is saved to the pitch log.
          </div>
        </>)}

        {/* ── Zones ── */}
        {view==="zone"&&(<>
          <div style={S.sectionLabel}>Zone Effectiveness</div>
          <div style={S.card}>
            <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:3}}>
              {Array.from({length:25},(_,idx)=>{
                const row=Math.floor(idx/5),col=idx%5,id=`${row}-${col}`;
                const z=zoneStats[id],inZ=row>=1&&row<=3&&col>=1&&col<=3;
                const outPct=z?pct(z.outs,z.n):0;
                const hitPct=z?pct(z.hits,z.n):0;
                const intensity=outPct/100;
                return(<div key={id} style={{
                  height:46,borderRadius:5,
                  background:z?`rgba(45,106,79,${0.1+intensity*0.85})`:inZ?C.white:C.surface,
                  border:`1.5px solid ${C.border}`,display:"flex",flexDirection:"column",
                  alignItems:"center",justifyContent:"center"}}>
                  {z&&<>
                    <span style={{color:intensity>0.5?"#fff":C.green,fontSize:11,fontWeight:800}}>{outPct}%</span>
                    <span style={{color:intensity>0.5?"rgba(255,255,255,0.7)":C.textSoft,fontSize:8}}>{z.n}p</span>
                  </>}
                </div>);
              })}
            </div>
          </div>
        </>)}

      </div>
    </div>
  );
}

function OpponentScout({pct}){
  const[oppQuery,setOppQuery]=useState("");
  const[pitcherQuery,setPitcherQuery]=useState("");
  const[results,setResults]=useState(null);
  const[searching,setSearching]=useState(false);
  const[error,setError]=useState(null);

  const search=async()=>{
    if(!oppQuery.trim()&&!pitcherQuery.trim()) return;
    setSearching(true);setError(null);setResults(null);
    try{
      // Find game IDs matching the opponent criteria
      let gamesQuery=sb.from("games").select("id,opponent_username,opponent_pitcher,username");
      if(oppQuery.trim()) gamesQuery=gamesQuery.ilike("opponent_username",`%${oppQuery.trim()}%`);
      if(pitcherQuery.trim()) gamesQuery=gamesQuery.ilike("opponent_pitcher",`%${pitcherQuery.trim()}%`);
      const{data:games,error:ge}=await gamesQuery.limit(200);
      if(ge){setError(ge.message);setSearching(false);return;}
      if(!games||games.length===0){setResults({games:[],pitches:[]});setSearching(false);return;}
      const gameIds=games.map(g=>g.id);
      // Fetch all pitch_log rows for those games
      const{data:pitches,error:pe}=await sb.from("pitch_log")
        .select("pitch_type,outcome_id,is_out,on_base,contact_class,zone,balls,strikes,batter_name")
        .in("game_id",gameIds)
        .limit(10000);
      if(pe){setError(pe.message);setSearching(false);return;}
      setResults({games,pitches:pitches||[]});
    }catch(e){setError(String(e));}
    setSearching(false);
  };

  // Aggregate pitch tendencies
  const pitchAgg=useMemo(()=>{
    if(!results?.pitches?.length) return[];
    const map={};
    results.pitches.forEach(p=>{
      const k=p.pitch_type||"Unknown";
      if(!map[k]) map[k]={type:k,n:0,outs:0,ks:0,hits:0};
      map[k].n++;
      if(p.is_out) map[k].outs++;
      if(p.outcome_id==="look"||p.outcome_id==="swing") map[k].ks++;
      if(p.on_base) map[k].hits++;
    });
    return Object.values(map).sort((a,b)=>b.n-a.n);
  },[results]);

  const reportedGames=results?.games||[];
  const uniqueUsers=[...new Set(reportedGames.map(g=>g.username))];

  return(
    <div>
      <div style={{fontSize:11,color:C.textSoft,marginBottom:12,fontWeight:500,lineHeight:1.5}}>
        Search by your opponent's username or the pitcher they used. Results are pooled from all Maddux.io users who've faced the same opponent.
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:10}}>
        <input value={oppQuery} onChange={e=>setOppQuery(e.target.value)}
          placeholder="Opponent username (partial ok)"
          style={{...S.input,width:"100%",boxSizing:"border-box"}}/>
        <input value={pitcherQuery} onChange={e=>setPitcherQuery(e.target.value)}
          placeholder="Pitcher they used (partial ok)"
          style={{...S.input,width:"100%",boxSizing:"border-box"}}/>
        <button onClick={search} disabled={searching||(!oppQuery.trim()&&!pitcherQuery.trim())} style={{...S.primaryBtn,opacity:searching?0.6:1}}>
          {searching?"Searching...":"Search Opponent"}
        </button>
      </div>
      {error&&<div style={{fontSize:11,color:C.warn,marginBottom:8}}>{error}</div>}
      {results&&results.pitches.length===0&&(
        <div style={{fontSize:12,color:C.textSoft,padding:"12px 0",fontWeight:500}}>
          No games found matching that opponent. Data builds up as more users log games against the same opponents.
        </div>
      )}
      {results&&results.pitches.length>0&&(<>
        <div style={{fontSize:11,color:C.textSoft,marginBottom:10,fontWeight:500}}>
          {results.pitches.length} pitches across {reportedGames.length} games · reported by {uniqueUsers.length} user{uniqueUsers.length!==1?"s":""} · data is anonymous
        </div>
        <div style={S.sectionLabel}>What works against this opponent</div>
        {pitchAgg.map(p=>(
          <div key={p.type} style={{background:C.white,border:`1.5px solid ${C.border}`,borderRadius:9,padding:"10px 14px",marginBottom:6}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
              <div style={{fontSize:13,fontWeight:800,color:C.text}}>{p.type}</div>
              <div style={{fontSize:11,color:C.textSoft}}>{p.n} thrown</div>
            </div>
            <div style={{display:"flex",gap:16}}>
              {[["K%",pct(p.ks,p.n)],["Out%",pct(p.outs,p.n)],["OBP",pct(p.hits,p.n)]].map(([lbl,val])=>(
                <div key={lbl} style={{textAlign:"center"}}>
                  <div style={{fontSize:14,fontWeight:800,color:lbl==="OBP"?C.warn:C.green}}>{val}%</div>
                  <div style={{fontSize:9,color:C.textSoft,fontWeight:700}}>{lbl}</div>
                </div>
              ))}
            </div>
          </div>
        ))}
      </>)}
    </div>
  );
}


function SettingsTab({paletteKey,onPaletteChange,temperature,onTempChange}){
  const tempLabels=[
    [0.3,"Very Predictable","Always recommends the highest-scored pitch"],
    [0.75,"Balanced","Occasionally surfaces #2 or #3 pitch"],
    [1.25,"Varied","Frequently mixes in lower-ranked pitches"],
    [2.0,"Wild","Anything goes -- keeps opponents totally guessing"],
  ];
  const closestLabel=tempLabels.reduce((a,b)=>Math.abs(b[0]-temperature)<Math.abs(a[0]-temperature)?b:a);
  return(
    <div style={{padding:"16px"}}>
      <div style={{fontSize:14,fontWeight:800,color:C.text,marginBottom:4}}>Settings</div>

      <div style={{marginBottom:24}}>
        <div style={S.sectionLabel}>Recommendation Variety</div>
        <div style={{fontSize:11,color:C.textSoft,marginBottom:10,fontWeight:500}}>
          Controls how often the app suggests a lower-ranked pitch instead of always picking the top scorer. Low temperature = always the best option. High temperature = more unpredictable.
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          {tempLabels.map(([val,lbl,desc])=>(
            <button key={val} onClick={()=>onTempChange(val)} style={{
              padding:"10px 14px",borderRadius:9,fontFamily:"'Neuton','Nunito',serif",
              border:`1.5px solid ${temperature===val?C.greenMid:C.border}`,
              background:temperature===val?C.greenDim:C.white,
              cursor:"pointer",textAlign:"left",
            }}>
              <div style={{fontSize:12,fontWeight:800,color:temperature===val?C.green:C.text}}>{lbl}</div>
              <div style={{fontSize:10,color:C.textSoft,marginTop:2}}>{desc}</div>
            </button>
          ))}
        </div>
      </div>

      <div style={S.sectionLabel}>Color Theme</div>
      <div style={{fontSize:11,color:C.textSoft,marginBottom:10,fontWeight:500}}>Choose a color theme for the app.</div>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {Object.entries(PALETTES).map(([key,pal])=>{
          const active=paletteKey===key;
          return(
            <button key={key} onClick={()=>onPaletteChange(key)} style={{
              display:"flex",alignItems:"center",gap:12,padding:"12px 14px",
              background:pal.white,border:`2px solid ${active?pal.primary:pal.border}`,
              borderRadius:10,cursor:"pointer",fontFamily:"'Neuton','Nunito',serif",textAlign:"left",
              boxShadow:active?`0 0 0 3px ${pal.primaryLight}`:"none",
            }}>
              <div style={{display:"flex",gap:4,flexShrink:0}}>
                <div style={{width:20,height:20,borderRadius:"50%",background:pal.header}}/>
                <div style={{width:20,height:20,borderRadius:"50%",background:pal.primary}}/>
                <div style={{width:20,height:20,borderRadius:"50%",background:pal.bg,border:`1px solid ${pal.border}`}}/>
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:800,color:pal.text}}>{pal.name}</div>
              </div>
              {active&&<div style={{fontSize:12,color:pal.primary,fontWeight:800}}>✓ Active</div>}
            </button>
          );
        })}
      </div>
      <div style={{marginTop:20,fontSize:10,color:C.textSoft,fontWeight:500}}>
        Theme change takes effect immediately. Reload the page if colors look off.
      </div>
    </div>
  );
}

function HistoryTab({user}){
  const [games,setGames]=useState([]);
  const [loading,setLoading]=useState(true);
  const [selected,setSelected]=useState(null);
  const [deleting,setDeleting]=useState(null);
  const [clearConfirm,setClearConfirm]=useState(false);
  const [clearing,setClearing]=useState(false);

  const reload=()=>{setLoading(true);loadGames(user,50).then(g=>{setGames(g);setLoading(false);});};
  useEffect(()=>{reload();},[user]);

  const handleDelete=async(gameId)=>{
    setDeleting(gameId);
    await deleteGame(gameId);
    setDeleting(null);setSelected(null);reload();
  };

  const handleClearAll=async()=>{
    setClearing(true);
    await deleteAllGames(user);
    setClearing(false);setClearConfirm(false);setGames([]);
  };

  if(selected){
    const g=games.find(x=>x.id===selected);if(!g) return null;
    const log=g.game_log||[];
    return(<div style={{padding:"16px"}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
        <button onClick={()=>setSelected(null)} style={{...S.ghostBtn,padding:"4px 10px"}}>← Back</button>
        <div><div style={{fontSize:14,fontWeight:800,color:C.text}}>{g.pitcher_name}</div>
          <div style={{fontSize:11,color:C.textSoft}}>{new Date(g.created_at).toLocaleDateString()} · {g.my_score}–{g.opp_score} · {g.total_pitches}p</div></div>
      </div>
      <button onClick={()=>handleDelete(g.id)} disabled={deleting===g.id} style={{...S.ghostBtn,color:C.warn,borderColor:C.warn,marginBottom:12,opacity:deleting===g.id?0.5:1}}>
        {deleting===g.id?"Deleting...":"🗑 Delete Game"}
      </button>
      <div style={S.sectionLabel}>Pitch Log</div>
      {log.length===0?<div style={S.emptyState}>No pitches.</div>:(
        [...log].reverse().map((e,i)=>{
          const dot=e.isOut?C.green:e.onBase?C.warn:C.textSoft;
          return(<div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",
            background:C.white,border:`1.5px solid ${C.border}`,borderRadius:8,marginBottom:4}}>
            <div style={{width:7,height:7,borderRadius:"50%",background:dot,flexShrink:0}}/>
            <span style={{flex:1,fontSize:12,fontWeight:700,color:C.text}}>{e.pitch}</span>
            {e.batter&&<span style={{fontSize:10,color:C.textSoft}}>{e.batter.split(" ").pop()}</span>}
            <span style={{fontSize:10,color:C.textSoft,marginRight:4}}>{e.zone||"--"}</span>
            <span style={{fontSize:10,fontWeight:700,color:dot,textAlign:"right",maxWidth:120}}>{e.outcome}</span>
          </div>);
        })
      )}
    </div>);
  }

  return(<div style={{padding:"16px"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
      <div style={S.sectionLabel}>Game History</div>
      <button onClick={()=>setClearConfirm(true)} style={{...S.ghostBtn,color:C.warn,borderColor:C.warn,fontSize:10,padding:"3px 8px"}}>Clear All</button>
    </div>
    {clearConfirm&&(
      <div style={{background:C.warnLight,border:`1.5px solid ${C.warn}`,borderRadius:8,padding:"12px",marginBottom:12}}>
        <div style={{fontSize:12,fontWeight:700,color:C.warn,marginBottom:8}}>Delete all {games.length} games? Cannot be undone.</div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={handleClearAll} disabled={clearing} style={{...S.ghostBtn,color:C.warn,borderColor:C.warn,opacity:clearing?0.5:1}}>{clearing?"Clearing...":"Yes, delete all"}</button>
          <button onClick={()=>setClearConfirm(false)} style={S.ghostBtn}>Cancel</button>
        </div>
      </div>
    )}
    {loading?<div style={S.emptyState}>Loading...</div>:games.length===0?
      <div style={S.emptyState}>No games saved yet.</div>:
      games.map(g=>(<div key={g.id} onClick={()=>setSelected(g.id)} style={{background:C.white,
        border:`1.5px solid ${C.border}`,borderRadius:10,padding:"12px 14px",marginBottom:8,cursor:"pointer"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div><div style={{fontSize:13,fontWeight:800,color:C.text}}>{g.pitcher_name}</div>
            <div style={{fontSize:11,color:C.textSoft,marginTop:2}}>{new Date(g.created_at).toLocaleDateString()} · Inn {g.innings}</div></div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:16,fontWeight:800,color:C.green}}>{g.my_score}–{g.opp_score}</div>
            <div style={{fontSize:10,color:C.textSoft}}>{g.total_pitches} pitches</div>
          </div>
        </div>
      </div>))
    }
  </div>);
}


function App(){
  const [tab,setTab]=useState("setup");
  const [showInstructions,setShowInstructions]=useState(false);
  const [session,setSession]=useState(null);
  const [paletteKey,setPaletteKey]=useState(()=>localStorage.getItem('maddux_palette')||'green');
  const [temperature,setTemperature]=useState(()=>parseFloat(localStorage.getItem('maddux_temp')||'0.75'));
  const handlePaletteChange=(key)=>{setPalette(key);setPaletteKey(key);};
  const handleTempChange=(val)=>{setTemperature(val);localStorage.setItem('maddux_temp',String(val));};
  const [showScorePrompt,setShowScorePrompt]=useState(false);
  const [scoreInput,setScoreInput]=useState({my:0,opp:0});
  const [showGameOver,setShowGameOver]=useState(false);
  const [saving,setSaving]=useState(false);
  const [savedId,setSavedId]=useState(null);
  const [user,setUser]=useState(()=>getStoredUser());

  const handleSetup=useCallback((config)=>{
    setSession({...config,sequence:[],outcomes:{},gameLog:[],batterIdx:0,
      outs:0,inning:1,myScore:0,oppScore:0,inningLog:[],bases:{first:null,second:null,third:null},
      balls:0,strikes:0,undoStack:[]});
    setTab("atbat");setSavedId(null);setShowGameOver(false);
  },[]);
  const handleLogPitch=useCallback((entry)=>{
    setSession(prev=>{
      const no={...prev.outcomes};
      if(entry.isPositive){no[entry.pitch]=(no[entry.pitch]||0)+3;
        if(prev.sequence.length>0){const p2=prev.sequence[prev.sequence.length-1].pitch;no[p2]=(no[p2]||0)+1;}}
      const snapshot={sequence:prev.sequence,gameLog:prev.gameLog,outcomes:{...prev.outcomes},
        batterIdx:prev.batterIdx,outs:prev.outs,bases:prev.bases,balls:prev.balls,strikes:prev.strikes,
        myScore:prev.myScore,oppScore:prev.oppScore,inning:prev.inning};
      return{...prev,sequence:[...prev.sequence,entry],gameLog:[...prev.gameLog,entry],outcomes:no,
        undoStack:[...(prev.undoStack||[]),snapshot]};
    });
  },[]);
  const handleAddOut=useCallback(()=>{
    setSession(prev=>{
      const snapshot={sequence:prev.sequence,gameLog:prev.gameLog,outcomes:{...prev.outcomes},
        batterIdx:prev.batterIdx,outs:prev.outs,bases:prev.bases,balls:prev.balls,strikes:prev.strikes,
        myScore:prev.myScore,oppScore:prev.oppScore,inning:prev.inning};
      const n=prev.outs+1;
      if(n>=3){
        const newInning=prev.inning+1;
        setShowScorePrompt(true);setScoreInput({my:0,opp:0});
        // Check if game should be over after this inning flip
        const total=prev.totalInnings||9;
        // Game over if we've completed all innings AND score is NOT tied
        // We check after score submit so just flag it here -- score submit will trigger check
        return{...prev,outs:0,inning:newInning,bases:{first:null,second:null,third:null},balls:0,strikes:0,
          undoStack:[...(prev.undoStack||[]),snapshot],_checkGameOver:newInning>total};
      }
      return{...prev,outs:n,undoStack:[...(prev.undoStack||[]),snapshot]};
    });
  },[]);
  const handleScoreSubmit=useCallback(()=>{
    setSession(prev=>{
      const newMy=prev.myScore+scoreInput.my;
      const newOpp=prev.oppScore+scoreInput.opp;
      const updated={...prev,myScore:newMy,oppScore:newOpp,
        inningLog:[...prev.inningLog,{inning:prev.inning-1,my:scoreInput.my,opp:scoreInput.opp}]};
      // If game over flag set and scores are not tied, show game over prompt
      if(prev._checkGameOver&&newMy!==newOpp){
        setShowGameOver(true);
      }
      return{...updated,_checkGameOver:false};
    });
    setShowScorePrompt(false);
  },[scoreInput]);
  const handleNewAtBat=useCallback(()=>{
    setSession(prev=>{
      const snapshot={sequence:prev.sequence,gameLog:prev.gameLog,outcomes:{...prev.outcomes},
        batterIdx:prev.batterIdx,outs:prev.outs,bases:prev.bases,balls:prev.balls,strikes:prev.strikes,
        myScore:prev.myScore,oppScore:prev.oppScore,inning:prev.inning};
      const v=prev.lineup?prev.lineup.filter(b=>b.name):[];
      return{...prev,sequence:[],batterIdx:v.length>0?(prev.batterIdx+1)%v.length:0,
        balls:0,strikes:0,undoStack:[...(prev.undoStack||[]),snapshot]};
    });
  },[]);
  const handleUndo=useCallback(()=>{
    setSession(prev=>{
      const stack=prev.undoStack||[];
      if(stack.length===0) return prev;
      const snapshot=stack[stack.length-1];
      return{...prev,...snapshot,undoStack:stack.slice(0,-1)};
    });
  },[]);
  const handleSetBalls=useCallback((n)=>setSession(prev=>({...prev,balls:n})),[]);
  const handleSetStrikes=useCallback((n)=>setSession(prev=>({...prev,strikes:n})),[]);
  const handleSub=useCallback((slot,nb)=>setSession(prev=>{
    if(!prev.lineup) return prev;
    const nl=[...prev.lineup];nl[slot]={name:nb.name,bat:nb.bat,custom:false};return{...prev,lineup:nl};
  }),[]);
  const handlePitcherSwap=useCallback((newPitcher)=>setSession(prev=>({
    ...prev,
    pitcherName:newPitcher.name,
    pitcherHand:newPitcher.hand||"R",
    pitches:newPitcher.pitches||[],
    pitcherOvr:newPitcher.ovr||0,
    pitcherControl:newPitcher.control||null,
    pitcherMovement:newPitcher.movement||null,
    sequence:[], // reset sequence for new pitcher
  })),[]);
  const handleAddRun=useCallback((n=1)=>setSession(prev=>({...prev,myScore:prev.myScore+n})),[]);
  const handleUpdateBases=useCallback((b)=>setSession(prev=>({...prev,bases:b})),[]);
  const handleSaveGame=useCallback(async()=>{
    if(!session||saving) return;
    setSaving(true);const id=await saveGame(session,user);setSaving(false);if(id) setSavedId(id);
  },[session,saving,user]);
  const handleLogout=useCallback(()=>{clearStoredUser();setUser(null);},[]);
  const handleEndGame=useCallback(async(action)=>{
    if(action==="save"&&session) await saveGame(session,user);
    setSession(null);setTab("setup");setSavedId(null);
  },[session,user]);

  const ordinal=n=>{const s=["th","st","nd","rd"],v=n%100;return n+(s[(v-20)%10]||s[v]||s[0]);};
  const TABS_NO_GAME=[{id:"setup",label:"Setup"},{id:"history",label:"History"},{id:"community",label:"Global"},{id:"about",label:"About"},{id:"settings",label:"⚙"}];
  const TABS_IN_GAME=[{id:"atbat",label:"At-Bat"},{id:"lineup",label:"Lineup"},{id:"log",label:"Log"},{id:"history",label:"History"}];
  const TABS=session?TABS_IN_GAME:TABS_NO_GAME;

  if(!user) return <LoginScreen onLogin={setUser}/>;

  return(
    <div style={{...S.root,background:C.bg,color:C.text}}>
      <div style={{...S.header,background:_palette.header||C.green}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:20}}>⚾</span>
            <div style={{...S.headerTitle,color:_palette.headerText||"#fff"}}>Maddux.io</div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            {session&&(<div style={{display:"flex",gap:10,alignItems:"center"}}>
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:9,color:"rgba(255,255,255,0.55)",fontWeight:700,textTransform:"uppercase"}}>Score</div>
                <div style={{fontSize:15,fontWeight:800,color:"#fff"}}>{session.myScore}–{session.oppScore}</div>
              </div>
              <div style={{width:1,height:24,background:"rgba(255,255,255,0.2)"}}/>
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:9,color:"rgba(255,255,255,0.55)",fontWeight:700,textTransform:"uppercase"}}>Inn</div>
                <div style={{fontSize:15,fontWeight:800,color:"#fff"}}>{ordinal(session.inning)}</div>
              </div>
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:9,color:"rgba(255,255,255,0.55)",fontWeight:700,textTransform:"uppercase"}}>Outs</div>
                <div style={{display:"flex",gap:3,marginTop:2,justifyContent:"center"}}>
                  {[0,1,2].map(i=>(<div key={i} style={{width:8,height:8,borderRadius:"50%",
                    background:i<session.outs?"#fff":"rgba(255,255,255,0.25)",border:"1px solid rgba(255,255,255,0.4)"}}/>))}
                </div>
              </div>
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:9,color:"rgba(255,255,255,0.55)",fontWeight:700,textTransform:"uppercase"}}>P</div>
                <div style={{fontSize:15,fontWeight:800,color:"#fff"}}>{session.gameLog?.length||0}</div>
              </div>
              <div style={{width:1,height:24,background:"rgba(255,255,255,0.2)"}}/>
            </div>)}
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:11,fontWeight:700,color:"rgba(255,255,255,0.9)"}}>{user.username}</div>
              <button onClick={handleLogout} style={{fontSize:9,color:"rgba(255,255,255,0.5)",background:"none",border:"none",cursor:"pointer",fontFamily:"inherit",padding:0,fontWeight:600}}>sign out</button>
              <button onClick={()=>setShowInstructions(true)} style={{fontSize:11,color:"rgba(255,255,255,0.7)",background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.3)",borderRadius:"50%",width:22,height:22,cursor:"pointer",fontFamily:"inherit",fontWeight:800,lineHeight:"20px",textAlign:"center",padding:0}}>?</button>
            </div>
          </div>
        </div>
      </div>

      {showScorePrompt&&(<div style={{background:C.white,borderBottom:`2px solid ${C.border}`,padding:"12px 16px"}}>
        <div style={{fontWeight:800,fontSize:13,color:C.text,marginBottom:8}}>Half-inning over — runs scored?</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
          {[["My runs",scoreInput.my,"my"],["Opp runs",scoreInput.opp,"opp"]].map(([lbl,val,key])=>(
            <div key={key}>
              <div style={{fontSize:10,fontWeight:700,color:C.textSoft,marginBottom:4,textTransform:"uppercase"}}>{lbl}</div>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <button onClick={()=>setScoreInput(s=>({...s,[key]:Math.max(0,s[key]-1)}))} style={{...S.ghostBtn,padding:"4px 10px",fontSize:14}}>−</button>
                <span style={{fontSize:18,fontWeight:800,color:C.text,minWidth:24,textAlign:"center"}}>{val}</span>
                <button onClick={()=>setScoreInput(s=>({...s,[key]:s[key]+1}))} style={{...S.ghostBtn,padding:"4px 10px",fontSize:14}}>+</button>
              </div>
            </div>
          ))}
        </div>
        <button onClick={handleScoreSubmit} style={{...S.primaryBtn}}>Continue →</button>
      </div>)}

      {showGameOver&&session&&(
        <div style={{background:C.white,borderBottom:`2px solid ${C.green}`,padding:"14px 16px"}}>
          <div style={{fontWeight:800,fontSize:15,color:C.text,marginBottom:4}}>
            {session.myScore>session.oppScore?"Game over — You win! 🎉":session.oppScore>session.myScore?"Game over — Opponent wins":"Tied game — Extra innings!"}
          </div>
          <div style={{fontSize:13,color:C.textSoft,marginBottom:12,fontWeight:500}}>
            Final: {session.myScore}–{session.oppScore} · {session.totalInnings} innings
          </div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            <button onClick={async()=>{
              setShowGameOver(false);
              // Extend by 1 inning
              setSession(prev=>({...prev,totalInnings:(prev.totalInnings||9)+1}));
            }} style={{...S.ghostBtn}}>Continue (+1 inning)</button>
            <button onClick={async()=>{
              setShowGameOver(false);
              await saveGame(session,user);
              setSession(null);setTab("setup");setSavedId(null);
            }} style={{...S.primaryBtn,flex:1}}>Save & End Game</button>
            <button onClick={()=>{
              setShowGameOver(false);
              setSession(null);setTab("setup");setSavedId(null);
            }} style={{...S.ghostBtn,color:C.warn,borderColor:C.warn}}>Discard</button>
          </div>
        </div>
      )}

      <div style={S.tabBar}>
        {TABS.map(t=>(<button key={t.id} onClick={()=>setTab(t.id)} style={tab===t.id?S.tabOn:S.tabOff}>{t.label}</button>))}
      </div>

      <div style={S.content}>
        {tab==="setup"&&<SetupTab onComplete={handleSetup} onViewStats={()=>setTab("stats")}/>}
        {tab==="atbat"&&(session
          ?<AtBatTab session={session} onLogPitch={handleLogPitch} onNewAtBat={handleNewAtBat} onSub={handleSub} onAddOut={handleAddOut} onUpdateBases={handleUpdateBases} onEndGame={handleEndGame} onUndo={handleUndo} onSetBalls={handleSetBalls} onSetStrikes={handleSetStrikes} onAddRun={handleAddRun} onPitcherSwap={handlePitcherSwap} temperature={temperature}/>
          :<div style={S.emptyState}>Complete setup first.</div>
        )}
        {tab==="lineup"&&(session?<LineupTab session={session}/>:<div style={S.emptyState}>Complete setup first.</div>)}
        {tab==="log"&&(session
          ?<div>
            <LogTab session={session}/>
            <div style={{padding:"0 16px 16px"}}>
              {savedId
                ?<div style={{textAlign:"center",padding:"12px",background:C.greenLight,borderRadius:8,color:C.green,fontWeight:700,fontSize:13}}>✓ Game saved</div>
                :<button onClick={handleSaveGame} style={{...S.primaryBtn,opacity:saving?0.6:1}} disabled={saving}>{saving?"Saving...":"Save Game to History"}</button>
              }
            </div>
          </div>
          :<div style={S.emptyState}>Complete setup first.</div>
        )}
        {tab==="stats"&&<StatsErrorBoundary onBack={()=>setTab(session?"atbat":"setup")}><StatsTab user={user} onBack={()=>setTab(session?"atbat":"setup")}/></StatsErrorBoundary>}
        {tab==="history"&&<HistoryTab user={user}/>}
        {tab==="community"&&<CommunityTab user={user}/>}
        {tab==="about"&&<AboutTab/>}
        {tab==="settings"&&<SettingsTab paletteKey={paletteKey} onPaletteChange={handlePaletteChange} temperature={temperature} onTempChange={handleTempChange}/>}
      </div>
      {showInstructions&&<InstructionsModal onClose={()=>setShowInstructions(false)}/>}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
