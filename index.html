const PROXY_BASE = "https://mlb-proxy-lovat.vercel.app";

async function mlbFetch(path) {
  try {
    // Split path into pathname and query string to encode separately
    const [pathname, qs] = path.split("?");
    const proxyUrl = qs
      ? `${PROXY_BASE}/api/proxy?path=${encodeURIComponent(pathname + "?" + qs)}`
      : `${PROXY_BASE}/api/proxy?path=${encodeURIComponent(pathname)}`;
    console.log("mlbFetch URL:", proxyUrl);
    const res = await fetch(proxyUrl);
    console.log("mlbFetch status:", res.status);
    if (res.ok) {
      const data = await res.json();
      if (!data.error) return data;
      console.error("mlbFetch API error:", data.error);
    }
  } catch(e) {
    console.error("mlbFetch exception:", e.message);
  }
  return null;
}

  "Knuckleball": "Knuckleball",
  "Running Fastball": "2-Seam FB",
};

function normalizePitchName(name) {
  return PITCH_NAME_MAP[name] || name;
}

function getPitchList(card) {
  // MLB26 API nests pitches under card.pitches.pitches
  if (card.pitches && card.pitches.pitches) return card.pitches.pitches;
  if (Array.isArray(card.pitches)) return card.pitches;
  return [];
}

function cardIsHitter(c) {
  return c.is_hitter === true || c.is_hitter === 1;
}

function apiCardToPitcher(card) {
  const pitchList = getPitchList(card);
  const pitches = pitchList
    .map(p => ({ type: normalizePitchName(p.name), velo: p.speed || 85 }))
    .filter(p => PITCH_PROFILES[p.type]);
  const pos = card.display_position || "";
  const role = (pos==="RP"||pos==="CL"||pos==="MR") ? "RP" : "SP";
  return {
    name: card.name,
    team: card.team || "",
    hand: card.throw_hand || "R",
    role,
    ovr: card.ovr || card.new_rank || 0,
    rarity: card.rarity || "",
    series: card.series || "",
    img: card.baked_img || card.img || "",
    pitches,
    speed: card.speed || 50,
    control: card.pitch_control || null,
    movement: card.pitch_movement || null,
    fromApi: true,
  };
}

    .filter(c => {

}

// Zone recommendations now take both pitcher and batter hand into account.
// Zone id: "row-col", rows 0=high..4=low, cols 0=away..4=inside (from BATTER perspective)
// For breaking balls: primary direction is arm-side away from batter.
// RHP vs RHH: slider breaks away (col 0-1), RHP vs LHH: slider breaks inside (col 3-4)
// LHP vs LHH: slider breaks away (col 0-1), LHP vs RHH: slider breaks inside (col 3-4)
// Softmax sampling -- converts scores to probabilities and samples
// temperature: 0.3=very deterministic, 1.0=balanced, 2.0=very random
function softmaxSample(scores, temperature){
  const t=Math.max(0.15, temperature);
  const exps=scores.map(s=>Math.exp(s/t));
  const sum=exps.reduce((a,b)=>a+b,0);
  const probs=exps.map(e=>e/sum);
  const r=Math.random();
  let cum=0;
  for(let i=0;i<probs.length;i++){
    cum+=probs[i];
    if(r<=cum) return i;
  }
  return probs.length-1;
}

function getRecZone(pitchType, pitcherHand, batterHand){
  const sameHand = pitcherHand === batterHand;
  // Catcher's view: RHB on LEFT. Col 0=inside-to-RHH, col 4=away-from-RHH
  const awayLow  = sameHand ? "3-3" : "3-1";
  const insideLow= sameHand ? "3-1" : "3-3";
  // 4-seam FB: high corner, never middle -- alternate inside/away by batter index
  // Using sameHand to pick: high-inside for sameHand, high-away for opp
  const fbHigh   = sameHand ? "1-1" : "1-3";
  switch(pitchType){
    case "4-Seam FB": return fbHigh;
    case "2-Seam FB": return insideLow;
    case "Cutter":    return awayLow;
    case "Sinker":    return insideLow;
    case "Slider":    return awayLow;
    case "Sweeper":   return awayLow;
    case "Curveball": return "3-2";
    case "12-6 Curve":return "4-2";
    case "Changeup":  return awayLow;
    case "Splitter":  return "4-2";
    case "Knuckleball":return "2-3";
    default:          return "1-3";
  }
}
function getChaseZone(pitchType, pitcherHand, batterHand){
  const sameHand = pitcherHand === batterHand;
  // Chase zones: further outside the zone in same direction as rec zone
  const chaseAway = sameHand ? "4-4" : "4-0";  // way outside right for sameHand
  const chaseIn   = sameHand ? "4-0" : "4-4";
  switch(pitchType){
    case "4-Seam FB": return sameHand ? "0-1" : "0-3"; // high inside
    case "2-Seam FB": return chaseIn;
    case "Cutter":    return chaseAway;
    case "Sinker":    return chaseIn;
    case "Slider":    return chaseAway;
    case "Sweeper":   return chaseAway;
    case "Curveball": return "4-2";
    case "12-6 Curve":return "4-2";
    case "Changeup":  return chaseAway;
    case "Splitter":  return "4-2";
    case "Knuckleball":return "4-2";
    default:          return "4-2";
  }
}

// Game-specific zone quality scoring (MLB The Show mechanics)
// zone id = "row-col", rows 0=high..4=low, cols 0=away..4=inside (from batter's perspective)
// Returns bonus/penalty to add to score based on pitch type, zone, matchup handedness
function gameZoneBonus(pitchType,zoneId,pitcherHand,batterHand){
  if(!zoneId) return 0;
  const[r,c]=zoneId.split("-").map(Number);
  const inZone=r>=1&&r<=3&&c>=1&&c<=3;
  const sameHand=pitcherHand===batterHand;
  const prof=PITCH_PROFILES[pitchType];
  const isFast=prof?.type==="fastball";
  const isBreaking=prof?.type==="breaking";
  const isOffspeed=prof?.type==="offspeed";
  const isSinker=pitchType==="Sinker";
  const isSlider=pitchType==="Slider"||pitchType==="Sweeper";
  const isCutter=pitchType==="Cutter";
  const isCurve=pitchType==="Curveball"||pitchType==="12-6 Curve";

  // Catcher's view: RHB on LEFT. Col 0=left=inside-to-RHH, col 4=right=away-from-RHH
  // For sameHand (RHP vs RHH): away = col 3-4 (right), inside = col 0-1 (left)
  // isAway/isInside are from RHH perspective (most common case)
  const isAway=c>=3; const isMid=c===2; const isInside=c<=1;
  const isHigh=r<=1; const isMidV=r===2; const isLow=r>=3;
  const isWayInside=c===0; const isWayAway=c===4;

  let bonus=0;

  // Universal: middle-middle is never good -- hard penalty for all pitch types
  if(r===2&&c===2) bonus-=40;
  // High middle and low middle: heavy penalty
  if(c===2&&inZone&&r!==2) bonus-=20;
  // Middle row middle column band: general suppression
  if(c===2&&!inZone) bonus-=10;

  if(isFast){
    // High in zone: always good
    if(isHigh&&inZone) bonus+=12;
    // High middle: ok
    if(isHigh&&isMid&&inZone) bonus+=5;
    // Middle middle / low middle: bad
    if(isMid&&inZone&&!isHigh) bonus-=15;
    if(isLow&&isMid&&inZone) bonus-=20;
    // Away in zone: bad for fastballs
    if(isAway&&inZone) bonus-=10;
    // Inside same hand: good
    if(isInside&&inZone&&sameHand) bonus+=10;
    // Inside opposite hand: bad (gets barrel)
    if(isInside&&inZone&&!sameHand) bonus-=18;
    // Way inside opp hand (ball): ok as waste
    if(isWayInside&&!inZone&&!sameHand) bonus+=5;
    // Low in zone: not great for fast
    if(isLow&&inZone&&!isMid) bonus-=8;
    // Sinker: same hand inside works
    if(isSinker&&isInside&&sameHand) bonus+=8;
  }

  if(isBreaking){
    // Slider / Sweeper: bad in zone, good outside
    if(isSlider){
      if(inZone) bonus-=14;
      if(!inZone) bonus+=10;
      // Backdoor slider (away side, low) same hand: good even in zone
      if(isAway&&isLow&&sameHand) bonus+=18;
      // Backdoor middle: decent
      if(isAway&&isMidV&&sameHand) bonus+=10;
    }
    // Cutter: backdoor low and middle good
    if(isCutter){
      if(isAway&&isLow) bonus+=16;
      if(isAway&&isMidV) bonus+=10;
      if(isAway&&isHigh) bonus+=4;
      if(isInside&&inZone&&!sameHand) bonus-=16;
    }
    // Curveball: high/low ok, not inside
    if(isCurve){
      if(isInside&&inZone) bonus-=12;
      if(!inZone&&isLow) bonus+=8;
      if(isHigh&&inZone) bonus+=5; // 12-6 high then break down
    }
  }

  if(isOffspeed){
    // Off-speed inside in zone: bad unless same hand and away
    if(isInside&&inZone&&!sameHand) bonus-=16;
    if(isInside&&inZone&&sameHand) bonus-=6; // still risky
    // Off-speed outside in zone: good
    if(isAway&&inZone) bonus+=12;
    // Off-speed outside of zone: also good
    if(isAway&&!inZone) bonus+=8;
    // Off-speed middle: risky
    if(isMid&&inZone) bonus-=8;
  }

  return bonus;
}

function getMovement(pitch,velo,hand){
  const p=PITCH_PROFILES[pitch]; if(!p) return {h:0,v:0};
  const s=0.8+0.2*(velo/p.velo_base);
  let h=p.h*s,v=p.v*s;
  if(hand==="L") h=-h;
  return {h,v};
}

function tunnelScore(p1,p2,v1,v2,hand){
  const m1=getMovement(p1,v1,hand),m2=getMovement(p2,v2,hand);
  const vd=Math.abs(v1-v2),hd=Math.abs(m1.h-m2.h),vdd=Math.abs(m1.v-m2.v);
  return Math.min(100,Math.max(0,100-hd*2-vdd*2)+(vd>=8&&vd<=18?15:vd>18?5:-5));
}

function getTunnelReason(last,rec,score){
  const lp=PITCH_PROFILES[last],rp=PITCH_PROFILES[rec];
  if(!lp||!rp) return "Good sequencing option";
  if(score>=70) return `Strong tunnel off ${last}`;
  if(lp.type===rp.type) return `Mix in a different shape`;
  if(rp.type==="offspeed"&&lp.type==="fastball") return `Velocity change off ${last}`;
  if(rp.type==="breaking"&&lp.type==="fastball") return `Breaking ball tunnels off fastball`;
  if(rp.type==="fastball"&&lp.type!=="fastball") return `Reset hitter's eye with heater`;
  return `Good shape contrast to ${last}`;
}

function LineupSetup({onSave,initialLineup}){
  const [query,setQuery]=useState("");
  const [lineup,setLineup]=useState(()=>
    initialLineup&&initialLineup.some(b=>b.name)
      ? initialLineup
      : Array(9).fill(null).map(()=>({name:"",bat:"R",custom:false}))
  );
  const [activeSlot,setActiveSlot]=useState(null);
  const [apiResults,setApiResults]=useState([]);
  const [apiLoading,setApiLoading]=useState(false);
  const [autoFilling,setAutoFilling]=useState(false);
  const [saved,setSaved]=useState(false);

  useEffect(()=>{
    if(query.length<2){setApiResults([]);return;}
    const t=setTimeout(async()=>{
      setApiLoading(true);
      try{
        const res=await searchBatters(query);
        setApiResults(res.slice(0,8));
      }catch(e){setApiResults([]);}
      finally{setApiLoading(false);}
    },400);
    return()=>clearTimeout(t);
  },[query]);

  const results=apiResults;

  const selectBatter=async(slot,batter)=>{
    // Use stub data immediately for responsiveness
    const next=[...lineup];
    next[slot]={name:batter.name,bat:batter.bat||"R",custom:false,ovr:batter.ovr,speed:batter.speed,uuid:batter.uuid||""};
    setLineup(next);
    setActiveSlot(null);
    setQuery("");
    setApiResults([]);
    // Fetch full item to get accurate bat_hand
    if(batter.uuid){
      try{
        const full=await fetchItemByUuid(batter.uuid);
        if(full){
          const validBat=["R","L","S"].includes(full.bat_hand)?full.bat_hand:null;
          if(validBat&&validBat!==batter.bat){
            setLineup(prev=>{
              const updated=[...prev];
              updated[slot]={...updated[slot],bat:validBat};
              return updated;
            });
          }
        }
      }catch(e){}
    }
  };

  const updateSlot=(slot,field,val)=>{
    const next=[...lineup];
    next[slot]={...next[slot],[field]:val};
    setLineup(next);
  };

  const autoGenLineup=async()=>{
    setAutoFilling(true);
    const lu=await randomLineupFromApi();
    setLineup(lu);
    setAutoFilling(false);
  };

  const canSave=lineup.some(s=>s.name.trim());

  return(
    <div style={{padding:"16px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
        <div style={S.sectionLabel}>Opposing Lineup</div>
        <button onClick={autoGenLineup} disabled={autoFilling} style={{...S.ghostBtn,opacity:autoFilling?0.5:1}}>{autoFilling?"Filling...":"🎲 Auto-Fill"}</button>
      </div>
      <div style={{fontSize:11,color:C.textSoft,marginBottom:4,fontWeight:600}}>
        Search DD card names to build your lineup
      </div>
      <div style={{fontSize:10,color:C.gold,marginBottom:12,fontWeight:600,background:C.goldLight,borderRadius:6,padding:"5px 8px"}}>
        ⚠ Auto-fill may not correctly set batter handedness — verify each slot after filling
      </div>
      {lineup.map((slot,i)=>(
        <div key={i} style={{
          background:C.white,border:`1.5px solid ${activeSlot===i?C.greenMid:C.border}`,
          borderRadius:8,padding:"8px 10px",marginBottom:6,
        }}>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <span style={{color:C.textSoft,fontSize:11,fontWeight:800,width:18}}>{i+1}.</span>
            <input
              value={slot.name}
              onChange={e=>{updateSlot(i,"name",e.target.value);setActiveSlot(i);setQuery(e.target.value);}}
              onFocus={()=>{setActiveSlot(i);setQuery(slot.name);}}
              placeholder={`Batter ${i+1}`}
              style={{...S.input,flex:1,padding:"6px 8px",fontSize:12}}
            />
            <div style={{display:"flex",gap:3}}>
              {BAT_OPTS.map(o=>(
                <button key={o.val} onClick={()=>updateSlot(i,"bat",o.val)} style={{
                  padding:"4px 7px",borderRadius:5,fontSize:10,fontWeight:700,
                  fontFamily:"'Neuton','Nunito',serif",cursor:"pointer",
                  background:slot.bat===o.val?C.green:C.surface,
                  color:slot.bat===o.val?"#fff":C.textMid,
                  border:`1px solid ${slot.bat===o.val?C.green:C.border}`,
                }}>{o.label}</button>
              ))}
            </div>
          </div>
          {/* OVR badge if from API */}
          {slot.ovr&&<div style={{fontSize:10,color:C.textSoft,fontWeight:600,marginTop:2,marginLeft:22}}>OVR {slot.ovr}{slot.speed?` · SPD ${slot.speed}`:""}</div>}
          {activeSlot===i&&query.length>=2&&(
            <div style={{border:`1px solid ${C.border}`,borderRadius:6,overflow:"hidden",marginTop:6}}>
              {apiLoading&&<div style={{padding:"8px 10px",fontSize:11,color:C.textSoft}}>Searching DD cards...</div>}
              {!apiLoading&&results.map(b=>(
                <div key={b.name+(b.ovr||"")} onClick={()=>selectBatter(i,b)} style={{
                  padding:"8px 10px",background:C.white,cursor:"pointer",
                  borderBottom:`1px solid ${C.border}`,
                  display:"flex",justifyContent:"space-between",alignItems:"center",
                }}>
                  <div>
                    <div style={{fontWeight:700,fontSize:12,color:C.text}}>{b.name}</div>
                    {(b.rarity||b.series)&&<div style={{fontSize:10,color:C.textSoft}}>{[b.rarity,b.series,b.team].filter(Boolean).join(" · ")}</div>}
                  </div>
                  <div style={{textAlign:"right"}}>
                    {b.ovr>0&&<div style={{fontSize:12,fontWeight:800,color:C.green}}>{b.ovr}</div>}
                    <div style={{fontSize:10,color:C.textSoft}}>{b.bat}H</div>
                  </div>
                </div>
              ))}
              {!apiLoading&&results.length===0&&(
                <div style={{padding:"10px"}}>
                  <div style={{fontSize:11,color:C.textSoft,marginBottom:6}}>No DD card found.</div>
                  <div style={{fontSize:10,color:C.textSoft,lineHeight:1.5,marginBottom:8}}>
                    Collection reward cards (e.g. Jolt, collection PCA, Finest) are not listed on the market and won't appear in search. Try a different card for the same player, or add them manually below.
                  </div>
                  <button onClick={()=>{
                    // Add manually with just the name typed
                    const manualBatter={name:query,bat:"R",ovr:0,rarity:"Manual",uuid:"",fromApi:false};
                    selectBatter(i,manualBatter);
                  }} style={{...S.ghostBtn,fontSize:10,padding:"5px 10px",width:"100%"}}>
                    + Add "{query}" manually (handedness: R -- tap slot to change)
                  </button>
                </div>
              )}
            </div>
          )}
        </div>
      ))}
      {saved&&(
        <div style={{background:C.greenLight,border:`1.5px solid ${C.greenMid}`,borderRadius:8,padding:"10px 14px",marginTop:8,fontSize:12,fontWeight:700,color:C.green}}>
          ✓ Lineup saved — tap Start Game when ready
        </div>
      )}

        Save Lineup
      </button>
    </div>
  );
}

// ─── Zone label helper ────────────────────────────────────────────────────────
function zoneLabel(id, batterHand){
  if(!id) return "";
  const[r,c]=id.split("-").map(Number);
  const rows=["High","High","Mid","Low","Low"];
  // Catcher's view: col 0=left, col 4=right
  // RHB stands LEFT: col 0=Inside, col 4=Outside
  // LHB stands RIGHT: col 0=Outside, col 4=Inside
  const isRHB = !batterHand || batterHand==="R";
  const cols = isRHB
    ? ["Way In","In","Middle","Out","Way Out"]    // RHB: left=inside
    : ["Way Out","Out","Middle","In","Way In"];   // LHB: left=outside
  const inZone=r>=1&&r<=3&&c>=1&&c<=3;
  return `${rows[r]||""} ${cols[c]||""}${inZone?"":" (ball)"}`.trim();
}

// ─── Tunnel + location reason ─────────────────────────────────────────────────
function getZoneReason(pitchType, recZone){
  if(!recZone) return "";
  const[r,c]=recZone.split("-").map(Number);
  const inZone=r>=1&&r<=3&&c>=1&&c<=3;
  const isHigh=r<=1, isLow=r>=3, isAway=c>=3, isInside=c<=1, isChase=!inZone;
  const prof=PITCH_PROFILES[pitchType];
  const isBreaking=prof?.type==="breaking";
  const isOffspeed=prof?.type==="offspeed";
  const isFB=prof?.type==="fastball";

  if(isChase&&isLow&&isBreaking) return "Chase zone — breaking ball below strike zone forces check swing or roll-over weak contact.";
  if(isChase&&isLow&&isOffspeed) return "Chase zone — changeup diving below zone generates swing-and-miss or weak grounder.";
  if(isChase&&isHigh&&isFB) return "High heat — fastball above zone catches barrel-hunting hitters with rising action, pop-ups and swings-and-misses.";
  if(isChase&&isAway&&isBreaking) return "Back-foot breaking ball — sweeping away from the zone, hitters chase and roll over for weak contact.";
  if(isChase&&isAway&&isOffspeed) return "Fade away — off-speed diving outside the zone, hitters lunge and miss or hit it off the end.";
  if(isAway&&isLow&&isBreaking) return "Low and away — breaking ball finishing at the corner. Hitters can't cover down-and-away, generates weak contact and miss.";
  if(isAway&&isLow&&isOffspeed) return "Low and away — changeup fading to the corner freezes the hitter's weight, soft contact or miss.";
  if(isAway&&inZone&&isFB) return "Away corner — keeps the barrel away from the sweet spot, generates opposite-field weak contact.";
  if(isInside&&isLow&&isFB) return "Low and in — running fastball jams the hitter's hands, produces roll-over grounders or broken bats.";
  if(isHigh&&inZone&&isFB) return "Up in the zone — rising fastball above the barrel path, generates swing-and-misses and pop-ups.";
  if(isInside&&inZone&&isBreaking) return "Backdoor — breaking ball cutting back over the inside corner freezes right-handed hitters for called strikes.";
  if(isLow&&inZone&&isBreaking) return "Low in the zone — late downward break makes hitters beat it into the ground, weak contact or miss.";
  if(isLow&&inZone&&isOffspeed) return "Low and soft — change of speed low in the zone disrupts timing, weak contact or swing-and-miss.";
  return "";
}

function getFullReason(lastPitch,lastZone,recPitch,recZone,score,batterHand){
  const lp=PITCH_PROFILES[lastPitch],rp=PITCH_PROFILES[recPitch];
  const zoneReason=getZoneReason(recPitch,recZone);
  const zoneTxt=recZone?` — target ${zoneLabel(recZone,batterHand)}`:"";

  // Sequence reasoning
  let seqReason="";
  if(lp&&rp){
    if(score>=70) seqReason=`Strong tunnel off ${lastPitch}.`;
    else if(lp.type===rp.type) seqReason=`Same pitch family — consider mixing shapes.`;
    else if(rp.type==="offspeed"&&lp.type==="fastball") seqReason=`Velocity change off ${lastPitch}.`;
    else if(rp.type==="breaking"&&lp.type==="fastball") seqReason=`Breaking ball off fastball tunnel.`;
    else if(rp.type==="fastball"&&lp.type!=="fastball") seqReason=`Reset hitter's eye with heater.`;
    else seqReason=`Shape contrast to ${lastPitch}.`;
  } else if(rp) {
    seqReason=`Opening pitch${zoneTxt}.`;
  }

  if(zoneReason) return `${seqReason} ${zoneReason}`;
  return `${seqReason}${zoneTxt}`;
}

// ─── At-Bat Tab ───────────────────────────────────────────────────────────────
function AtBatTab({session,onLogPitch,onNewAtBat,onSub,onAddOut,onUpdateBases,onEndGame,onUndo,onSetBalls,onSetStrikes,onAddRun,onPitcherSwap,temperature}){
  const{pitcherHand,pitches,sequence,outcomes,gameLog,lineup,batterIdx,outs,inning,bases}=session;
  const balls=session.balls||0;
  const strikes=session.strikes||0;
  const setBalls=onSetBalls;
  const setStrikes=onSetStrikes;
  const[selectedZone,setSelectedZone]=useState(null);
  const[selectedPitch,setSelectedPitch]=useState(pitches[0]?.type||"");
  const[showSub,setShowSub]=useState(false);
  const[subQuery,setSubQuery]=useState("");
  const[subSlot,setSubSlot]=useState(null);
  const[showPSwap,setShowPSwap]=useState(false);
  const[pSwapQuery,setPSwapQuery]=useState("");
  const[pSwapResults,setPSwapResults]=useState([]);
  const[pSwapLoading,setPSwapLoading]=useState(false);
  const[contactPending,setContactPending]=useState(null);
  const[contactClass,setContactClass]=useState(null);
  const[hitResult,setHitResult]=useState(null);
  const[errorBasePending,setErrorBasePending]=useState(false);
  const[swingTiming,setSwingTiming]=useState(null); // Early/Good/Late/null
  const[showOutConfirm,setShowOutConfirm]=useState(false);
  const[outConfirmType,setOutConfirmType]=useState("out");
  const[runnerScoringIdx,setRunnerScoringIdx]=useState(0);
  const[runnersToScore,setRunnersToScore]=useState([]);
  const[runnersToAdvance,setRunnersToAdvance]=useState([]); // for out advancement
  const[runnerAdvanceIdx,setRunnerAdvanceIdx]=useState(0);
  const[batterStats,setBatterStats]=useState(null);
  const[batterStatsLoading,setBatterStatsLoading]=useState(false);

  const resetContactFlow=()=>{
    setContactPending(null);setContactClass(null);setHitResult(null);
    setRunnersToScore([]);setRunnerScoringIdx(0);
    setRunnersToAdvance([]);setRunnerAdvanceIdx(0);
    setErrorBasePending(false);
  };

  const currentBatter=lineup?lineup[batterIdx]:null;
  const effectiveBatterHand=currentBatter?(currentBatter.bat==="S"?"R":currentBatter.bat):session.batterHand;

  // Fetch batter stats when batter changes
  useEffect(()=>{
    setBatterStats(null);
    if(!currentBatter?.uuid) return;
    setBatterStatsLoading(true);
    fetchItemByUuid(currentBatter.uuid).then(data=>{
      if(data) setBatterStats(data);
      setBatterStatsLoading(false);
    }).catch(()=>setBatterStatsLoading(false));
  },[currentBatter?.uuid]);
  const countKey=`${balls}-${strikes}`;
  const lastEntry=sequence.length>0?sequence[sequence.length-1]:null;
  const lastThrown=lastEntry?lastEntry.pitch:null;
  const lastZone=lastEntry?lastEntry.zone:null;

  const pitchZoneHistory=useMemo(()=>{
    const map={};
    gameLog.forEach(e=>{const k=`${e.pitch}:${e.zone}`;map[k]=(map[k]||0)+1;});
    return map;
  },[gameLog]);

  // ─── Scoring Engine ────────────────────────────────────────────────────────
  const scored=useMemo(()=>{
    const FB_TYPES=new Set(["4-Seam FB","2-Seam FB","Sinker","Cutter"]);
    const BREAKING_TYPES=new Set(["Slider","Sweeper","Curveball","12-6 Curve"]);
    const OFFSPEED_TYPES=new Set(["Changeup","Splitter","Knuckleball"]);

    // --- FB:Offspeed ratio from arsenal ---
    const fbCount=pitches.filter(p=>FB_TYPES.has(p.type)).length;
    const osCount=pitches.filter(p=>!FB_TYPES.has(p.type)).length;
    // target FB% based on how FB-heavy the arsenal is
    const targetFbPct=fbCount===0?0.3:osCount===0?0.85:Math.min(0.80,0.40+(fbCount/(fbCount+osCount))*0.45);

    // --- Rolling last-2 tracking (pitch+zone hard cap) ---
    const last2=sequence.slice(-2);
    const last3Zones=sequence.slice(-3).map(e=>e.zone).filter(Boolean);
    const zoneRepeatCapped=(zone)=>{
      if(last3Zones.length<2) return false;
      return last3Zones[last3Zones.length-1]===zone&&last3Zones[last3Zones.length-2]===zone;
    };
    const pitchZoneCapped=(ptype,zone)=>{
      if(last2.length<2) return false;
      return last2[0].pitch===ptype&&last2[0].zone===zone&&last2[1].pitch===ptype&&last2[1].zone===zone;
    };

    // --- Lineup position (for changeup suppression early in lineup) ---
    const totalBattersRetired=gameLog.filter(e=>e.isOut).length;
    const timesThroughLineup=Math.floor(totalBattersRetired/9);

    // --- Count context ---
    const scoreDiff=(session.myScore||0)-(session.oppScore||0);
    const gameCtx=scoreDiff<=-2?"behind":scoreDiff>=2?"ahead":"tied";
    const chaseWeight=CHASE_WEIGHT[countKey]||0;
    const effectiveChaseWeight=gameCtx==="ahead"?Math.min(chaseWeight+0.1,0.7):gameCtx==="behind"?Math.max(chaseWeight-0.1,0):chaseWeight;
    const currentBases=session.bases||{first:null,second:null,third:null};
    const stealThreat=!!(currentBases.first?.fast||currentBases.second?.fast);

    // --- Recent FB usage ratio ---
    const recentWindow=gameLog.slice(-8);
    const recentFbCount=recentWindow.filter(e=>FB_TYPES.has(e.pitch)).length;
    const recentFbPct=recentWindow.length>0?recentFbCount/recentWindow.length:targetFbPct;

    return pitches.map(p=>{
      const prof=PITCH_PROFILES[p.type];
      const pitchType=prof?.type||"fastball";
      const isFB=FB_TYPES.has(p.type);
      const isBreaking=BREAKING_TYPES.has(p.type);
      const isOffspeed=OFFSPEED_TYPES.has(p.type);

      const recZ=getRecZone(p.type,pitcherHand,effectiveBatterHand);

      // No hard caps -- all pitches always shown. Apply score penalties instead.
      // Track consecutive patterns for penalty calculation
      const last2Types=sequence.slice(-2).map(e=>e.pitch);
      const last3Types=sequence.slice(-3).map(e=>e.pitch);
      const twoConsecNonFB=!isFB&&last2Types.length===2&&last2Types.every(t=>!FB_TYPES.has(t));
      const threeConsecFB=isFB&&last3Types.length===3&&last3Types.every(t=>FB_TYPES.has(t));
      const sameZone3=zoneRepeatCapped(recZ);
      const samePitchZone2=pitchZoneCapped(p.type,recZ);

      // Factor 1: Tunnel score (0-100 scale)
      // First pitch: rotate through pitch types using batterIdx so each AB starts differently
      let tunnelFactor;
      if(!lastThrown){
        const pitchIdx=pitches.indexOf(p);
        // Cycle first-pitch recommendations by batter index
        // Each batter gets a different "preferred" pitch slot
        const preferredSlot=batterIdx%pitches.length;
        const isPreferred=pitchIdx===preferredSlot;
        const isSecondary=pitchIdx===(batterIdx+1)%pitches.length;
        tunnelFactor=isPreferred?72:isSecondary?65:55;
        // Extra boost for offspeed/breaking on first pitch to break fastball dominance
        if(!isFB) tunnelFactor+=8;
      } else {
        tunnelFactor=tunnelScore(lastThrown,p.type,pitches.find(x=>x.type===lastThrown)?.velo||90,p.velo,pitcherHand);
      }
      if(p.type===lastThrown) tunnelFactor-=15;
      tunnelFactor=Math.max(0,Math.min(100,tunnelFactor));

      // Factor 2: Count leverage (0-100 scale)
      const cm=COUNT_LEVERAGE[countKey]?.[pitchType]||1.0;
      let countFactor=50*cm;

      // Slider/Sweeper: slightly suppress with 0 strikes on first pitch, but don't kill it
      if((p.type==="Slider"||p.type==="Sweeper")&&strikes===0&&balls===0) countFactor*=0.7;
      // Curveball: boost early in count (0-0, 1-0) to disrupt timing; boost late (2-strike) vs weak spots
      if((p.type==="Curveball"||p.type==="12-6 Curve")){
        if(strikes===0&&balls<=1) countFactor*=1.4;
        if(strikes===2) countFactor*=1.3;
      }
      // Changeup: suppress first time through lineup, boost 2nd+ time
      if((p.type==="Changeup"||p.type==="Splitter")){
        if(timesThroughLineup===0) countFactor*=0.5;
        else countFactor*=1.3;
      }
      countFactor=Math.max(0,Math.min(100,countFactor));

      // Swing timing factor -- based on hitter's last swing
      // Early = hitter out in front, throw slower/offspeed again
      // Late = hitter behind, go heat/fastball
      // Good = hitter on time, change eye level or location
      let timingFactor=0;
      if(swingTiming==="Early"){
        // Hitter is early -- off-speed/breaking effective
        if(!isFB) timingFactor=20;
        if(isFB) timingFactor=-10;
      } else if(swingTiming==="Late"){
        // Hitter is late -- fastball up, they can't catch up
        if(isFB) timingFactor=20;
        if(!isFB) timingFactor=-5;
      } else if(swingTiming==="Good"){
        // Hitter is on time -- change eye level or location
        // Penalize same pitch type slightly, boost contrasting
        if(lastThrown&&PITCH_PROFILES[lastThrown]?.type===PITCH_PROFILES[p.type]?.type) timingFactor=-10;
        else timingFactor=10;
      }
      let ratioFactor=50;
      if(isFB){
        ratioFactor=recentFbPct>targetFbPct
          ?Math.max(0,50-(recentFbPct-targetFbPct)*200)
          :Math.min(100,50+(targetFbPct-recentFbPct)*150);
      } else {
        ratioFactor=recentFbPct<targetFbPct
          ?Math.max(0,50-(targetFbPct-recentFbPct)*200)
          :Math.min(100,50+(recentFbPct-targetFbPct)*150);
      }
      const lastWasFB=lastThrown?FB_TYPES.has(lastThrown):null;
      let alternateFactor=50;
      if(lastWasFB!==null){
        if(lastWasFB&&!isFB) alternateFactor=75;
        if(!lastWasFB&&isFB) alternateFactor=75;
        if(lastWasFB&&isFB)  alternateFactor=35;
        if(!lastWasFB&&!isFB) alternateFactor=30;
      }
      ratioFactor=Math.round((ratioFactor+alternateFactor)/2);

      // Factor 4: Zone variety (0-100 scale)
      const zoneCount=pitchZoneHistory[`${p.type}:${recZ}`]||0;
      const total=Math.max(1,gameLog.length);
      const zoneUsagePct=zoneCount/total;
      const zoneFactor=Math.max(0,100-zoneUsagePct*300);

      // Factor 5: Historical outcomes for this pitch
      const eff=outcomes[p.type]||0;
      const outcomeFactor=Math.min(100,50+eff*2);

      // Game zone quality bonus (MLB The Show mechanics)
      const zoneBonus=gameZoneBonus(p.type,recZ,pitcherHand,effectiveBatterHand);

      // Steal threat: boost fastball
      const stealBonus=stealThreat&&isFB?15:0;

      // Penalties for repetitive patterns (no hard removal -- all pitches always shown)
      let patternPenalty=0;
      if(twoConsecNonFB) patternPenalty+=30;
      if(threeConsecFB)  patternPenalty+=25;
      if(sameZone3)      patternPenalty+=25;
      if(samePitchZone2) patternPenalty+=20;

      // Equal-weight composite score (timing factor added as flat bonus/penalty)
      const composite=(tunnelFactor+countFactor+ratioFactor+zoneFactor+outcomeFactor)/5;
      const finalScore=Math.round(Math.min(100,Math.max(0,composite+zoneBonus*0.3+stealBonus+timingFactor-patternPenalty)));

      return{...p,score:finalScore,chaseWeight:effectiveChaseWeight,stealThreat};
    })
    .sort((a,b)=>b.score-a.score);
  },[pitches,countKey,lastThrown,lastZone,outcomes,pitcherHand,pitchZoneHistory,gameLog,effectiveBatterHand,sequence,session,balls,strikes,swingTiming]);

  // Softmax-sample the top recommendation from scored pitches
  // This runs once per at-bat start (when selectedPitch is null/invalid)
  // Temperature controls variety: low=always top scorer, high=more variety
  const sampledTopType=useMemo(()=>{
    if(!scored.length) return null;
    const t=temperature||0.75;
    const idx=softmaxSample(scored.map(p=>p.score),t);
    return scored[idx]?.type||scored[0].type;
  },[scored,temperature]);

  // Active rec: if user has manually selected a pitch, use that; otherwise use sampled top
  const activePitch=scored.find(p=>selectedPitch&&p.type===selectedPitch)||scored.find(p=>p.type===sampledTopType)||scored[0];

  // Sync selectedPitch when current selection isn't valid
  useEffect(()=>{
    if(scored.length>0&&(!selectedPitch||!scored.find(p=>p.type===selectedPitch))){
      setSelectedPitch(sampledTopType||scored[0].type);
    }
  },[scored,sampledTopType]);
  const chaseW=activePitch?.chaseWeight||0;
  // Deterministic chase decision per at-bat state (use sequence length as seed to avoid re-render flicker)
  const useChase=chaseW>0&&((sequence.length*17+strikes*7)%100)<(chaseW*100);
  const recZone=activePitch
    ?(useChase?getChaseZone(activePitch.type,pitcherHand,effectiveBatterHand):getRecZone(activePitch.type,pitcherHand,effectiveBatterHand))
    :"2-2";
  const isChaseRec=useChase&&chaseW>0;
  const scoreColor=s=>s>=70?C.green:s>=45?C.gold:C.warn;

  const finalizeOutcome=(outcomeId,outcomeLabel,isOut,isOnBase)=>{
    const isPositive=["look","swing","weak"].includes(outcomeId)||isOut;
    onLogPitch({
      pitch:selectedPitch,zone:selectedZone,
      outcome:outcomeLabel,outcomeId,
      isPositive,isOut:isOut||false,
      onBase:isOnBase||false,
      batter:currentBatter?.name||"",
    });
    setSelectedZone(null);
    setSelectedPitch(null); // will reset to top recommendation on next render
    if(isOut||isOnBase) setShowOutConfirm(true);
  };

  const advanceNext=()=>{
    setBalls(0);setStrikes(0);setSelectedZone(null);setSelectedPitch(null);
    setSwingTiming(null);
    resetContactFlow();setShowOutConfirm(false);
    onNewAtBat();
  };

  // After recording an out, prompt runners to advance
  const triggerOutAdvancement=()=>{
    // Don't prompt for advancement on 3rd out -- inning is over, bases clear
    if(outs+1>=3){setShowOutConfirm(true);return;}
    const cb=session.bases||{first:null,second:null,third:null};
    const occupied=[
      cb.third&&{base:"third",name:cb.third.name||"Runner"},
      cb.second&&{base:"second",name:cb.second.name||"Runner"},
      cb.first&&{base:"first",name:cb.first.name||"Runner"},
    ].filter(Boolean);
    if(occupied.length>0){
      setRunnersToAdvance(occupied);setRunnerAdvanceIdx(0);
    } else {
      setShowOutConfirm(true);
    }
  };

  const handleRunnerAdvance=(dest)=>{
    const runner=runnersToAdvance[runnerAdvanceIdx];
    const cb=session.bases||{first:null,second:null,third:null};
    const nb={...cb};
    nb[runner.base]=null;
    if(dest==="adv1"){
      const next={first:"second",second:"third",third:null}[runner.base];
      if(next) nb[next]={name:runner.name,fast:false};
    } else if(dest==="adv2"){
      const next={first:"third",second:null,third:null}[runner.base];
      if(next) nb[next]={name:runner.name,fast:false};
    } else if(dest==="scored"){
      onAddRun(1);
      // runner cleared above
    } else if(dest==="out"){
      // runner put out on basepaths -- counts as additional out, runner removed
      onAddOut();
    } else {
      // stayed
      nb[runner.base]={name:runner.name,fast:false};
    }
    onUpdateBases(nb);
    const nextIdx=runnerAdvanceIdx+1;
    if(nextIdx>=runnersToAdvance.length){
      setRunnersToAdvance([]);setRunnerAdvanceIdx(0);
      setShowOutConfirm(true);
    } else {
      setRunnerAdvanceIdx(nextIdx);
    }
  };

  const handleOutcome=(oc)=>{
    if(!selectedZone) return;
    if(oc.id==="ball"){
      const nb=balls+1;setBalls(nb);
      // Log every ball -- not just the walk
      const isWalk=nb>=4;
      onLogPitch({pitch:selectedPitch,zone:selectedZone,
        outcome:isWalk?"Walk":`Ball ${nb}`,outcomeId:"ball",
        isPositive:false,isOut:false,onBase:isWalk,
        batter:currentBatter?.name||"",balls:nb-1,strikes,inning});
      setSelectedZone(null);setSelectedPitch(null);
      if(isWalk){
        // Force advancement cascade
        const cb=session.bases||{first:null,second:null,third:null};
        const nb2={...cb};
        const batterName=currentBatter?.name||"Batter";
        if(cb.first&&cb.second&&cb.third){
          nb2.third=cb.second;nb2.second=cb.first;nb2.first={name:batterName,fast:false};
        } else if(cb.first&&cb.second){
          nb2.third=cb.second;nb2.second=cb.first;nb2.first={name:batterName,fast:false};
        } else if(cb.first){
          nb2.second=cb.first;nb2.first={name:batterName,fast:false};
        } else {
          nb2.first={name:batterName,fast:false};
        }
        onUpdateBases(nb2);
        setOutConfirmType("walk");setShowOutConfirm(true);
      }
      return;
    }
    if(oc.id==="look"||oc.id==="swing"){
      const ns=strikes+1;setStrikes(ns);
      onLogPitch({pitch:selectedPitch,zone:selectedZone,outcome:oc.label,outcomeId:oc.id,
        isPositive:true,isOut:ns>=3,onBase:false,batter:currentBatter?.name||"",balls,strikes:ns-1,inning});
      setSelectedZone(null);setSelectedPitch(null);
      if(ns>=3){onAddOut();setOutConfirmType("k");triggerOutAdvancement();}
      // Swing timing prompt only for strike swinging (not called strike)
      else if(oc.id==="swing") setSwingTiming("pending");
      return;
    }
    if(oc.id==="foul"){
      if(strikes<2) setStrikes(2);
      onLogPitch({pitch:selectedPitch,zone:selectedZone,outcome:"Foul",outcomeId:"foul",
        isPositive:false,isOut:false,onBase:false,batter:currentBatter?.name||"",balls,strikes,inning});
      setSelectedZone(null);setSelectedPitch(null);
      setSwingTiming("pending");
      return;
    }
    if(oc.id==="hbp"){
      onLogPitch({pitch:selectedPitch,zone:selectedZone,outcome:"HBP",outcomeId:"hbp",
        isPositive:false,isOut:false,onBase:true,batter:currentBatter?.name||"",balls,strikes,inning});
      setSelectedZone(null);setSelectedPitch(null);
      const cb=session.bases||{first:null,second:null,third:null};
      onUpdateBases({...cb,first:{name:currentBatter?.name||"Batter",fast:false}});
      setOutConfirmType("hbp");setShowOutConfirm(true);
      return;
    }
    if(oc.id==="hard"||oc.id==="weak"){setContactPending(oc);setSwingTiming("pending");return;}
  };

  const handleHitResult=(result)=>{
    const cb=session.bases||{first:null,second:null,third:null};
    const occupied=[
      cb.first&&{base:"first",name:cb.first.name||"Runner"},
      cb.second&&{base:"second",name:cb.second.name||"Runner"},
      cb.third&&{base:"third",name:cb.third.name||"Runner"},
    ].filter(Boolean);
    const outcomeLabel=`${contactClass?.toUpperCase()||""} — ${result==="fc"?"Fielder's Choice":result.charAt(0).toUpperCase()+result.slice(1)}`;
    const isOut=result==="out";
    const isFC=result==="fc";
    const isError=result==="error";
    const isHit=!isOut&&!isError&&!isFC;
    onLogPitch({
      pitch:selectedPitch,zone:selectedZone,outcome:outcomeLabel,
      outcomeId:contactPending?.id||"hard",contactClass,hitResult:result,
      isPositive:isOut||isFC,isOut:isOut,onBase:isHit||isError||isFC,
      batter:currentBatter?.name||"",balls,strikes,inning,
    });
    setSelectedZone(null);setSelectedPitch(null);setHitResult(result);
    if(isOut){
      onAddOut();resetContactFlow();setOutConfirmType("out");triggerOutAdvancement();
      return;
    }
    if(isFC){
      // Fielder's choice: one runner is out, batter reaches first
      // Place batter on first, then ask which runner was out (via runnersToAdvance with "out" option)
      onAddOut();
      const newBases2={...cb,first:{name:currentBatter?.name||"Batter",fast:false}};
      onUpdateBases(newBases2);
      resetContactFlow();
      // Prompt for which runner was put out (if runners were on base)
      if(occupied.length>0){
        setRunnersToAdvance(occupied);setRunnerAdvanceIdx(0);
        // Using "out" destination to remove runner
      } else {
        advanceNext();
      }
      return;
    }
    // Place batter on base
    const newBases={...cb};
    if(result==="hr"){
      // Count batter + all occupied runners as runs
      const runsScored=1+occupied.length;
      onAddRun(runsScored);
      onUpdateBases({first:null,second:null,third:null});
      resetContactFlow();advanceNext();return;
    }
    if(result==="single") newBases.first={name:currentBatter?.name||"Batter",fast:false};
    else if(result==="error"){
      // Show base picker for error -- batter could end up anywhere
      onUpdateBases(newBases); // update with current state first
      setErrorBasePending(true);
      return;
    }
    else if(result==="double") newBases.second={name:currentBatter?.name||"Batter",fast:false};
    else if(result==="triple") newBases.third={name:currentBatter?.name||"Batter",fast:false};
    onUpdateBases(newBases);
    if(occupied.length>0){
      setRunnersToScore(occupied);setRunnerScoringIdx(0);
    } else {
      resetContactFlow();advanceNext();
    }
  };

  // Full advancement options for runners on hit/error: stayed, adv1, adv2, scored
  const handleRunnerAdvanceOnHit=(dest)=>{
    const runner=runnersToScore[runnerScoringIdx];
    const cb=session.bases||{first:null,second:null,third:null};
    const nb={...cb};
    nb[runner.base]=null;
    if(dest==="stayed"){
      nb[runner.base]={name:runner.name,fast:false};
    } else if(dest==="adv1"){
      const next={first:"second",second:"third",third:null}[runner.base];
      if(next) nb[next]={name:runner.name,fast:false};
    } else if(dest==="adv2"){
      const next={first:"third",second:null,third:null}[runner.base];
      if(next) nb[next]={name:runner.name,fast:false};
    } else if(dest==="scored"){
      onAddRun(1);
    }
    onUpdateBases(nb);
    const nextIdx=runnerScoringIdx+1;
    if(nextIdx>=runnersToScore.length){resetContactFlow();advanceNext();}
    else setRunnerScoringIdx(nextIdx);
  };

  const [subApiResults,setSubApiResults]=useState([]);
  const [subApiLoading,setSubApiLoading]=useState(false);
  useEffect(()=>{
    if(subQuery.length<2){setSubApiResults([]);return;}
    const t=setTimeout(async()=>{
      setSubApiLoading(true);
      try{const res=await searchBatters(subQuery);setSubApiResults(res.slice(0,6));}
      catch(e){setSubApiResults([]);}
      finally{setSubApiLoading(false);}
    },400);
    return()=>clearTimeout(t);
  },[subQuery]);
  const subResults=subApiResults;

  useEffect(()=>{
    if(pSwapQuery.length<2){setPSwapResults([]);return;}
    const t=setTimeout(async()=>{
      setPSwapLoading(true);
      try{const res=await searchPitchers(pSwapQuery);setPSwapResults(res.slice(0,6));}
      catch(e){setPSwapResults([]);}
      finally{setPSwapLoading(false);}
    },400);
    return()=>clearTimeout(t);
  },[pSwapQuery]);

  const currentBases=session.bases||{first:null,second:null,third:null};
  const stealThreat=activePitch?.stealThreat;

  // Base diamond toggle (manual adjust)
  const toggleBase=(b)=>{
    const cur=currentBases[b];
    if(cur) onUpdateBases({...currentBases,[b]:null});
    else onUpdateBases({...currentBases,[b]:{name:"Runner",fast:false}});
  };
  const toggleFast=(b)=>{
    const cur=currentBases[b];
    if(!cur) return;
    onUpdateBases({...currentBases,[b]:{...cur,fast:!cur.fast}});
  };

  // Runner advancement options based on hit type


  const [showEndGame,setShowEndGame]=useState(false);
  const outDots=[0,1,2].map(i=>i<outs);

  return(
    <div style={{padding:"14px 16px"}}>

      {/* End game confirmation overlay */}
      {showEndGame&&(
        <div style={{background:C.white,border:`2px solid ${C.warn}`,borderRadius:12,padding:"16px",marginBottom:12}}>
          <div style={{fontWeight:800,fontSize:14,color:C.text,marginBottom:4}}>End game?</div>
          <div style={{fontSize:12,color:C.textSoft,marginBottom:12,fontWeight:500}}>Choose what to do with this game's data.</div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            <button onClick={()=>{setShowEndGame(false);onEndGame("save");}} style={{...S.primaryBtn,background:C.green}}>Save to History</button>
            <button onClick={()=>{setShowEndGame(false);onEndGame("discard");}} style={{...S.secondaryBtn,color:C.warn,borderColor:C.warn}}>Discard &amp; Exit</button>
            <button onClick={()=>setShowEndGame(false)} style={S.ghostBtn}>Cancel</button>
          </div>
        </div>
      )}

      {/* End game + undo buttons */}
      {!showEndGame&&(
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
          <button onClick={onUndo} disabled={!(session.undoStack?.length>0)} style={{...S.ghostBtn,fontSize:10,padding:"3px 10px",opacity:session.undoStack?.length>0?1:0.35}}>↩ Undo</button>
          <button onClick={()=>setShowEndGame(true)} style={{...S.ghostBtn,fontSize:10,color:C.warn,borderColor:C.warn,padding:"3px 10px"}}>End Game</button>
        </div>
      )}

      {/* Batter banner */}
      {/* Pitcher / Batter info block */}
      <div style={{background:C.greenDim,border:`1.5px solid ${C.greenMid}`,borderRadius:8,padding:"10px 12px",marginBottom:10}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",gap:8,alignItems:"start"}}>
          {/* Pitcher side */}
          <div>
            <div style={{fontSize:9,fontWeight:800,color:C.greenMid,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:2}}>Pitcher</div>
            <div style={{fontSize:13,fontWeight:800,color:C.text,lineHeight:1.2}}>{session.pitcherName||"—"}</div>
            <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:4}}>
              <span style={{fontSize:10,color:C.textSoft,fontWeight:600}}>{pitcherHand==="L"?"LHP":"RHP"}</span>
              <button onClick={()=>{setShowPSwap(!showPSwap);setPSwapQuery("");setPSwapResults([]);}} style={{...S.ghostBtn,padding:"1px 6px",fontSize:8}}>Swap</button>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:2}}>
              {(()=>{
                const topVelo=pitches.length>0?Math.max(...pitches.map(p=>p.velo||0)):null;
                const items=[
                  ["VEL",topVelo!=null?topVelo:null],
                  ["CTL",session.pitcherControl||null],
                  ["MOV",session.pitcherMovement||null],
                ];
                return items.map(([lbl,val])=>(
                  <div key={lbl} style={{display:"flex",alignItems:"center",gap:4}}>
                    <span style={{fontSize:8,fontWeight:700,color:C.textSoft,textTransform:"uppercase",width:22}}>{lbl}</span>
                    <span style={{fontSize:11,fontWeight:800,color:C.text}}>{val!=null?val:"—"}</span>
                  </div>
                ));
              })()}
            </div>
          </div>
          {/* Divider */}
          <div style={{width:1,background:C.greenMid,opacity:0.3,alignSelf:"stretch"}}/>
          {/* Batter side */}
          <div>
            <div style={{fontSize:9,fontWeight:800,color:C.greenMid,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:2}}>At Bat</div>
            <div style={{fontSize:13,fontWeight:800,color:C.text,lineHeight:1.2}}>{currentBatter?.name||`Batter ${batterIdx+1}`}</div>
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
              <span style={{fontSize:10,color:C.textSoft,fontWeight:600}}>{currentBatter?.bat==="S"?"Switch":currentBatter?.bat==="L"?"LHB":"RHB"}</span>
              <button onClick={()=>setShowSub(!showSub)} style={{...S.ghostBtn,padding:"2px 7px",fontSize:9}}>Sub</button>
            </div>
            {(()=>{
              const hand=pitcherHand==="R"?"right":"left";
              const risp=!!(session.bases?.second||session.bases?.third);
              const pwr=batterStats?batterStats[`power_${hand}`]:null;
              const con=batterStats?(risp?batterStats.batting_clutch:batterStats[`contact_${hand}`]):null;
              const conLbl=risp?"CLU":"CON";
              return(
                <div style={{display:"flex",flexDirection:"column",gap:2}}>
                  {[["PWR",pwr],[conLbl,con]].map(([lbl,val])=>(
                    <div key={lbl} style={{display:"flex",alignItems:"center",gap:4}}>
                      <span style={{fontSize:8,fontWeight:700,color:C.textSoft,textTransform:"uppercase",width:22}}>{lbl}</span>
                      <span style={{fontSize:11,fontWeight:800,color:val>=70?C.warn:val>=50?C.gold:val!=null?C.green:C.textSoft}}>
                        {batterStatsLoading?"…":val!=null?val:"N/A"}
                      </span>
                      {lbl==="CLU"&&risp&&<span style={{fontSize:8,fontWeight:700,color:C.gold}}>RISP</span>}
                    </div>
                  ))}
                </div>
              );
            })()}
          </div>
        </div>
      </div>


      {/* Sub panel */}
      {showSub&&(
        <div style={{background:C.white,border:`1.5px solid ${C.border}`,borderRadius:8,padding:10,marginBottom:10}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <div style={{fontSize:10,fontWeight:800,color:C.textSoft,textTransform:"uppercase",letterSpacing:"0.08em"}}>
              {subSlot!==null?`Sub — replace slot ${subSlot+1} (${lineup?.[subSlot]?.name||"—"})` : "Substitution — pick a slot"}
            </div>
            <button onClick={()=>{setShowSub(false);setSubQuery("");setSubSlot(null);setSubApiResults([]);}} style={{fontSize:10,background:"none",border:"none",cursor:"pointer",color:C.textSoft,fontFamily:"'Neuton','Nunito',serif"}}>✕</button>
          </div>
          {/* Search first */}
          <input value={subQuery} onChange={e=>setSubQuery(e.target.value)}
            placeholder="Search any DD card batter..."
            style={{...S.input,width:"100%",boxSizing:"border-box",marginBottom:6}}/>
          {subApiLoading&&<div style={{fontSize:11,color:C.textSoft,padding:"4px 0"}}>Searching DD cards...</div>}
          {!subApiLoading&&subQuery.length>=2&&subApiResults.length===0&&(
            <div style={{marginBottom:6}}>
              <div style={{fontSize:11,color:C.textSoft,marginBottom:4}}>No DD card found.</div>
              <div style={{fontSize:10,color:C.textSoft,lineHeight:1.5,marginBottom:6}}>
                Collection reward cards won't appear in search. Try a different card for the same player, or add manually.
              </div>
              {subSlot!==null&&(
                <button onClick={()=>{
                  const manual={name:subQuery,bat:"R",ovr:0,rarity:"Manual",uuid:"",fromApi:false};
                  onSub(subSlot,manual);setShowSub(false);setSubQuery("");setSubSlot(null);setSubApiResults([]);
                }} style={{...S.ghostBtn,fontSize:10,padding:"5px 10px",width:"100%"}}>
                  + Add "{subQuery}" manually
                </button>
              )}
            </div>
          )}
          {subApiResults.length>0&&subSlot===null&&(
            <div style={{fontSize:10,color:C.warn,marginBottom:6,fontWeight:600}}>Select a lineup slot below to sub this player in</div>
          )}
          {subApiResults.map(b=>(
            <div key={b.name+(b.ovr||"")} onClick={()=>{
              if(subSlot!==null){
                onSub(subSlot,b);setShowSub(false);setSubQuery("");setSubSlot(null);setSubApiResults([]);
              }
            }} style={{
              padding:"8px 10px",background:subSlot!==null?C.surface:"rgba(0,0,0,0.03)",
              borderRadius:6,marginBottom:3,cursor:subSlot!==null?"pointer":"default",
              display:"flex",justifyContent:"space-between",alignItems:"center",
              opacity:subSlot!==null?1:0.7,
            }}>
              <div>
                <span style={{fontWeight:700,fontSize:12,color:C.text}}>{b.name}</span>
                {b.rarity&&<span style={{fontSize:9,color:C.textSoft,marginLeft:6}}>{b.rarity}</span>}
              </div>
              <span style={{fontSize:10,color:C.textSoft,fontWeight:600}}>{b.bat}H{b.ovr?` · ${b.ovr}`:""}</span>
            </div>
          ))}
          {/* Slot picker below search results */}
          <div style={{fontSize:9,fontWeight:700,color:C.textSoft,textTransform:"uppercase",marginTop:8,marginBottom:4}}>
            {subSlot===null?"Tap slot to replace:":"Slot selected — tap a player above to confirm"}
          </div>
          <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
            {lineup&&lineup.map((b,i)=>(
              <button key={i} onClick={()=>setSubSlot(subSlot===i?null:i)} style={{
                padding:"4px 8px",borderRadius:6,fontSize:10,fontWeight:700,fontFamily:"'Neuton','Nunito',serif",
                background:subSlot===i?C.green:C.surface,color:subSlot===i?"#fff":C.textMid,
                border:`1px solid ${subSlot===i?C.green:C.border}`,cursor:"pointer",
              }}>{i+1}. {b.name||"—"}</button>
            ))}
          </div>
        </div>
      )}

      {/* Pitcher swap panel */}
      {showPSwap&&(
        <div style={{background:C.white,border:`1.5px solid ${C.border}`,borderRadius:8,padding:10,marginBottom:10}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <div style={{fontSize:10,fontWeight:800,color:C.textSoft,textTransform:"uppercase",letterSpacing:"0.08em"}}>New Pitcher</div>
            <button onClick={()=>{setShowPSwap(false);setPSwapQuery("");setPSwapResults([]);}} style={{fontSize:10,background:"none",border:"none",cursor:"pointer",color:C.textSoft,fontFamily:"'Neuton','Nunito',serif"}}>✕</button>
          </div>
          <input value={pSwapQuery} onChange={e=>setPSwapQuery(e.target.value)}
            placeholder="Search DD card name..."
            style={{...S.input,width:"100%",boxSizing:"border-box",marginBottom:4}}/>
          {pSwapLoading&&<div style={{fontSize:11,color:C.textSoft,padding:"4px 0"}}>Searching...</div>}
          {!pSwapLoading&&pSwapQuery.length>=2&&pSwapResults.length===0&&(
            <div style={{fontSize:11,color:C.textSoft,padding:"4px 0"}}>No results found</div>
          )}
          {pSwapResults.map(p=>(
            <div key={p.name+(p.ovr||"")} onClick={async()=>{
              // Fetch full card to get pitches
              let fullCard=p;
              if(p.uuid){
                const data=await fetchItemByUuid(p.uuid);
                if(data) fullCard=apiCardToPitcher(data);
              }
              onPitcherSwap(fullCard);
              setShowPSwap(false);setPSwapQuery("");setPSwapResults([]);
            }} style={{
              padding:"9px 10px",background:C.surface,borderRadius:6,marginBottom:3,cursor:"pointer",
              display:"flex",justifyContent:"space-between",alignItems:"center",
            }}>
              <div>
                <span style={{fontWeight:700,fontSize:12,color:C.text}}>{p.name}</span>
                {p.rarity&&<span style={{fontSize:9,color:C.textSoft,marginLeft:6}}>{p.rarity}</span>}
              </div>
              <span style={{fontSize:10,color:C.textSoft,fontWeight:600}}>{p.hand}HP{p.ovr?` · ${p.ovr}`:""}</span>
            </div>
          ))}
        </div>
      )}

      {/* Count + bases bar */}
      <div style={{...S.countBar,gap:0,alignItems:"center"}}>
        {/* Count */}
        <div style={{display:"flex",alignItems:"baseline",gap:5}}><span style={S.countNum}>{balls}</span><span style={S.countLabel}>B</span></div>
        <div style={S.countDivider}/>
        <div style={{display:"flex",alignItems:"baseline",gap:5}}><span style={S.countNum}>{strikes}</span><span style={S.countLabel}>S</span></div>
        <div style={{flex:1}}/>

        {/* Bases diamond */}
        <div style={{position:"relative",width:52,height:52,marginRight:8}}>
          {/* Second base (top) */}
          <div onClick={()=>toggleBase("second")} style={{
            position:"absolute",top:0,left:"50%",transform:"translateX(-50%) rotate(45deg)",
            width:16,height:16,background:currentBases.second?C.gold:C.text,
            border:`2px solid ${currentBases.second?C.gold:C.textSoft}`,cursor:"pointer",
            boxShadow:currentBases.second?`0 0 6px ${C.gold}`:undefined,
          }}/>
          {/* Third base (left) */}
          <div onClick={()=>toggleBase("third")} style={{
            position:"absolute",top:"50%",left:0,transform:"translateY(-50%) rotate(45deg)",
            width:16,height:16,background:currentBases.third?C.gold:C.text,
            border:`2px solid ${currentBases.third?C.gold:C.textSoft}`,cursor:"pointer",
            boxShadow:currentBases.third?`0 0 6px ${C.gold}`:undefined,
          }}/>
          {/* First base (right) */}
          <div onClick={()=>toggleBase("first")} style={{
            position:"absolute",top:"50%",right:0,transform:"translateY(-50%) rotate(45deg)",
            width:16,height:16,background:currentBases.first?C.gold:C.text,
            border:`2px solid ${currentBases.first?C.gold:C.textSoft}`,cursor:"pointer",
            boxShadow:currentBases.first?`0 0 6px ${C.gold}`:undefined,
          }}/>
          {/* Home plate indicator */}
          <div style={{position:"absolute",bottom:0,left:"50%",transform:"translateX(-50%) rotate(45deg)",
            width:12,height:12,background:"transparent",border:`1.5px solid ${C.textSoft}`}}/>
        </div>

        {/* Outs */}
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
          <div style={{display:"flex",gap:3}}>
            {outDots.map((filled,i)=>(
              <div key={i} style={{width:9,height:9,borderRadius:"50%",background:filled?C.warn:C.surface,border:`1.5px solid ${filled?C.warn:C.border}`}}/>
            ))}
          </div>
          <span style={{fontSize:9,color:C.textSoft,fontWeight:700}}>OUTS</span>
        </div>
      </div>

      {/* Fast runner toggle for occupied bases */}
      {(currentBases.first||currentBases.second)&&(
        <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
          {[["first","1st"],["second","2nd"]].map(([b,lbl])=>currentBases[b]&&(
            <button key={b} onClick={()=>toggleFast(b)} style={{
              padding:"4px 10px",borderRadius:6,fontSize:11,fontWeight:700,fontFamily:"'Neuton','Nunito',serif",
              background:currentBases[b].fast?"#fdf3dc":C.surface,
              color:currentBases[b].fast?C.gold:C.textSoft,
              border:`1.5px solid ${currentBases[b].fast?C.gold:C.border}`,cursor:"pointer",
            }}>⚡ {lbl} fast?</button>
          ))}
        </div>
      )}

      {/* Steal threat notice */}
      {stealThreat&&!showOutConfirm&&!contactPending&&runnersToScore.length===0&&runnersToAdvance.length===0&&!errorBasePending&&(
        <div style={{background:C.goldLight,border:`1.5px solid ${C.gold}`,borderRadius:8,padding:"7px 12px",marginBottom:10,fontSize:11,fontWeight:700,color:C.gold}}>
          ⚡ Steal threat on base — stretch recommended, fastball frequency boosted
        </div>
      )}

      {/* Strikeout/walk/advance confirm */}
      {showOutConfirm&&(
        <div style={{background:C.white,border:`2px solid ${C.green}`,borderRadius:10,padding:"14px 16px",marginBottom:12,textAlign:"center"}}>
          <div style={{fontSize:14,fontWeight:800,color:C.text,marginBottom:4}}>
            {outConfirmType==="k"?"Strikeout ⚾":outConfirmType==="walk"?"Walk 🚶":outConfirmType==="hbp"?"HBP":outConfirmType==="out"?"Out ✓":"At-bat over"}
          </div>
          <div style={{fontSize:11,color:C.textSoft,marginBottom:12,fontWeight:500}}>Advance to next batter?</div>
          <button onClick={advanceNext} style={{...S.primaryBtn,width:"auto",padding:"10px 28px",fontSize:13}}>
            Next Batter →
          </button>
        </div>
      )}

      {/* Runner advancement after OUT */}
      {runnersToAdvance.length>0&&runnerAdvanceIdx<runnersToAdvance.length&&(
        <div style={{background:C.white,border:`2px solid ${C.green}`,borderRadius:10,padding:"14px 16px",marginBottom:12}}>
          <div style={{fontSize:12,fontWeight:800,color:C.text,marginBottom:4}}>
            Where did <span style={{color:C.green}}>{runnersToAdvance[runnerAdvanceIdx].name}</span> end up?
            <span style={{fontSize:10,color:C.textSoft,fontWeight:500,marginLeft:6}}>({runnersToAdvance[runnerAdvanceIdx].base})</span>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {[
              ["stayed","Stayed"],
              ["adv1","Advanced 1 base"],
              ["adv2","Advanced 2 bases"],
              ["scored","Scored"],
              ["out","Out on basepaths ✗"],
            ].map(([id,lbl])=>(
              <button key={id} onClick={()=>handleRunnerAdvance(id)} style={{
                padding:"10px 12px",borderRadius:8,
                border:`1.5px solid ${id==="out"?C.warn:C.border}`,
                background:id==="out"?C.warnLight:C.surface,
                color:id==="out"?C.warn:C.text,
                fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"'Neuton','Nunito',serif",textAlign:"left",
              }}>{lbl}</button>
            ))}
          </div>
        </div>
      )}

      {/* Error base placement */}
      {errorBasePending&&(
        <div style={{background:C.white,border:`2px solid ${C.gold}`,borderRadius:10,padding:"14px 16px",marginBottom:12}}>
          <div style={{fontSize:12,fontWeight:800,color:C.text,marginBottom:4}}>Error — where does the batter end up?</div>
          <div style={{fontSize:10,color:C.textSoft,marginBottom:10,fontWeight:500}}>Batter reached on error.</div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {[
              ["first","1st base"],
              ["second","2nd base"],
              ["third","3rd base"],
              ["scored","Scored (inside-the-park)"],
            ].map(([base,lbl])=>(
              <button key={base} onClick={()=>{
                const cb=session.bases||{first:null,second:null,third:null};
                const nb={...cb};
                if(base==="scored"){
                  onAddRun(1);
                } else {
                  nb[base]={name:currentBatter?.name||"Batter",fast:false};
                  onUpdateBases(nb);
                }
                const occupied=[
                  cb.first&&{base:"first",name:cb.first.name||"Runner"},
                  cb.second&&{base:"second",name:cb.second.name||"Runner"},
                  cb.third&&{base:"third",name:cb.third.name||"Runner"},
                ].filter(Boolean);
                setErrorBasePending(false);
                if(occupied.length>0){
                  setRunnersToScore(occupied);setRunnerScoringIdx(0);
                } else {
                  resetContactFlow();advanceNext();
                }
              }} style={{
                padding:"10px 12px",borderRadius:8,fontFamily:"'Neuton','Nunito',serif",
                fontSize:12,fontWeight:700,cursor:"pointer",textAlign:"left",
                border:`1.5px solid ${base==="scored"?C.green:C.border}`,
                background:base==="scored"?C.greenLight:C.surface,
                color:base==="scored"?C.green:C.text,
              }}>{lbl}</button>
            ))}
          </div>
        </div>
      )}

      {/* Runner advancement on HIT */}
      {runnersToScore.length>0&&runnerScoringIdx<runnersToScore.length&&(
        <div style={{background:C.white,border:`2px solid ${C.gold}`,borderRadius:10,padding:"14px 16px",marginBottom:12}}>
          <div style={{fontSize:12,fontWeight:800,color:C.text,marginBottom:8}}>
            Where did <span style={{color:C.gold}}>{runnersToScore[runnerScoringIdx].name}</span> end up?
            <span style={{fontSize:10,color:C.textSoft,fontWeight:500,marginLeft:6}}>({runnersToScore[runnerScoringIdx].base})</span>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {[
              ["stayed","Stayed"],
              ["adv1","Advanced 1 base"],
              ["adv2","Advanced 2 bases"],
              ["scored","Scored ✓"],
            ].map(([id,lbl])=>(
              <button key={id} onClick={()=>handleRunnerAdvanceOnHit(id)} style={{
                padding:"10px 12px",borderRadius:8,fontFamily:"'Neuton','Nunito',serif",fontSize:12,fontWeight:700,cursor:"pointer",textAlign:"left",
                border:`1.5px solid ${id==="scored"?C.green:C.border}`,
                background:id==="scored"?C.greenLight:C.surface,
                color:id==="scored"?C.green:C.text,
              }}>{lbl}</button>
            ))}
          </div>
        </div>
      )}

      {/* Swing timing prompt -- appears after swings, fouls, contact */}
      {swingTiming==="pending"&&(
        <div style={{background:C.white,border:`2px solid ${C.blue}`,borderRadius:10,padding:"14px 16px",marginBottom:12}}>
          <div style={{fontSize:12,fontWeight:800,color:C.text,marginBottom:8}}>How was the swing timing?</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {[["Early","🟡 Early","Hitter out in front"],["Good","🟢 On Time","Hitter on the barrel"],["Late","🔴 Late","Hitter behind it"]].map(([val,lbl,sub])=>(
              <button key={val} onClick={()=>setSwingTiming(val)} style={{
                flex:1,padding:"10px 8px",borderRadius:8,fontFamily:"'Neuton','Nunito',serif",
                border:`1.5px solid ${C.border}`,background:C.surface,
                cursor:"pointer",textAlign:"center",minWidth:80,
              }}>
                <div style={{fontSize:12,fontWeight:800,color:C.text}}>{lbl}</div>
                <div style={{fontSize:9,color:C.textSoft,marginTop:2}}>{sub}</div>
              </button>
            ))}
            <button onClick={()=>setSwingTiming(null)} style={{
              padding:"10px 8px",borderRadius:8,fontFamily:"'Neuton','Nunito',serif",
              border:`1.5px solid ${C.border}`,background:"none",
              cursor:"pointer",fontSize:10,color:C.textSoft,minWidth:60,
            }}>Skip</button>
          </div>
        </div>
      )}

      {/* Contact flow: step 1 GB/LD/FB, step 2 result */}
      {contactPending&&!showOutConfirm&&runnersToScore.length===0&&runnersToAdvance.length===0&&!errorBasePending&&runnerScoringIdx===0&&(
        <div style={{background:C.white,border:`1.5px solid ${C.border}`,borderRadius:10,padding:"12px 14px",marginBottom:12}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={{fontSize:11,fontWeight:800,color:C.textSoft,textTransform:"uppercase",letterSpacing:"0.08em"}}>
              {contactPending.label}
            </div>
            <button onClick={()=>{resetContactFlow();setSelectedZone(null);}} style={{
              fontSize:10,color:C.textSoft,background:"none",border:`1px solid ${C.border}`,
              borderRadius:5,padding:"2px 8px",cursor:"pointer",fontFamily:"'Neuton','Nunito',serif",fontWeight:600,
            }}>✕ Cancel</button>
          </div>

          {/* Step 1: contact classification */}
          {!contactClass&&(
            <>
              <div style={{fontSize:10,fontWeight:700,color:C.textSoft,marginBottom:6,textTransform:"uppercase"}}>Contact type</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
                {[["gb","Ground Ball"],["ld","Line Drive"],["fb","Fly Ball"]].map(([id,lbl])=>(
                  <button key={id} onClick={()=>setContactClass(id)} style={{
                    padding:"11px 6px",borderRadius:8,border:`1.5px solid ${C.border}`,background:C.surface,
                    color:C.text,fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"'Neuton','Nunito',serif",
                  }}>{lbl}</button>
                ))}
              </div>
            </>
          )}

          {/* Step 2: result */}
          {contactClass&&(
            <>
              <div style={{fontSize:10,fontWeight:700,color:C.textSoft,marginBottom:6,textTransform:"uppercase"}}>
                {contactClass==="gb"?"Ground Ball":contactClass==="ld"?"Line Drive":"Fly Ball"} — result
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:6}}>
                {[["out","Out ✓"],["single","Single"],["double","Double"],["triple","Triple"],["hr","HR 🏠"],["error","Error"],["fc","FC"]].map(([id,lbl])=>(
                  <button key={id} onClick={()=>handleHitResult(id)} style={{
                    padding:"10px 4px",borderRadius:8,fontFamily:"'Neuton','Nunito',serif",fontSize:11,fontWeight:800,cursor:"pointer",
                    border:`1.5px solid ${id==="out"?C.green:id==="error"?C.gold:C.warn}`,
                    background:id==="out"?C.greenLight:id==="error"?C.goldLight:C.warnLight,
                    color:id==="out"?C.green:id==="error"?C.gold:C.warn,
                  }}>{lbl}</button>
                ))}
              </div>
              <button onClick={()=>setContactClass(null)} style={{
                fontSize:10,color:C.textSoft,background:"none",border:"none",cursor:"pointer",
                fontFamily:"'Neuton','Nunito',serif",fontWeight:600,padding:0,
              }}>← Back to contact type</button>
            </>
          )}
        </div>
      )}

      {/* Recommendation box -- driven by activePitch */}
      {activePitch&&!showOutConfirm&&!contactPending&&runnersToScore.length===0&&runnersToAdvance.length===0&&!errorBasePending&&(
        <div style={S.recBox}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div>
              <div style={S.recLabel}>Throw This</div>
              <div style={S.recPitch}>{activePitch.type}</div>
              <div style={S.recVelo}>{activePitch.velo} mph</div>
            </div>
            <div style={{...S.scoreCircle,borderColor:scoreColor(activePitch.score),color:scoreColor(activePitch.score)}}>{activePitch.score}</div>
          </div>
          <div style={S.recReason}>
            {isChaseRec&&<span style={{color:C.blue,fontWeight:700}}>🎯 Chase pitch — </span>}
            {getFullReason(lastThrown,lastZone,activePitch.type,recZone,activePitch.score,effectiveBatterHand)}
          </div>
        </div>
      )}

      {!showOutConfirm&&!contactPending&&runnersToScore.length===0&&runnersToAdvance.length===0&&!errorBasePending&&(<>
        {/* Pitch selector */}
        <div style={{marginBottom:12}}>
          <div style={S.sectionLabel}>Select Pitch</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
            {scored.map(p=>{
              const mv=getMovement(p.type,p.velo,pitcherHand);
              // Map movement to dot position in 20x20 SVG
              // h: -20..+20in maps to x:2..18, v: -15..+20in maps to y:18..2 (flipped)
              const dotX=Math.round(10+(mv.h/20)*8);
              const dotY=Math.round(10-(mv.v/20)*8);
              const cx=Math.min(18,Math.max(2,dotX));
              const cy=Math.min(18,Math.max(2,dotY));
              const isActive=selectedPitch===p.type;
              return(
                <button key={p.type} onClick={()=>setSelectedPitch(p.type)} style={{
                  padding:"5px 8px",borderRadius:7,fontFamily:"'Neuton','Nunito',serif",
                  border:`1.5px solid ${isActive?C.greenMid:C.border}`,
                  background:isActive?C.greenDim:C.white,
                  color:isActive?C.green:C.textMid,
                  fontSize:11,fontWeight:700,cursor:"pointer",
                  display:"flex",alignItems:"center",gap:5,
                }}>
                  <svg width="18" height="18" viewBox="0 0 20 20" style={{flexShrink:0}}>
                    <rect x="0" y="0" width="20" height="20" rx="3" fill={isActive?"rgba(45,106,79,0.1)":"rgba(0,0,0,0.04)"}/>
                    {/* strike zone outline */}
                    <rect x="5" y="5" width="10" height="10" fill="none" stroke={isActive?C.greenMid:C.border} strokeWidth="0.8"/>
                    {/* center cross */}
                    <line x1="10" y1="5" x2="10" y2="15" stroke={isActive?C.greenMid:C.border} strokeWidth="0.4"/>
                    <line x1="5" y1="10" x2="15" y2="10" stroke={isActive?C.greenMid:C.border} strokeWidth="0.4"/>
                    {/* movement dot */}
                    <circle cx={cx} cy={cy} r="2.5" fill={isActive?C.green:C.textMid} opacity="0.9"/>
                  </svg>
                  <div>
                    <div style={{lineHeight:1.1}}>{p.type}</div>
                    <div style={{fontSize:9,opacity:0.6,fontWeight:500}}>{p.score}</div>
                  </div>
                </button>
              );
            })}
          </div>
        </div>

        {/* Zone grid */}
        <div style={{marginBottom:12}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
            <div style={S.sectionLabel}>Location</div>
            <div style={{display:"flex",gap:10,alignItems:"center"}}>
              <span style={{fontSize:10,color:C.blue,fontWeight:700}}>🔵 Target</span>
              {selectedZone&&<span style={{fontSize:11,color:C.green,fontWeight:700}}>🟢 {zoneLabel(selectedZone,effectiveBatterHand)}</span>}
            </div>
          </div>
          {/* Pitcher hand label above */}
          <div style={{textAlign:"center",fontSize:10,fontWeight:700,color:C.textSoft,marginBottom:3}}>
            {pitcherHand==="L"?"← LHP":"RHP →"}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:4}}>
            {/* RHB silhouette on LEFT, LHB silhouette on RIGHT */}
            {effectiveBatterHand!=="L"&&(
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",width:36,flexShrink:0}}>
                <svg width="34" height="80" viewBox="0 0 34 80" style={{display:"block"}}>
                  <circle cx="17" cy="8" r="6.5" fill={C.green} opacity="0.85"/>
                  <rect x="11" y="16" width="12" height="22" rx="3" fill={C.green} opacity="0.85"/>
                  <rect x="11" y="37" width="5" height="20" rx="2.5" fill={C.greenMid} opacity="0.8"/>
                  <rect x="17" y="37" width="5" height="18" rx="2.5" fill={C.green} opacity="0.85"/>
                  <line x1="11" y1="20" x2="4" y2="14" stroke={C.green} strokeWidth="4" strokeLinecap="round" opacity="0.85"/>
                  <line x1="23" y1="22" x2="30" y2="18" stroke={C.green} strokeWidth="4" strokeLinecap="round" opacity="0.85"/>
                  <rect x="24" y="11" width="3" height="16" rx="1.5" fill={C.gold} opacity="0.95" transform="rotate(-15,25,19)"/>
                  <circle cx="25.5" cy="10" r="2" fill={C.gold} opacity="0.95" transform="rotate(-15,25,19)"/>
                </svg>
                <div style={{fontSize:9,fontWeight:800,color:C.green,marginTop:2}}>{effectiveBatterHand==="S"?"S":"R"}</div>
              </div>
            )}
            {/* Batter hand label */}
            <div style={{
              writingMode:"vertical-rl",transform:"rotate(180deg)",
              fontSize:9,fontWeight:700,color:C.textMid,
              background:C.greenDim,border:`1px solid ${C.greenMid}`,borderRadius:4,
              padding:"6px 3px",letterSpacing:"0.05em",whiteSpace:"nowrap",
            }}>
              {effectiveBatterHand==="L"?"LHB":"RHB"}
