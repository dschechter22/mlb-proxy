async function saveGame(session) {
  try {
    const { data: game, error: ge } = await sb.from("games").insert({
      pitcher_name: session.pitcherName || "Unknown",
      pitcher_hand: session.pitcherHand || "R",
      pitcher_ovr: session.pitcherOvr || 0,
      my_score: session.myScore || 0,
      opp_score: session.oppScore || 0,
      innings: session.inning || 1,
      total_pitches: session.gameLog?.length || 0,
      game_log: session.gameLog || [],
    }).select().single();
    if (ge) { console.error("Save game error:", ge); return null; }
    if (session.gameLog?.length > 0) {
      const rows = session.gameLog.map(e => ({
        game_id: game.id,
        pitcher_name: session.pitcherName || "Unknown",
        batter_name: e.batter || "",
        batter_hand: e.batterHand || "",
        pitch_type: e.pitch,
        zone: e.zone,
        outcome: e.outcome,
        outcome_id: e.outcomeId,
        is_out: e.isOut || false,
        on_base: e.onBase || false,
        inning: e.inning || 1,
        balls: e.balls || 0,
        strikes: e.strikes || 0,
      }));
      const { error: pe } = await sb.from("pitch_log").insert(rows);
      if (pe) console.error("Save pitches error:", pe);
    }
    return game.id;
  } catch(e) { console.error("saveGame:", e); return null; }
}
async function loadGames(limit=30) {

  return data || [];
}

const PROXY_BASE = "https://mlb-proxy-lovat.vercel.app";

async function mlbFetch(path) {
  try {
    // Split path into pathname and query string to encode separately
    const [pathname, qs] = path.split("?");
    const proxyUrl = qs
      ? `${PROXY_BASE}/api/proxy?path=${encodeURIComponent(pathname + "?" + qs)}`
      : `${PROXY_BASE}/api/proxy?path=${encodeURIComponent(pathname)}`;
    console.log("mlbFetch URL:", proxyUrl);
    const res = await fetch(proxyUrl);
    console.log("mlbFetch status:", res.status);
    if (res.ok) {
      const data = await res.json();
      if (!data.error) return data;
      console.error("mlbFetch API error:", data.error);
    }
  } catch(e) {
    console.error("mlbFetch exception:", e.message);
  }
  return null;
}

// Normalise pitch name from API to our internal names
const PITCH_NAME_MAP = {
  "Four-Seam Fastball": "4-Seam FB",
  "Four Seam Fastball": "4-Seam FB",
  "4-Seam Fastball": "4-Seam FB",
  "Two-Seam Fastball": "2-Seam FB",

  "Slurve": "Curveball",
  "Changeup": "Changeup",
  "Change Up": "Changeup",
  "Circle Change": "Changeup",
  "Circle Changeup": "Changeup",
  "Splitter": "Splitter",
  "Split-Finger": "Splitter",
  "Knuckleball": "Knuckleball",
  "Running Fastball": "2-Seam FB",
};

function normalizePitchName(name) {
  return PITCH_NAME_MAP[name] || name;
}

function getPitchList(card) {
  // MLB26 API nests pitches under card.pitches.pitches
  if (card.pitches && card.pitches.pitches) return card.pitches.pitches;
  if (Array.isArray(card.pitches)) return card.pitches;
  return [];
}

function cardIsHitter(c) {
  return c.is_hitter === true || c.is_hitter === 1;
}

function apiCardToPitcher(card) {
  const pitchList = getPitchList(card);
  const pitches = pitchList
    .map(p => ({ type: normalizePitchName(p.name), velo: p.speed || 85 }))
    .filter(p => PITCH_PROFILES[p.type]);
  const pos = card.display_position || "";
  const role = (pos==="RP"||pos==="CL"||pos==="MR") ? "RP" : "SP";
  return {
    name: card.name,
    team: card.team || "",
    hand: card.throw_hand || "R",
    role,
    ovr: card.ovr || card.new_rank || 0,
    rarity: card.rarity || "",
    series: card.series || "",
    img: card.baked_img || card.img || "",
    pitches,
    speed: card.speed || 50,
    fromApi: true,
  };
}

async function fetchItemByUuid(uuid) {
  return await mlbFetch(`/apis/item.json?uuid=${uuid}`);
}

async function searchPitchers(query) {
  if (!query || query.length < 2) return [];
  const data = await mlbFetch(`/apis/listings.json?type=mlb_card&name=${encodeURIComponent(query)}`);
  if (!data) throw new Error("No response from proxy");
  const listings = (data.listings || []).slice(0, 15);
  console.log("Listings found:", listings.length, listings.map(l=>(l.item||l).name));
  // Fetch full items in parallel -- don't pre-filter, let pitch data decide
  const fullItems = await Promise.all(
    listings.map(async l => {
      const stub = l.item || l;
      const full = await fetchItemByUuid(stub.uuid);
      console.log("Full item:", stub.name, "is_hitter:", full?.is_hitter, "pitches:", getPitchList(full||{}).length);
      return full;
    })
  );
  return fullItems
    .filter(c => c && !cardIsHitter(c) && getPitchList(c).length >= 2)
    .map(apiCardToPitcher);
}

async function searchBatters(query) {
  if (!query || query.length < 2) return [];
  const data = await mlbFetch(`/apis/listings.json?type=mlb_card&name=${encodeURIComponent(query)}`);
  if (!data) return [];
  const pitcherPositions = new Set(["SP","RP","CL","MR"]);
  return (data.listings || [])
    .map(l => l.item || l)
    .filter(c => {
      // is_hitter can be true/1/false/0 -- also check display_position as fallback
      if (c.is_hitter === true || c.is_hitter === 1) return true;
      if (c.is_hitter === false || c.is_hitter === 0) return false;
      // fallback: if no is_hitter field, exclude known pitcher positions
      return !pitcherPositions.has(c.display_position);
    })
    .map(c => ({
      name: c.name,
      team: c.team_short_name || c.team || "",
      bat: c.bat_hand || "R",
      ovr: c.ovr || c.new_rank || 0,
      rarity: c.rarity || "",
      series: c.series || "",
      speed: c.speed || 50,
      fromApi: true,
    }));
}

// Game-specific zone quality scoring (MLB The Show mechanics)
// zone id = "row-col", rows 0=high..4=low, cols 0=away..4=inside (from batter's perspective)
// Returns bonus/penalty to add to score based on pitch type, zone, matchup handedness
function gameZoneBonus(pitchType,zoneId,pitcherHand,batterHand){
  if(!zoneId) return 0;
  const[r,c]=zoneId.split("-").map(Number);
  const inZone=r>=1&&r<=3&&c>=1&&c<=3;
  const sameHand=pitcherHand===batterHand;
  const prof=PITCH_PROFILES[pitchType];
  const isFast=prof?.type==="fastball";
  const isBreaking=prof?.type==="breaking";
  const isOffspeed=prof?.type==="offspeed";
  const isSinker=pitchType==="Sinker";
  const isSlider=pitchType==="Slider"||pitchType==="Sweeper";
  const isCutter=pitchType==="Cutter";
  const isCurve=pitchType==="Curveball"||pitchType==="12-6 Curve";

  // Column definitions from batter's perspective:
  // col 0,1 = away side; col 2 = middle; col 3,4 = inside
  const isAway=c<=1; const isMid=c===2; const isInside=c>=3;
  const isHigh=r<=1; const isMidV=r===2; const isLow=r>=3;
  const isWayInside=c===4; const isWayAway=c===0;

  let bonus=0;

  if(isFast){
    // High in zone: always good
    if(isHigh&&inZone) bonus+=12;
    // High middle: ok
    if(isHigh&&isMid&&inZone) bonus+=5;
    // Middle middle / low middle: bad
    if(isMid&&inZone&&!isHigh) bonus-=15;
    if(isLow&&isMid&&inZone) bonus-=20;
    // Away in zone: bad for fastballs
    if(isAway&&inZone) bonus-=10;
    // Inside same hand: good
    if(isInside&&inZone&&sameHand) bonus+=10;
    // Inside opposite hand: bad (gets barrel)
    if(isInside&&inZone&&!sameHand) bonus-=18;
    // Way inside opp hand (ball): ok as waste
    if(isWayInside&&!inZone&&!sameHand) bonus+=5;
    // Low in zone: not great for fast
    if(isLow&&inZone&&!isMid) bonus-=8;
    // Sinker: same hand inside works
    if(isSinker&&isInside&&sameHand) bonus+=8;
  }

  if(isBreaking){
    // Slider / Sweeper: bad in zone, good outside
    if(isSlider){
      if(inZone) bonus-=14;
      if(!inZone) bonus+=10;
      // Backdoor slider (away side, low) same hand: good even in zone
      if(isAway&&isLow&&sameHand) bonus+=18;
      // Backdoor middle: decent
      if(isAway&&isMidV&&sameHand) bonus+=10;
    }
    // Cutter: backdoor low and middle good
    if(isCutter){
      if(isAway&&isLow) bonus+=16;
      if(isAway&&isMidV) bonus+=10;
      if(isAway&&isHigh) bonus+=4;
      if(isInside&&inZone&&!sameHand) bonus-=16;
    }
    // Curveball: high/low ok, not inside
    if(isCurve){
      if(isInside&&inZone) bonus-=12;
      if(!inZone&&isLow) bonus+=8;
      if(isHigh&&inZone) bonus+=5; // 12-6 high then break down
    }
  }

  if(isOffspeed){
    // Off-speed inside in zone: bad unless same hand and away
    if(isInside&&inZone&&!sameHand) bonus-=16;
    if(isInside&&inZone&&sameHand) bonus-=6; // still risky
    // Off-speed outside in zone: good
    if(isAway&&inZone) bonus+=12;
    // Off-speed outside of zone: also good
    if(isAway&&!inZone) bonus+=8;
    // Off-speed middle: risky
    if(isMid&&inZone) bonus-=8;
  }

  return bonus;
}

function getMovement(pitch,velo,hand){
  const p=PITCH_PROFILES[pitch]; if(!p) return {h:0,v:0};
  const s=0.8+0.2*(velo/p.velo_base);
  let h=p.h*s,v=p.v*s;
  if(hand==="L") h=-h;
  return {h,v};
}

function tunnelScore(p1,p2,v1,v2,hand){
  const m1=getMovement(p1,v1,hand),m2=getMovement(p2,v2,hand);
  const vd=Math.abs(v1-v2),hd=Math.abs(m1.h-m2.h),vdd=Math.abs(m1.v-m2.v);
  return Math.min(100,Math.max(0,100-hd*2-vdd*2)+(vd>=8&&vd<=18?15:vd>18?5:-5));
}

function getTunnelReason(last,rec,score){
  const lp=PITCH_PROFILES[last],rp=PITCH_PROFILES[rec];
  if(!lp||!rp) return "Good sequencing option";
  if(score>=70) return `Strong tunnel off ${last}`;
  if(lp.type===rp.type) return `Mix in a different shape`;
  if(rp.type==="offspeed"&&lp.type==="fastball") return `Velocity change off ${last}`;
  if(rp.type==="breaking"&&lp.type==="fastball") return `Breaking ball tunnels off fastball`;
  if(rp.type==="fastball"&&lp.type!=="fastball") return `Reset hitter's eye with heater`;
  return `Good shape contrast to ${last}`;
}

function ZoneGrid({onSelect,selected,recommended}){
  const zones=[];
  for(let r=0;r<5;r++) for(let c=0;c<5;c++) zones.push({id:`${r}-${c}`,inZone:r>=1&&r<=3&&c>=1&&c<=3});
  return(
    <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:3}}>
      {zones.map(z=>{
        const isSel=z.id===selected,isRec=z.id===recommended;
        return(
          <div key={z.id} onClick={()=>onSelect(z.id)} style={{
            borderRadius:6,minHeight:44,cursor:"pointer",transition:"all 0.1s",
            background:isSel?C.green:isRec?C.blueLight:z.inZone?C.white:C.surface,
            border:`1.5px solid ${isSel?C.green:isRec?C.blue:C.border}`,
            boxShadow:isSel?`0 0 0 3px ${C.greenLight}`:isRec?`0 0 0 2px ${C.blueLight}`:"none",

// ─── Zone label helper ────────────────────────────────────────────────────────
function zoneLabel(id){
  if(!id) return "";
  const[r,c]=id.split("-").map(Number);
  const rows=["High","High","Mid","Low","Low"];
  const cols=["Way Out","Out","Middle","In","Way In"];
  const inZone=r>=1&&r<=3&&c>=1&&c<=3;
  return `${rows[r]||""} ${cols[c]||""}${inZone?"":" (ball)"}`.trim();
}

// ─── Tunnel + location reason ─────────────────────────────────────────────────
function getFullReason(lastPitch,lastZone,recPitch,recZone,score){
  const lp=PITCH_PROFILES[lastPitch],rp=PITCH_PROFILES[recPitch];
  if(!lp||!rp) return "Good sequencing option";
  const zoneTxt=recZone?` — target ${zoneLabel(recZone)}`:"";
  // Check if zones are on same horizontal band (same row ±1)
  let zoneContext="";
  if(lastZone&&recZone){
    const[lr,lc]=lastZone.split("-").map(Number);
    const[rr,rc]=recZone.split("-").map(Number);
    const sameRow=Math.abs(lr-rr)<=1;
    const sameCol=Math.abs(lc-rc)<=1;
    if(sameRow&&sameCol) zoneContext=" Same quadrant reinforces tunnel — hitter sees identical release.";
    else if(sameRow) zoneContext=" Same vertical band — tunnel holds, breaks to a different side.";
    else zoneContext=" Different vertical band — tunnel relies on release point match, not location.";
  }
  if(score>=70) return `Strong tunnel off ${lastPitch}${zoneTxt}.${zoneContext}`;
  if(lp.type===rp.type) return `Same pitch family — mix a different shape${zoneTxt}.${zoneContext}`;
  if(rp.type==="offspeed"&&lp.type==="fastball") return `Velocity change off ${lastPitch}${zoneTxt}.${zoneContext}`;
  if(rp.type==="breaking"&&lp.type==="fastball") return `Breaking ball off fastball tunnel${zoneTxt}.${zoneContext}`;
  if(rp.type==="fastball"&&lp.type!=="fastball") return `Reset hitter's eye with heater${zoneTxt}.${zoneContext}`;
  return `Shape contrast to ${lastPitch}${zoneTxt}.${zoneContext}`;
}

// ─── At-Bat Tab ───────────────────────────────────────────────────────────────
function AtBatTab({session,onLogPitch,onNewAtBat,onSub,onAddOut,onUpdateBases}){
  const{pitcherHand,pitches,sequence,outcomes,gameLog,lineup,batterIdx,outs,inning,bases}=session;
  const[selectedZone,setSelectedZone]=useState(null);
  const[selectedPitch,setSelectedPitch]=useState(pitches[0].type);
  const[balls,setBalls]=useState(0);
  const[strikes,setStrikes]=useState(0);
  const[showSub,setShowSub]=useState(false);
  const[subQuery,setSubQuery]=useState("");
  const[subSlot,setSubSlot]=useState(null);
  const[contactPending,setContactPending]=useState(null);
  const[showOutConfirm,setShowOutConfirm]=useState(false);
  // Hit type flow: "single"|"double"|"triple"|"hr"|null
  const[hitType,setHitType]=useState(null);
  // Runner advancement: list of runners that need to be resolved
  const[runnersToResolve,setRunnersToResolve]=useState([]); // [{base,name}]
  const[resolvedRunners,setResolvedRunners]=useState([]); // {base->newBase or "scored"}
  const[runnerResolutionIdx,setRunnerResolutionIdx]=useState(0);

  const currentBatter=lineup?lineup[batterIdx]:null;
  const effectiveBatterHand=currentBatter?(currentBatter.bat==="S"?"R":currentBatter.bat):session.batterHand;
  const countKey=`${balls}-${strikes}`;
  const lastEntry=sequence.length>0?sequence[sequence.length-1]:null;
  const lastThrown=lastEntry?lastEntry.pitch:null;
  const lastZone=lastEntry?lastEntry.zone:null;

  const pitchZoneHistory=useMemo(()=>{
    const map={};
    gameLog.forEach(e=>{const k=`${e.pitch}:${e.zone}`;map[k]=(map[k]||0)+1;});
    return map;
  },[gameLog]);

  const scored=useMemo(()=>{
    // Repetition cap: find how many consecutive fouls on the same pitch at top of sequence
    const recentSame=(type)=>{
      let count=0;
      for(let i=sequence.length-1;i>=0;i--){
        const e=sequence[i];
        if(e.pitch===type&&e.outcomeId==="foul") count++;
        else break;
      }
      return count;
    };

    // Score differential context
    const scoreDiff=(session.myScore||0)-(session.oppScore||0);
    // Behind by 2+: be more aggressive in zone; ahead by 2+: can afford chase pitches more
    const gameCtx=scoreDiff<=-2?"behind":scoreDiff>=2?"ahead":"tied";

    const chaseWeight=CHASE_WEIGHT[countKey]||0;
    // Ahead: slightly more chase; behind: slightly less (can't walk guys in)
    const effectiveChaseWeight=gameCtx==="ahead"?Math.min(chaseWeight+0.1,0.7):gameCtx==="behind"?Math.max(chaseWeight-0.1,0):chaseWeight;

    return pitches.map(p=>{
      const prof=PITCH_PROFILES[p.type],type=prof?.type||"fastball";
      const isFastType=type==="fastball";
      const cm=COUNT_LEVERAGE[countKey]?.[type]||1.0;
      let score=lastThrown?tunnelScore(lastThrown,p.type,pitches.find(x=>x.type===lastThrown)?.velo||90,p.velo,pitcherHand):60;
      if(p.type===lastThrown) score-=20;
      score*=cm;
      const eff=outcomes[p.type]||0;
      score+=eff;
      // Game-specific zone quality bonus
      const recZ=ZONE_REC[p.type]?.[effectiveBatterHand]||"2-2";
      score+=gameZoneBonus(p.type,recZ,pitcherHand,effectiveBatterHand);

      const zoneCount=pitchZoneHistory[`${p.type}:${recZ}`]||0;
      const total=gameLog.length;
      if(zoneCount>0){
        score-=total<15?zoneCount*6:eff<=0?zoneCount*3:0;
      }
      // Repetition penalty
      const consecutiveFouls=recentSame(p.type);
      if(consecutiveFouls>=3) score-=consecutiveFouls*12;

      // Steal threat: runner on 1st or 2nd flagged fast -> boost fastball frequency
      const currentBases=session.bases||{first:null,second:null,third:null};
      const stealThreat=(currentBases.first?.fast||currentBases.second?.fast);
      if(stealThreat&&isFastType) score+=10;

      return{...p,score:Math.round(Math.min(100,Math.max(0,score))),chaseWeight:effectiveChaseWeight,stealThreat:!!stealThreat};
    }).sort((a,b)=>b.score-a.score);
  },[pitches,countKey,lastThrown,outcomes,pitcherHand,pitchZoneHistory,gameLog,effectiveBatterHand,sequence,session]);

  // Active rec drives both the box and the blue baseball
  const activePitch=scored.find(p=>p.type===selectedPitch)||scored[0];
  const chaseW=activePitch?.chaseWeight||0;
  // Deterministic chase decision per at-bat state (use sequence length as seed to avoid re-render flicker)
  const useChase=chaseW>0&&((sequence.length*17+strikes*7)%100)<(chaseW*100);
  const recZone=activePitch
    ?(useChase?(ZONE_CHASE[activePitch.type]?.[effectiveBatterHand]||"4-2"):(ZONE_REC[activePitch.type]?.[effectiveBatterHand]||"2-2"))
    :"2-2";
  const isChaseRec=useChase&&chaseW>0;
  const scoreColor=s=>s>=70?C.green:s>=45?C.gold:C.warn;

  const finalizeOutcome=(outcomeId,outcomeLabel,isOut,isOnBase)=>{
    const isPositive=["look","swing","weak"].includes(outcomeId)||isOut;
    onLogPitch({
      pitch:selectedPitch,zone:selectedZone,
      outcome:outcomeLabel,outcomeId,
      isPositive,isOut:isOut||false,
      onBase:isOnBase||false,
      batter:currentBatter?.name||"",
    });
    if(isOut||isOnBase) setShowOutConfirm(true);
  };

  const handleOutcome=(oc)=>{
    if(!selectedZone) return;
    if(oc.id==="ball"){
      const nb=balls+1;
      setBalls(nb);
      if(nb>=4){
        // Walk -- log then show confirm
        onLogPitch({pitch:selectedPitch,zone:selectedZone,outcome:"Walk",outcomeId:"walk",isPositive:false,isOut:false,onBase:true,batter:currentBatter?.name||""});
        setSelectedZone(null);
        setShowOutConfirm(true);
      } else { setSelectedZone(null); }
      return;
    }
    if(oc.id==="look"||oc.id==="swing"){
      const ns=strikes+1;
      setStrikes(ns);
      onLogPitch({pitch:selectedPitch,zone:selectedZone,outcome:oc.label,outcomeId:oc.id,isPositive:true,isOut:false,onBase:false,batter:currentBatter?.name||""});
      setSelectedZone(null);
      if(ns>=3) setShowOutConfirm(true); // K -- show confirm
      return;
    }
    if(oc.id==="foul"){
      if(strikes<2) setStrikes(2);
      onLogPitch({pitch:selectedPitch,zone:selectedZone,outcome:"Foul",outcomeId:"foul",isPositive:false,isOut:false,onBase:false,batter:currentBatter?.name||""});
      setSelectedZone(null);
      return;
    }
    if(oc.id==="hbp"){
      onLogPitch({pitch:selectedPitch,zone:selectedZone,outcome:"HBP",outcomeId:"hbp",isPositive:false,isOut:false,onBase:true,batter:currentBatter?.name||""});
      setSelectedZone(null);
      setShowOutConfirm(true);
      return;
    }
    // hard / weak -- show secondary
    if(oc.id==="hard"||oc.id==="weak") { setContactPending(oc); setSelectedZone(s=>s); return; }
  };

  const startHitFlow=(contactOc,hitTypeId)=>{
    // Log the pitch
    onLogPitch({pitch:selectedPitch,zone:selectedZone,outcome:hitTypeId.charAt(0).toUpperCase()+hitTypeId.slice(1),outcomeId:contactOc.id,isPositive:false,isOut:false,onBase:true,batter:currentBatter?.name||""});
    setSelectedZone(null);
    setContactPending(null);
    const currentBases=session.bases||{first:null,second:null,third:null};
    const occupied=[
      currentBases.first&&{base:"first",name:currentBases.first.name||"Runner"},
      currentBases.second&&{base:"second",name:currentBases.second.name||"Runner"},
      currentBases.third&&{base:"third",name:currentBases.third.name||"Runner"},
    ].filter(Boolean);
    if(hitTypeId==="hr"){
      // Clear all bases
      onUpdateBases({first:null,second:null,third:null});
      setShowOutConfirm(true);
    } else if(occupied.length===0){
      // No runners -- just place batter
      const newBases={first:null,second:null,third:null};
      if(hitTypeId==="single") newBases.first={name:currentBatter?.name||"Batter",fast:false};
      if(hitTypeId==="double") newBases.second={name:currentBatter?.name||"Batter",fast:false};
      if(hitTypeId==="triple") newBases.third={name:currentBatter?.name||"Batter",fast:false};
      onUpdateBases(newBases);
      setShowOutConfirm(true);
    } else {
      // Need to resolve existing runners one at a time
      setHitType(hitTypeId);
      setRunnersToResolve(occupied);
      setRunnerResolutionIdx(0);
      setResolvedRunners([]);
    }
  };

  const resolveRunner=(newBase)=>{
    const runner=runnersToResolve[runnerResolutionIdx];
    const next=[...resolvedRunners,{...runner,newBase}];
    if(runnerResolutionIdx+1>=runnersToResolve.length){
      // All resolved -- build new bases state
      const newBases={first:null,second:null,third:null};
      next.forEach(r=>{
        if(r.newBase==="first") newBases.first={name:r.name,fast:false};
        else if(r.newBase==="second") newBases.second={name:r.name,fast:false};
        else if(r.newBase==="third") newBases.third={name:r.name,fast:false};
        // "scored" = removed
      });
      // Place batter
      const bn=currentBatter?.name||"Batter";
      if(hitType==="single"&&!newBases.first) newBases.first={name:bn,fast:false};
      else if(hitType==="double"&&!newBases.second) newBases.second={name:bn,fast:false};
      else if(hitType==="triple"&&!newBases.third) newBases.third={name:bn,fast:false};
      onUpdateBases(newBases);
      setRunnersToResolve([]);
      setResolvedRunners([]);
      setRunnerResolutionIdx(0);
      setHitType(null);
      setShowOutConfirm(true);
    } else {
      setResolvedRunners(next);
      setRunnerResolutionIdx(i=>i+1);
    }
  };

  const handleContactResult=(resultId)=>{
    if(!contactPending) return;
    if(resultId==="out"){
      const label=`${contactPending.label} — Out`;
      onLogPitch({pitch:selectedPitch,zone:selectedZone,outcome:label,outcomeId:contactPending.id,isPositive:true,isOut:true,onBase:false,batter:currentBatter?.name||""});
      onAddOut();
      setContactPending(null);
      setSelectedZone(null);
      setShowOutConfirm(true);
    }
    // "onbase" -> show hit type buttons (handled inline)
  };

  const subResults=useMemo(()=>{
    if(subQuery.length<2) return [];
    return MLB_BATTERS.filter(b=>b.name.toLowerCase().includes(subQuery.toLowerCase())).slice(0,5);
  },[subQuery]);

  const currentBases=session.bases||{first:null,second:null,third:null};
  const stealThreat=activePitch?.stealThreat;

  // Base diamond toggle (manual adjust)
  const toggleBase=(b)=>{
    const cur=currentBases[b];
    if(cur) onUpdateBases({...currentBases,[b]:null});
    else onUpdateBases({...currentBases,[b]:{name:"Runner",fast:false}});
  };
  const toggleFast=(b)=>{
    const cur=currentBases[b];
    if(!cur) return;
    onUpdateBases({...currentBases,[b]:{...cur,fast:!cur.fast}});
  };

  // Runner advancement options based on hit type
  const advanceOptions=(hitTypeId)=>{
    if(hitTypeId==="single") return [{id:"first",label:"Stayed (1st)→1st"},{id:"second",label:"Advanced→2nd"},{id:"third",label:"Advanced→3rd"},{id:"scored",label:"Scored"}];
    if(hitTypeId==="double") return [{id:"second",label:"Stayed→2nd"},{id:"third",label:"Advanced→3rd"},{id:"scored",label:"Scored"}];
    if(hitTypeId==="triple") return [{id:"third",label:"Stayed→3rd"},{id:"scored",label:"Scored"}];
    return [];
  };

  const outDots=[0,1,2].map(i=>i<outs);

  return(
    <div style={{padding:"14px 16px"}}>

      {/* Batter banner */}
      {currentBatter&&(
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",
          background:C.greenDim,border:`1.5px solid ${C.greenMid}`,borderRadius:8,padding:"8px 12px",marginBottom:10}}>
          <div>
            <div style={{fontSize:10,fontWeight:800,color:C.greenMid,letterSpacing:"0.08em",textTransform:"uppercase"}}>At Bat</div>
            <div style={{fontSize:14,fontWeight:800,color:C.text}}>{currentBatter.name||`Batter ${batterIdx+1}`}</div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:11,color:C.textSoft,fontWeight:600}}>{currentBatter.bat==="S"?"Switch":currentBatter.bat==="L"?"LHB":"RHB"}</span>
            <button onClick={()=>setShowSub(!showSub)} style={{...S.ghostBtn,padding:"4px 10px",fontSize:10}}>Sub</button>
          </div>
        </div>
      )}

      {/* Sub panel */}
      {showSub&&(
        <div style={{background:C.white,border:`1.5px solid ${C.border}`,borderRadius:8,padding:10,marginBottom:10}}>
          <div style={{fontSize:10,fontWeight:800,color:C.textSoft,marginBottom:6,textTransform:"uppercase",letterSpacing:"0.08em"}}>Substitution</div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:6}}>
            {lineup&&lineup.map((b,i)=>(
              <button key={i} onClick={()=>setSubSlot(i)} style={{
                padding:"4px 10px",borderRadius:6,fontSize:11,fontWeight:700,fontFamily:"'Nunito',sans-serif",
                background:subSlot===i?C.green:C.surface,color:subSlot===i?"#fff":C.textMid,
                border:`1px solid ${subSlot===i?C.green:C.border}`,cursor:"pointer",
              }}>{i+1}. {b.name||"—"}</button>
            ))}
          </div>
          {subSlot!==null&&(
            <>
              <input value={subQuery} onChange={e=>setSubQuery(e.target.value)} placeholder="New batter name..."
                style={{...S.input,width:"100%",boxSizing:"border-box",marginBottom:4}}/>
              {subResults.map(b=>(
                <div key={b.name} onClick={()=>{onSub(subSlot,b);setShowSub(false);setSubQuery("");setSubSlot(null);}} style={{
                  padding:"8px 10px",background:C.surface,borderRadius:6,marginBottom:3,cursor:"pointer",
                  display:"flex",justifyContent:"space-between",
                }}>
                  <span style={{fontWeight:700,fontSize:12}}>{b.name}</span>
                  <span style={{fontSize:10,color:C.textSoft}}>{b.bat}H</span>
                </div>
              ))}
            </>
          )}
        </div>
      )}

      {/* Count + bases bar */}
      <div style={{...S.countBar,gap:0,alignItems:"center"}}>
        {/* Count */}
        <div style={{display:"flex",alignItems:"baseline",gap:5}}><span style={S.countNum}>{balls}</span><span style={S.countLabel}>B</span></div>
        <div style={S.countDivider}/>
        <div style={{display:"flex",alignItems:"baseline",gap:5}}><span style={S.countNum}>{strikes}</span><span style={S.countLabel}>S</span></div>
        <div style={{flex:1}}/>

        {/* Bases diamond */}
        <div style={{position:"relative",width:52,height:52,marginRight:8}}>
          {/* Second base (top) */}
          <div onClick={()=>toggleBase("second")} style={{
            position:"absolute",top:0,left:"50%",transform:"translateX(-50%) rotate(45deg)",
            width:16,height:16,background:currentBases.second?C.gold:"#1a2e22",
            border:`2px solid ${currentBases.second?C.gold:C.textSoft}`,cursor:"pointer",
            boxShadow:currentBases.second?`0 0 6px ${C.gold}`:undefined,
          }}/>
          {/* Third base (left) */}
          <div onClick={()=>toggleBase("third")} style={{
            position:"absolute",top:"50%",left:0,transform:"translateY(-50%) rotate(45deg)",
            width:16,height:16,background:currentBases.third?C.gold:"#1a2e22",
            border:`2px solid ${currentBases.third?C.gold:C.textSoft}`,cursor:"pointer",
            boxShadow:currentBases.third?`0 0 6px ${C.gold}`:undefined,
          }}/>
          {/* First base (right) */}
          <div onClick={()=>toggleBase("first")} style={{
            position:"absolute",top:"50%",right:0,transform:"translateY(-50%) rotate(45deg)",
            width:16,height:16,background:currentBases.first?C.gold:"#1a2e22",
            border:`2px solid ${currentBases.first?C.gold:C.textSoft}`,cursor:"pointer",
            boxShadow:currentBases.first?`0 0 6px ${C.gold}`:undefined,
          }}/>
          {/* Home plate indicator */}
          <div style={{position:"absolute",bottom:0,left:"50%",transform:"translateX(-50%) rotate(45deg)",
            width:12,height:12,background:"transparent",border:`1.5px solid ${C.textSoft}`}}/>
        </div>

        {/* Outs */}
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
          <div style={{display:"flex",gap:3}}>
            {outDots.map((filled,i)=>(
              <div key={i} style={{width:9,height:9,borderRadius:"50%",background:filled?C.warn:C.surface,border:`1.5px solid ${filled?C.warn:C.border}`}}/>
            ))}
          </div>
          <span style={{fontSize:9,color:C.textSoft,fontWeight:700}}>OUTS</span>
        </div>
      </div>

      {/* Fast runner toggle for occupied bases */}
      {(currentBases.first||currentBases.second)&&(
        <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
          {[["first","1st"],["second","2nd"]].map(([b,lbl])=>currentBases[b]&&(
            <button key={b} onClick={()=>toggleFast(b)} style={{
              padding:"4px 10px",borderRadius:6,fontSize:11,fontWeight:700,fontFamily:"'Nunito',sans-serif",
              background:currentBases[b].fast?"#fdf3dc":C.surface,
              color:currentBases[b].fast?C.gold:C.textSoft,
              border:`1.5px solid ${currentBases[b].fast?C.gold:C.border}`,cursor:"pointer",
            }}>⚡ {lbl} fast?</button>
          ))}
        </div>
      )}

      {/* Steal threat notice */}
      {stealThreat&&!showOutConfirm&&!contactPending&&!hitType&&(
        <div style={{background:C.goldLight,border:`1.5px solid ${C.gold}`,borderRadius:8,padding:"7px 12px",marginBottom:10,fontSize:11,fontWeight:700,color:C.gold}}>
          ⚡ Steal threat on base — stretch recommended, fastball frequency boosted
        </div>
      )}

      {/* Strikeout/walk/advance confirm */}
      {showOutConfirm&&(
        <div style={{background:C.white,border:`2px solid ${C.green}`,borderRadius:10,padding:"14px 16px",marginBottom:12,textAlign:"center"}}>
          <div style={{fontSize:13,fontWeight:800,color:C.text,marginBottom:10}}>
            {strikes>=3?"Strikeout ⚾":balls>=4?"Walk 🚶":"At-bat over"}
          </div>
          <button onClick={()=>{setShowOutConfirm(false);onNewAtBat();setBalls(0);setStrikes(0);}} style={{...S.primaryBtn,width:"auto",padding:"10px 28px",fontSize:13}}>
            Next Batter →
          </button>
        </div>
      )}

      {/* Runner resolution flow */}
      {hitType&&runnersToResolve.length>0&&runnerResolutionIdx<runnersToResolve.length&&(
        <div style={{background:C.white,border:`1.5px solid ${C.border}`,borderRadius:10,padding:"12px 14px",marginBottom:12}}>
          <div style={{fontSize:11,fontWeight:800,color:C.textSoft,marginBottom:8,textTransform:"uppercase",letterSpacing:"0.08em"}}>
            Where is {runnersToResolve[runnerResolutionIdx].name} ({runnersToResolve[runnerResolutionIdx].base})?
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {advanceOptions(hitType).map(opt=>(
              <button key={opt.id} onClick={()=>resolveRunner(opt.id)} style={{
                padding:"11px",borderRadius:8,border:`1.5px solid ${C.border}`,background:C.surface,
                color:C.text,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"'Nunito',sans-serif",textAlign:"left",
              }}>{opt.label}</button>
            ))}
          </div>
        </div>
      )}

      {/* Contact secondary */}
      {contactPending&&!showOutConfirm&&!hitType&&(
        <div style={{background:C.white,border:`1.5px solid ${C.border}`,borderRadius:10,padding:"12px 14px",marginBottom:12}}>
          <div style={{fontSize:11,fontWeight:800,color:C.textSoft,marginBottom:8,textTransform:"uppercase",letterSpacing:"0.08em"}}>
            {contactPending.label} — result?
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
            <button onClick={()=>handleContactResult("out")} style={{
              padding:"13px",borderRadius:9,border:`1.5px solid ${C.green}`,background:C.greenLight,
              color:C.green,fontSize:13,fontWeight:800,cursor:"pointer",fontFamily:"'Nunito',sans-serif",
            }}>Out ✓</button>
            <button onClick={()=>setHitType("__pick")} style={{
              padding:"13px",borderRadius:9,border:`1.5px solid ${C.warn}`,background:C.warnLight,
              color:C.warn,fontSize:13,fontWeight:800,cursor:"pointer",fontFamily:"'Nunito',sans-serif",
            }}>Hit →</button>
          </div>
          {hitType==="__pick"&&(
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
              {[["single","Single"],["double","Double"],["triple","Triple"],["hr","Home Run 🏠"]].map(([id,lbl])=>(
                <button key={id} onClick={()=>{setHitType(null);startHitFlow(contactPending,id);}} style={{
                  padding:"10px",borderRadius:8,border:`1.5px solid ${C.border}`,background:C.surface,
                  color:C.text,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"'Nunito',sans-serif",
                }}>{lbl}</button>
              ))}
            </div>
          )}
        </div>
      )}

      {/* Recommendation box -- driven by activePitch */}
      {activePitch&&!showOutConfirm&&!contactPending&&(
        <div style={S.recBox}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div>
              <div style={S.recLabel}>Throw This</div>
              <div style={S.recPitch}>{activePitch.type}</div>
              <div style={S.recVelo}>{activePitch.velo} mph</div>
            </div>
            <div style={{...S.scoreCircle,borderColor:scoreColor(activePitch.score),color:scoreColor(activePitch.score)}}>{activePitch.score}</div>
          </div>
          <div style={S.recReason}>
            {isChaseRec&&<span style={{color:C.blue,fontWeight:700}}>🎯 Chase pitch — </span>}
            {getFullReason(lastThrown,lastZone,activePitch.type,recZone,activePitch.score)}
          </div>
        </div>
      )}

      {!showOutConfirm&&!contactPending&&(<>
        {/* Pitch selector */}
        <div style={{marginBottom:12}}>
          <div style={S.sectionLabel}>Select Pitch</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
            {scored.map(p=>(
              <button key={p.type} onClick={()=>setSelectedPitch(p.type)} style={{
                padding:"7px 11px",borderRadius:7,fontFamily:"'Nunito',sans-serif",
                border:`1.5px solid ${selectedPitch===p.type?C.greenMid:C.border}`,
                background:selectedPitch===p.type?C.greenDim:C.white,
                color:selectedPitch===p.type?C.green:C.textMid,
                fontSize:12,fontWeight:700,cursor:"pointer",
              }}>
                {p.type} <span style={{fontWeight:500,fontSize:10,opacity:0.7}}>{p.score}</span>
              </button>
            ))}
          </div>
        </div>

        {/* Zone grid */}
        <div style={{marginBottom:12}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
            <div style={S.sectionLabel}>Location 🔵=target</div>
            {selectedZone&&<span style={{fontSize:11,color:C.green,fontWeight:700}}>🟢 {zoneLabel(selectedZone)}</span>}
          </div>
          <div style={{background:C.white,border:`1.5px solid ${C.border}`,borderRadius:10,padding:10}}>
            <ZoneGrid onSelect={setSelectedZone} selected={selectedZone} recommended={recZone}/>
            {!selectedZone&&<div style={{color:C.textSoft,fontSize:11,textAlign:"center",marginTop:6,fontWeight:500}}>Tap where you threw it</div>}
          </div>
        </div>

        {/* Outcome buttons */}
        <div>
          <div style={S.sectionLabel}>
            Outcome {!selectedZone&&<span style={{color:C.warn,fontWeight:600}}>— tap zone first</span>}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
            {OUTCOMES.map(oc=>(
              <button key={oc.id} onClick={()=>handleOutcome(oc)} disabled={!selectedZone} style={{
                padding:"12px 6px",borderRadius:9,fontFamily:"'Nunito',sans-serif",
                background:!selectedZone?"#f0ede7":C.white,
                border:`1.5px solid ${!selectedZone?C.border:oc.color}`,
                color:!selectedZone?C.textSoft:oc.color,
                fontSize:12,fontWeight:800,cursor:selectedZone?"pointer":"not-allowed",
                opacity:!selectedZone?0.5:1,transition:"all 0.1s",
              }}>{oc.label}</button>
            ))}
          </div>
        </div>
      </>)}
    </div>
  );
}

// ─── Visuals Tab ──────────────────────────────────────────────────────────────
function VisualsTab({session}){
  const{pitches,gameLog,pitcherHand}=session;
  const[selectedZoneInfo,setSelectedZoneInfo]=useState(null);
  const dotColors=[C.green,"#b5811b","#b5451b","#5b8dd9","#7c5cbf","#d97c2d","#2d9bb5"];

  // Movement chart: map pitch movement to SVG coords on a labeled grid
  // Grid: x=horizontal break (-20 to +20 in), y=vertical break (-15 to +20 in)
  const GRID={xMin:-22,xMax:22,yMin:-16,yMax:22,w:160,h:140,pad:20};
  const toSvg=(h,v)=>({
    x: GRID.pad + ((h-GRID.xMin)/(GRID.xMax-GRID.xMin))*(GRID.w-2*GRID.pad),
    y: GRID.h-GRID.pad - ((v-GRID.yMin)/(GRID.yMax-GRID.yMin))*(GRID.h-2*GRID.pad),
  });
  const origin=toSvg(0,0);
  const xTicks=[-20,-10,0,10,20];
  const yTicks=[-10,0,10,20];

  // Zone heatmap data
  const zoneData={};
  gameLog.forEach(e=>{
    if(!e.zone) return;
    if(!zoneData[e.zone]) zoneData[e.zone]={pitches:[],outs:0,onBase:0,fouls:0,balls:0,total:0};
    zoneData[e.zone].pitches.push(e);
    zoneData[e.zone].total++;
    if(e.isOut) zoneData[e.zone].outs++;
    else if(e.onBase) zoneData[e.zone].onBase++;
    else if(e.outcomeId==="foul") zoneData[e.zone].fouls++;
    else if(e.outcomeId==="ball") zoneData[e.zone].balls++;
  });

  // Zone color: red = pitcher favoring (low opp average), blue = batter favoring (high opp hits)
  const zoneColor=(id)=>{
    const d=zoneData[id]; if(!d||d.total<1) return null;
    // Opponent "average" = on base events / contact events (hard+weak)
    const contact=d.pitches.filter(p=>["hard","weak"].includes(p.outcomeId)).length;
    if(contact===0) return null;
    const avg=d.onBase/contact; // 0=all outs, 1=all on base
    if(avg<=0.25) return `rgba(180,30,30,${0.15+avg*0.5})`; // red = good zone
    if(avg>=0.6)  return `rgba(26,111,181,${0.15+avg*0.4})`; // blue = bad zone
    return `rgba(181,129,27,${0.2})`; // gold = neutral
  };

  return(
    <div style={{padding:"16px"}}>
      {/* Movement chart */}
      <div style={S.sectionLabel}>Pitch Movement Profile</div>
      <div style={{...S.card,marginBottom:16,overflowX:"auto"}}>
        <svg viewBox={`0 0 ${GRID.w} ${GRID.h}`} style={{width:"100%",height:180}}>
          {/* Grid lines */}
          {xTicks.map(x=>{const p=toSvg(x,0);return(<g key={x}>
            <line x1={p.x} y1={GRID.pad} x2={p.x} y2={GRID.h-GRID.pad} stroke={x===0?"#b0b0b0":C.border} strokeWidth={x===0?0.8:0.4} strokeDasharray={x===0?"none":"2,2"}/>
            <text x={p.x} y={GRID.h-GRID.pad+7} fontSize={4} fill={C.textSoft} textAnchor="middle" fontFamily="Nunito,sans-serif">{x}</text>
          </g>);})}
          {yTicks.map(y=>{const p=toSvg(0,y);return(<g key={y}>
            <line x1={GRID.pad} y1={p.y} x2={GRID.w-GRID.pad} y2={p.y} stroke={y===0?"#b0b0b0":C.border} strokeWidth={y===0?0.8:0.4} strokeDasharray={y===0?"none":"2,2"}/>
            <text x={GRID.pad-2} y={p.y+1.5} fontSize={4} fill={C.textSoft} textAnchor="end" fontFamily="Nunito,sans-serif">{y}</text>
          </g>);})}
          {/* Axis labels */}
          <text x={GRID.w/2} y={GRID.h-1} fontSize={4.5} fill={C.textMid} textAnchor="middle" fontFamily="Nunito,sans-serif" fontWeight="700">Horizontal Break (in)</text>
          <text x={3} y={GRID.h/2} fontSize={4.5} fill={C.textMid} textAnchor="middle" fontFamily="Nunito,sans-serif" fontWeight="700" transform={`rotate(-90,3,${GRID.h/2})`}>Vertical (in)</text>
          {/* Origin cross */}
          <circle cx={origin.x} cy={origin.y} r={1.5} fill={C.border}/>
          {/* Pitch dots */}
          {pitches.map((p,i)=>{
            const m=getMovement(p.type,p.velo,pitcherHand);
            const{x,y}=toSvg(m.h,m.v);
            const cx2=Math.min(GRID.w-GRID.pad-2,Math.max(GRID.pad+2,x));
            const cy2=Math.min(GRID.h-GRID.pad-2,Math.max(GRID.pad+2,y));
            const col=dotColors[i%dotColors.length];
            return(<g key={p.type}>
              <circle cx={cx2} cy={cy2} r={5} fill={col} opacity={0.9}/>
              <text x={cx2+7} y={cy2+1.5} fontSize={4.2} fill={col} fontFamily="Nunito,sans-serif" fontWeight="700">{p.type.split(" ")[0]}</text>
            </g>);
          })}
        </svg>
        <div style={{display:"flex",flexWrap:"wrap",gap:8,marginTop:4}}>
          {pitches.map((p,i)=>(<div key={p.type} style={{display:"flex",alignItems:"center",gap:5}}>
            <div style={{width:9,height:9,borderRadius:"50%",background:dotColors[i%dotColors.length]}}/>
            <span style={{color:C.textMid,fontSize:11,fontWeight:600}}>{p.type} ({p.velo})</span>
          </div>))}
        </div>
      </div>

      {/* Heatmap */}

        <div style={S.sectionLabel}>Zone Heatmap <span style={{fontWeight:500,color:C.textSoft}}>({gameLog.length} pitches)</span></div>
        <div style={{display:"flex",gap:8,fontSize:10,fontWeight:700}}>
          <span style={{color:"rgba(180,30,30,0.9)"}}>🔴 Pound it</span>
          <span style={{color:C.blue}}>🔵 Avoid</span>
        </div>
      </div>
      <div style={S.card}>
        {gameLog.length===0?(
          <div style={{color:C.textSoft,fontSize:12,textAlign:"center",padding:20,fontWeight:500}}>No pitches logged yet</div>

            {Array.from({length:25},(_,idx)=>{
              const row=Math.floor(idx/5),col=idx%5,id=`${row}-${col}`;
              const d=zoneData[id],inZone=row>=1&&row<=3&&col>=1&&col<=3;

                <div key={id} onClick={()=>setSelectedZoneInfo(selectedZoneInfo===id?null:id)} style={{

                  display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",

            <div style={{marginTop:10,padding:"10px 12px",background:C.surface,borderRadius:8}}>
              <div style={{fontWeight:800,fontSize:12,color:C.text,marginBottom:6}}>{zoneLabel(selectedZoneInfo)} — {d.total} pitch{d.total!==1?"es":""}</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:4,marginBottom:8}}>
                {[["Outs",d.outs,C.green],["On Base",d.onBase,C.warn],["Fouls",d.fouls,C.gold],["Balls",d.balls,C.textSoft]].map(([lbl,val,col])=>(
                  <div key={lbl} style={{background:C.white,borderRadius:6,padding:"6px 10px",display:"flex",justifyContent:"space-between"}}>
                    <span style={{fontSize:11,color:C.textSoft,fontWeight:600}}>{lbl}</span>
                    <span style={{fontSize:12,fontWeight:800,color:col}}>{val}</span>
                  </div>
                ))}
              </div>
              <div style={{fontSize:10,color:C.textSoft,fontWeight:600,marginBottom:4}}>Pitches thrown here:</div>
              {d.pitches.map((e,i)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderTop:`1px solid ${C.border}`}}>
                  <span style={{fontSize:11,fontWeight:700,color:C.text}}>{e.pitch}</span>
                  <span style={{fontSize:11,color:e.isOut?C.green:e.onBase?C.warn:C.textSoft,fontWeight:600}}>{e.outcome}</span>
                </div>
              ))}
            </div>
          );
        })()}
      </div>
    </div>
  );
}

function HistoryTab() {
  const [games,setGames]=useState([]);
  const [loading,setLoading]=useState(true);
  const [selected,setSelected]=useState(null);
  const [statsView,setStatsView]=useState(null);
  const [statsData,setStatsData]=useState([]);
  const [statsLoading,setStatsLoading]=useState(false);
  useEffect(()=>{loadGames(30).then(g=>{setGames(g);setLoading(false);});},[]);
  const doLoadStats=async(type,name)=>{
    setStatsLoading(true);setStatsView({type,name});
    const d=type==="pitcher"?await loadPitcherStats(name):await loadBatterTendencies(name);
    setStatsData(d);setStatsLoading(false);
  };
  if(statsView){
    const pc={},zc={},op={};
    statsData.forEach(p=>{
      pc[p.pitch_type]=(pc[p.pitch_type]||0)+1;
      if(p.zone) zc[p.zone]=(zc[p.zone]||0)+1;
      if(!op[p.pitch_type]) op[p.pitch_type]={outs:0,total:0};
      op[p.pitch_type].total++;if(p.is_out) op[p.pitch_type].outs++;
    });
    const sp=Object.entries(pc).sort((a,b)=>b[1]-a[1]);
    const mz=Math.max(1,...Object.values(zc));
    return(<div style={{padding:"16px"}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
        <button onClick={()=>{setStatsView(null);setStatsData([]);}} style={{...S.ghostBtn,padding:"4px 10px"}}>← Back</button>
        <div><div style={S.sectionLabel}>{statsView.type==="pitcher"?"Pitcher Stats":"Batter Tendencies"}</div>
          <div style={{fontSize:14,fontWeight:800,color:C.text}}>{statsView.name}</div></div>
      </div>
      {statsLoading?<div style={S.emptyState}>Loading...</div>:statsData.length===0?<div style={S.emptyState}>No data.</div>:(<>
        <div style={S.sectionLabel}>Pitch Usage ({statsData.length})</div>
        <div style={{...S.card,marginBottom:16}}>
          {sp.map(([type,count])=>{
            const o=op[type]||{};const pct=o.total>0?Math.round((o.outs/o.total)*100):0;
            return(<div key={type} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 0",borderBottom:`1px solid ${C.border}`}}>
              <span style={{flex:1,fontSize:13,fontWeight:700,color:C.text}}>{type}</span>
              <span style={{fontSize:11,color:C.textSoft,width:36,textAlign:"right"}}>{count}x</span>
              <div style={{width:50,height:5,background:C.surface,borderRadius:3,overflow:"hidden"}}>
                <div style={{width:`${Math.round((count/statsData.length)*100)}%`,height:"100%",background:C.green,borderRadius:3}}/>
              </div>
              <span style={{fontSize:11,fontWeight:700,color:pct>40?C.green:C.textSoft,width:50,textAlign:"right"}}>{pct}% out</span>
            </div>);
          })}
        </div>
        <div style={S.sectionLabel}>Zone Heatmap</div>
        <div style={S.card}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:3}}>
            {Array.from({length:25},(_,idx)=>{
              const row=Math.floor(idx/5),col=idx%5,id=`${row}-${col}`;
              const cnt=zc[id]||0,intens=cnt/mz,inZ=row>=1&&row<=3&&col>=1&&col<=3;
              return(<div key={id} style={{height:40,borderRadius:5,
                background:cnt>0?`rgba(45,106,79,${0.12+intens*0.75})`:inZ?C.white:C.surface,
                border:`1.5px solid ${C.border}`,display:"flex",alignItems:"center",justifyContent:"center"}}>
                {cnt>0&&<span style={{color:intens>0.5?"#fff":C.green,fontSize:11,fontWeight:700}}>{cnt}</span>}
              </div>);
            })}
          </div>
        </div>
      </>)}
    </div>);
  }
  if(selected){
    const g=games.find(x=>x.id===selected);if(!g) return null;
    const log=g.game_log||[];
    return(<div style={{padding:"16px"}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
        <button onClick={()=>setSelected(null)} style={{...S.ghostBtn,padding:"4px 10px"}}>← Back</button>
        <div><div style={{fontSize:14,fontWeight:800,color:C.text}}>{g.pitcher_name}</div>
          <div style={{fontSize:11,color:C.textSoft}}>{new Date(g.created_at).toLocaleDateString()} · {g.my_score}–{g.opp_score} · {g.total_pitches}p</div></div>
      </div>
      <button onClick={()=>doLoadStats("pitcher",g.pitcher_name)} style={{...S.ghostBtn,marginBottom:12}}>Career Stats</button>
      <div style={S.sectionLabel}>Pitch Log</div>
      {log.length===0?<div style={S.emptyState}>No pitches.</div>:(
        [...log].reverse().map((e,i)=>{
          const dot=e.isOut?C.green:e.onBase?C.warn:C.textSoft;
          return(<div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",
            background:C.white,border:`1.5px solid ${C.border}`,borderRadius:8,marginBottom:4}}>
            <div style={{width:7,height:7,borderRadius:"50%",background:dot,flexShrink:0}}/>
            <span style={{flex:1,fontSize:12,fontWeight:700,color:C.text}}>{e.pitch}</span>
            {e.batter&&<span style={{fontSize:10,color:C.textSoft}}>{e.batter.split(" ").pop()}</span>}
            <span style={{fontSize:10,color:C.textSoft,marginRight:4}}>{e.zone||"--"}</span>
            <span style={{fontSize:10,fontWeight:700,color:dot,textAlign:"right",maxWidth:110}}>{e.outcome}</span>
          </div>);
        })
      )}
    </div>);
  }
  return(<div style={{padding:"16px"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
      <div style={S.sectionLabel}>Game History</div>
      <span style={{fontSize:11,color:C.textSoft,fontWeight:700}}>{games.length} games</span>
    </div>
    {loading?<div style={S.emptyState}>Loading...</div>:games.length===0?
      <div style={S.emptyState}>No games saved yet. Finish a game and tap "Save Game" in the Log tab.</div>:
      games.map(g=>(<div key={g.id} onClick={()=>setSelected(g.id)} style={{background:C.white,
        border:`1.5px solid ${C.border}`,borderRadius:10,padding:"12px 14px",marginBottom:8,cursor:"pointer"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div><div style={{fontSize:13,fontWeight:800,color:C.text}}>{g.pitcher_name}</div>
            <div style={{fontSize:11,color:C.textSoft,marginTop:2}}>{new Date(g.created_at).toLocaleDateString()} · Inn {g.innings}</div></div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:16,fontWeight:800,color:C.green}}>{g.my_score}–{g.opp_score}</div>
            <div style={{fontSize:10,color:C.textSoft}}>{g.total_pitches} pitches</div>
          </div>
        </div>
      </div>))
    }
  </div>);
}

function App(){
  const [tab,setTab]=useState("setup");
  const [session,setSession]=useState(null);
  const [showScorePrompt,setShowScorePrompt]=useState(false);
  const [scoreInput,setScoreInput]=useState({my:0,opp:0});
  const [saving,setSaving]=useState(false);
  const [savedId,setSavedId]=useState(null);
  const handleSetup=(config)=>{
    setSession({...config,sequence:[],outcomes:{},gameLog:[],batterIdx:0,
      outs:0,inning:1,myScore:0,oppScore:0,inningLog:[],bases:{first:null,second:null,third:null}});
    setTab("atbat");setSavedId(null);
  };
  const handleLogPitch=useCallback((entry)=>{
    setSession(prev=>{
      const no={...prev.outcomes};
      if(entry.isPositive){no[entry.pitch]=(no[entry.pitch]||0)+3;
        if(prev.sequence.length>0){const p2=prev.sequence[prev.sequence.length-1].pitch;no[p2]=(no[p2]||0)+1;}}
      return{...prev,sequence:[...prev.sequence,entry],gameLog:[...prev.gameLog,entry],outcomes:no};
    });
  },[]);
  const handleAddOut=useCallback(()=>{
    setSession(prev=>{
      const n=prev.outs+1;
      if(n>=3){setShowScorePrompt(true);setScoreInput({my:0,opp:0});
        return{...prev,outs:0,inning:prev.inning+1,bases:{first:null,second:null,third:null}};}
      return{...prev,outs:n};
    });
  },[]);
  const handleScoreSubmit=()=>{
    setSession(prev=>({...prev,myScore:prev.myScore+scoreInput.my,oppScore:prev.oppScore+scoreInput.opp,
      inningLog:[...prev.inningLog,{inning:prev.inning-1,my:scoreInput.my,opp:scoreInput.opp}]}));
    setShowScorePrompt(false);
  };
  const handleNewAtBat=useCallback(()=>{
    setSession(prev=>{
      const v=prev.lineup?prev.lineup.filter(b=>b.name):[];
      return{...prev,sequence:[],batterIdx:v.length>0?(prev.batterIdx+1)%v.length:0};
    });
  },[]);
  const handleSub=(slot,nb)=>setSession(prev=>{
    if(!prev.lineup) return prev;
    const nl=[...prev.lineup];nl[slot]={name:nb.name,bat:nb.bat,custom:false};return{...prev,lineup:nl};
  });
  const handleUpdateBases=useCallback((b)=>setSession(prev=>({...prev,bases:b})),[]);
  const handleSaveGame=async()=>{
    if(!session||saving) return;
    setSaving(true);const id=await saveGame(session);setSaving(false);if(id) setSavedId(id);
  };
  const ordinal=n=>{const s=["th","st","nd","rd"],v=n%100;return n+(s[(v-20)%10]||s[v]||s[0]);};
  const TABS=[{id:"setup",label:"Setup"},{id:"atbat",label:"At-Bat"},{id:"visuals",label:"Visuals"},{id:"log",label:"Log"},{id:"history",label:"History"}];
  return(
    <div style={S.root}>
      <div style={S.header}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:20}}>⚾</span>
            <div style={S.headerTitle}>Pitch IQ</div>
          </div>
          {session&&(<div style={{display:"flex",gap:10,alignItems:"center"}}>
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:9,color:"rgba(255,255,255,0.55)",fontWeight:700,textTransform:"uppercase"}}>Score</div>
              <div style={{fontSize:15,fontWeight:800,color:"#fff"}}>{session.myScore}–{session.oppScore}</div>
            </div>
            <div style={{width:1,height:24,background:"rgba(255,255,255,0.2)"}}/>
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:9,color:"rgba(255,255,255,0.55)",fontWeight:700,textTransform:"uppercase"}}>Inn</div>
              <div style={{fontSize:15,fontWeight:800,color:"#fff"}}>{ordinal(session.inning)}</div>
            </div>
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:9,color:"rgba(255,255,255,0.55)",fontWeight:700,textTransform:"uppercase"}}>Outs</div>
              <div style={{display:"flex",gap:3,marginTop:2,justifyContent:"center"}}>
                {[0,1,2].map(i=>(<div key={i} style={{width:8,height:8,borderRadius:"50%",
                  background:i<session.outs?"#fff":"rgba(255,255,255,0.25)",border:"1px solid rgba(255,255,255,0.4)"}}/>))}
              </div>
            </div>
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:9,color:"rgba(255,255,255,0.55)",fontWeight:700,textTransform:"uppercase"}}>P</div>
              <div style={{fontSize:15,fontWeight:800,color:"#fff"}}>{session.gameLog?.length||0}</div>
            </div>
          </div>)}
        </div>
      </div>
      {showScorePrompt&&(<div style={{background:C.white,borderBottom:`2px solid ${C.border}`,padding:"12px 16px"}}>
        <div style={{fontWeight:800,fontSize:13,color:C.text,marginBottom:8}}>Half-inning over — runs scored?</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
          {[["My runs",scoreInput.my,"my"],["Opp runs",scoreInput.opp,"opp"]].map(([lbl,val,key])=>(
            <div key={key}>
              <div style={{fontSize:10,fontWeight:700,color:C.textSoft,marginBottom:4,textTransform:"uppercase"}}>{lbl}</div>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <button onClick={()=>setScoreInput(s=>({...s,[key]:Math.max(0,s[key]-1)}))} style={{...S.ghostBtn,padding:"4px 10px",fontSize:14}}>−</button>
                <span style={{fontSize:18,fontWeight:800,color:C.text,minWidth:24,textAlign:"center"}}>{val}</span>
                <button onClick={()=>setScoreInput(s=>({...s,[key]:s[key]+1}))} style={{...S.ghostBtn,padding:"4px 10px",fontSize:14}}>+</button>
              </div>
            </div>
          ))}
        </div>
        <button onClick={handleScoreSubmit} style={{...S.primaryBtn}}>Continue →</button>
      </div>)}
      <div style={S.tabBar}>
        {TABS.map(t=>(<button key={t.id} onClick={()=>setTab(t.id)} style={tab===t.id?S.tabOn:S.tabOff}>{t.label}</button>))}
      </div>
      <div style={S.content}>
        {tab==="setup"&&<SetupTab onComplete={handleSetup}/>}
        {tab==="atbat"&&(session
          ?<AtBatTab session={session} onLogPitch={handleLogPitch} onNewAtBat={handleNewAtBat} onSub={handleSub} onAddOut={handleAddOut} onUpdateBases={handleUpdateBases}/>
          :<div style={S.emptyState}>Complete setup first.</div>
        )}
        {tab==="visuals"&&(session?<VisualsTab session={session}/>:<div style={S.emptyState}>Complete setup first.</div>)}
        {tab==="log"&&(session
          ?<div>
            <LogTab session={session}/>
            <div style={{padding:"0 16px 16px"}}>
              {savedId
                ?<div style={{textAlign:"center",padding:"12px",background:C.greenLight,borderRadius:8,color:C.green,fontWeight:700,fontSize:13}}>✓ Game saved</div>
                :<button onClick={handleSaveGame} style={{...S.primaryBtn,opacity:saving?0.6:1}} disabled={saving}>{saving?"Saving...":"Save Game to History"}</button>
              }
            </div>
          </div>
          :<div style={S.emptyState}>Complete setup first.</div>
        )}
        {tab==="history"&&<HistoryTab/>}
      </div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
